<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>职业兴趣测评 · 自在生涯工作室</title>
<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase CDN 回退：如果 jsdelivr 加载失败（国内常见），尝试 unpkg
if (typeof window.supabase === 'undefined') {
  document.write('<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"><\/script>');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --primary: #6366f1;
  --primary-dark: #4338ca;
  --primary-light: #EEF0FF;
  --accent: #818cf8;
  --bg: #F0F4FF;
  --card: #FFFFFF;
  --text-primary: #1a1a2e;
  --text-secondary: #7C8594;
  --text-light: #B0B8C8;
  --border: #E8ECF2;
  --radius-sm: 14px;
  --radius-md: 20px;
  --radius-lg: 24px;
  --green: #10B981;
  --orange: #F59E0B;
  --red: #EF4444;
  --blue: #3B82F6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 16px;
  -webkit-font-smoothing: antialiased;
}
.phone {
  width: 390px; height: 844px;
  background: var(--bg);
  border-radius: 42px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(99,102,241,0.12), 0 0 0 1px rgba(99,102,241,0.08);
  display: flex; flex-direction: column;
}
.page-body {
  flex: 1; overflow-y: auto; padding: 8px 16px 12px;
  display: flex; flex-direction: column; gap: 0;
}
.page-body::-webkit-scrollbar { width: 0; }

/* Header */
.page-header { text-align: center; padding: 8px 0 10px; }
.page-title { font-size: 18px; font-weight: 800; color: var(--text-primary); }
.page-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }

/* Progress */
.prog-wrap { margin-bottom: 10px; }
.prog-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
.prog-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.4s ease; }

/* ====== SELECTION SCREEN ====== */
.select-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
  padding: 4px 0;
}
.select-wrap .test-card {
  flex: 0 0 auto;
  min-height: 0;
  padding: 10px 14px;
  gap: 10px;
  align-items: flex-start;
}
.test-card {
  background: var(--card); border-radius: var(--radius-md);
  padding: 16px 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  cursor: pointer; transition: all 0.2s; display: flex; gap: 14px;
  border: 2px solid transparent; align-items: flex-start;
}
.test-card:active { transform: scale(0.97); }
.test-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(99,102,241,0.12); }
.select-wrap .test-icon {
  width: 44px; height: 44px; border-radius: 12px; font-size: 22px;
  margin-top: 2px;
}
.test-icon {
  width: 50px; height: 50px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.select-wrap .test-info { justify-content: flex-start; min-height: 0; }
.test-info { flex: 1; display: flex; flex-direction: column; }
.select-wrap .test-name { font-size: 16px; margin-bottom: 3px; }
.test-name { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
.select-wrap .test-quick { font-size: 12px; margin-bottom: 3px; }
.test-quick { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.select-wrap .test-desc {
  font-size: 12px; line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.test-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.select-wrap .test-meta { font-size: 11px; margin-top: 4px; padding-top: 0; }
.test-meta { font-size: 12px; color: var(--text-light); margin-top: auto; padding-top: 4px; }

/* ====== QUESTION SCREEN ====== */
.q-test-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 14px;
  font-size: 12px; font-weight: 600; color: var(--primary);
  background: var(--primary-light); margin-bottom: 8px;
}
.q-card {
  background: var(--card); border-radius: var(--radius-md); padding: 28px 20px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  transition: opacity 0.25s ease, transform 0.25s ease;
  text-align: center;
}
.q-card.enter { animation: slideEnter 0.3s ease forwards; }
.q-card.exit  { animation: slideExit 0.2s ease forwards; }
@keyframes slideEnter {
  from { opacity: 0; transform: translateX(24px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideExit {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-24px); }
}
.q-num { display: none; }
.q-text { font-size: 18px; color: var(--text-primary); font-weight: 700; line-height: 1.6; margin-bottom: 32px; padding: 0 4px; }
/* Vertical option buttons */
.q-options {
  display: flex; flex-direction: column;
  gap: 10px; padding: 0 4px; margin-bottom: 0;
}
.q-opt {
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent; user-select: none;
  padding: 12px 16px; border-radius: 12px; font-size: 15px; font-weight: 500;
  border: 2px solid var(--border); background: #fff; color: var(--text-secondary);
  min-height: 48px;
}
.q-opt:hover { transform: translateY(-1px); }
.q-opt:active { transform: scale(0.98); }
/* Selected state */
.q-opt.sel { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); font-weight: 700; box-shadow: 0 2px 8px rgba(99,102,241,0.15); }
/* Color coding by level (unselected) */
.q-opt.l0 { border-color: #FECACA; color: #B91C1C; }
.q-opt.l1 { border-color: #FECACA; color: #DC2626; }
.q-opt.l2 { border-color: #FECACA; color: #EF4444; }
.q-opt.l3 { border-color: #E5E7EB; color: #6B7280; }
.q-opt.l4 { border-color: #BBF7D0; color: #16A34A; }
.q-opt.l5 { border-color: #BBF7D0; color: #15803D; }
.q-opt.l6 { border-color: #BBF7D0; color: #14532D; }
/* Selected overrides */
.q-opt.sel.l0 { background: #FEE2E2; border-color: #EF4444; color: #991B1B; }
.q-opt.sel.l1 { background: #FEE2E2; border-color: #F87171; color: #991B1B; }
.q-opt.sel.l2 { background: #FEE2E2; border-color: #FCA5A5; color: #B91C1C; }
.q-opt.sel.l3 { background: #F3F4F6; border-color: #D1D5DB; color: #374151; }
.q-opt.sel.l4 { background: #DCFCE7; border-color: #86EFAC; color: #166534; }
.q-opt.sel.l5 { background: #DCFCE7; border-color: #4ADE80; color: #14532D; }
.q-opt.sel.l6 { background: #DCFCE7; border-color: #22C55E; color: #14532D; }
.q-label { pointer-events: none; }
/* Remove old scale labels row */
.q-scale-labels { display: none; }
.q-radio { display: none; }

.q-nav-row { display: flex; gap: 10px; align-items: center; margin-top: 20px; }
.btn-back {
  flex: 0 0 auto; padding: 10px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 600; border: none;
  background: var(--bg); color: var(--text-secondary); cursor: pointer;
  transition: all 0.2s;
}
.btn-back:hover { background: var(--border); }
.q-indicator {
  flex: 1; text-align: center; font-size: 12px; color: var(--text-light);
  display: flex; align-items: center; justify-content: center; gap: 4px; flex-wrap: wrap;
}
.q-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: all 0.25s; }
.q-dot.done { background: var(--primary); }
.q-dot.current { width: 8px; height: 8px; background: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.25); }

/* ====== RESULTS ====== */
.result-hero {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border-radius: var(--radius-lg); padding: 28px 20px;
  text-align: center; color: #fff;
  position: relative; overflow: hidden;
}
/* Big Five dimension-specific hero gradients */
.result-hero.bf-E { background: linear-gradient(145deg, #f97316 0%, #ea580c 40%, #c2410c 100%); }
.result-hero.bf-A { background: linear-gradient(145deg, #10b981 0%, #059669 40%, #047857 100%); }
.result-hero.bf-C { background: linear-gradient(145deg, #3b82f6 0%, #2563eb 40%, #1d4ed8 100%); }
.result-hero.bf-N { background: linear-gradient(145deg, #ec4899 0%, #db2777 40%, #be185d 100%); }
.result-hero.bf-O { background: linear-gradient(145deg, #6366f1 0%, #4f46e5 40%, #4338ca 100%); }
.result-hero .bf-glow {
  position: absolute; width: 180px; height: 180px; border-radius: 50%;
  filter: blur(50px); opacity: 0.25; pointer-events: none;
}
.result-hero .bf-glow-1 { top: -40px; right: -30px; background: #fff; }
.result-hero .bf-glow-2 { bottom: -30px; left: -20px; background: rgba(255,255,255,.5); }
.result-hero-icon-wrap {
  display: inline-flex; align-items: center; justify-content: center;
  width: 72px; height: 72px; border-radius: 22px;
  background: rgba(255,255,255,.18);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1.5px solid rgba(255,255,255,.25);
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
  margin-bottom: 16px; position: relative; z-index: 2;
}
.result-hero-icon { font-size: 38px; line-height: 1; }
.result-hero-type { font-size: 13px; opacity: .82; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; position: relative; z-index: 2; }
.result-hero-code { font-size: 34px; font-weight: 900; letter-spacing: 8px; margin-bottom: 4px; position: relative; z-index: 2; }
.result-hero-name { font-size: 19px; font-weight: 800; margin-bottom: 10px; letter-spacing: .3px; position: relative; z-index: 2; }
.result-hero-desc { font-size: 13px; opacity: .92; line-height: 1.75; position: relative; z-index: 2; }

.score-card {
  background: var(--card); border-radius: var(--radius-md); padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}
.score-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }
.score-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.score-label { width: 70px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; font-weight: 500; }
.score-bar-wrap { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
.score-bar { height: 100%; border-radius: 5px; transition: width 1s ease; }
.score-val { width: 38px; text-align: right; font-size: 13px; font-weight: 700; color: var(--text-primary); flex-shrink: 0; }

/* ====== HOLLAND TABLE RESULT (reference image style) ====== */
.hl-hero {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border-radius: var(--radius-lg); padding: 26px 20px;
  text-align: center; color: #fff; margin-bottom: 14px;
}
.hl-hero-label { font-size: 13px; opacity: 0.85; margin-bottom: 8px; }
.hl-hero-code { font-size: 42px; font-weight: 900; letter-spacing: 10px; margin-bottom: 6px; }
.hl-hero-type { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.hl-hero-code-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.hl-hero-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px 6px 6px; border-radius: 18px;
  font-size: 13px; font-weight: 600; backdrop-filter: blur(4px);
}
.hl-hero-pill-letter {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
}

.hl-table-card, .hl-analysis-card {
  background: var(--card); border-radius: var(--radius-md); padding: 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 14px;
}
.hl-table-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }

/* Reference-image style: R I A S E C columns */
.hl-table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  font-size: 13px; border: 1px solid #e2e8f0;
  border-radius: 10px; overflow: hidden;
}
.hl-table thead th {
  padding: 12px 8px; font-weight: 700; font-size: 13px;
  text-align: center; border-bottom: 1px solid #e2e8f0;
  background: #f8fafc;
}
.hl-table thead th.hl-th-dim {
  background: #f1f5f9; text-align: left; padding-left: 14px;
  color: var(--text-primary); font-weight: 700;
}
.hl-table thead th.hl-th-code {
  width: 42px; font-weight: 800; font-size: 14px;
}

.hl-table tbody td {
  padding: 12px 8px; text-align: center;
  border-bottom: 1px solid #e2e8f0; font-weight: 600; color: var(--text-primary);
}
.hl-table tbody td:first-child {
  text-align: left; padding-left: 14px; font-weight: 600;
  color: var(--text-secondary); background: #fafbfc;
  border-right: 1px solid #e2e8f0;
}
.hl-table tbody tr:last-child td {
  border-bottom: none;
}
.hl-table tbody tr:last-child td:first-child {
  background: #eef0f5; font-weight: 700; color: var(--text-primary);
}
.hl-table tbody tr:last-child td:not(:first-child) {
  background: #f5f7fa; font-weight: 700;
}
.hl-table .hl-cell-empty { color: #c0c5d0; font-weight: 400; }

.hl-analysis-text { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }
.hl-dim-list { display: flex; flex-direction: column; gap: 10px; }
.hl-dim-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border-radius: 10px; background: var(--bg); }
.hl-dim-item.hl-dim-highlight { background: rgba(99,102,241,0.06); }
.hl-dim-tag {
  flex-shrink: 0; padding: 4px 10px; border-radius: 10px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
}
.hl-dim-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.6; padding-top: 2px; }

/* 16personalities style dimension bars */
.dim-section { margin-bottom: 20px; }
.dim-section:last-child { margin-bottom: 0; }
.dim-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.dim-section-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.dim-section-bar-wrap { height: 16px; background: var(--border); border-radius: 8px; position: relative; overflow: hidden; }
.dim-section-bar { height: 100%; border-radius: 8px; transition: width 1s ease; }
.dim-section-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border-radius: 50%; background: white; border: 3px solid; box-shadow: 0 2px 6px rgba(0,0,0,0.15); z-index: 2; transition: left 1s ease; }
.dim-section-footer { display: flex; justify-content: space-between; margin-top: 4px; font-size: 12px; color: var(--text-light); }

/* MBTI classic dual-bar */
.mbti-section { margin-bottom: 20px; }
.mbti-section:last-child { margin-bottom: 0; }
.mbti-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.mbti-section-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.mbti-section-pct { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.mbti-bar-full { height: 16px; border-radius: 8px; overflow: hidden; display: flex; position: relative; }
.mbti-bar-left { height: 100%; border-radius: 8px 0 0 8px; transition: flex 0.8s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
.mbti-bar-right { height: 100%; border-radius: 0 8px 8px 0; transition: flex 0.8s ease; display: flex; align-items: center; padding-left: 8px; }
.mbti-bar-text { font-size: 11px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.15); white-space: nowrap; }
.mbti-section-footer { display: flex; justify-content: space-between; margin-top: 4px; font-size: 12px; color: var(--text-light); }

/* Big Five classic bar */
.bf-score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.bf-score-row:last-child { margin-bottom: 0; }
.bf-score-name {
  width: 92px; flex-shrink: 0; display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 600; color: var(--text-primary);
}
.bf-score-name-icon {
  width: 26px; height: 26px; border-radius: 8px; display: inline-flex;
  align-items: center; justify-content: center; font-size: 14px;
  color: #fff; flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,.08);
}
.bf-score-name-icon.bf-E { background: linear-gradient(135deg, #fb923c, #ea580c); }
.bf-score-name-icon.bf-A { background: linear-gradient(135deg, #34d399, #059669); }
.bf-score-name-icon.bf-C { background: linear-gradient(135deg, #60a5fa, #2563eb); }
.bf-score-name-icon.bf-N { background: linear-gradient(135deg, #f472b6, #db2777); }
.bf-score-name-icon.bf-O { background: linear-gradient(135deg, #818cf8, #4f46e5); }
.bf-bar-wrap { flex: 1; height: 12px; background: #f0f0f5; border-radius: 6px; overflow: hidden; position: relative; }
.bf-bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.bf-bar-zone { position: absolute; top: 0; height: 100%; border-right: 1px dashed rgba(0,0,0,0.1); }
.bf-score-val { font-size: 14px; font-weight: 800; color: var(--text-primary); width: 42px; flex-shrink: 0; text-align: right; }
.bf-score-tag { font-size: 11px; font-weight: 600; flex-shrink: 0; padding: 4px 10px; border-radius: 10px; text-align: center; white-space: nowrap; }
.bf-score-tag.high { background: linear-gradient(135deg, #dcfce7, #bbf7d0); color: #166534; }
.bf-score-tag.mid { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400E; }
.bf-score-tag.low { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #991B1B; }

/* Big Five strengths / weaknesses section — reference layout */
.bf-sw-section { margin-top: 8px; }
.bf-sw-section + .bf-sw-section { margin-top: 28px; }
.bf-sw-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 22px; font-weight: 800; color: #111827;
  margin: 0 0 18px 2px;
  letter-spacing: -0.5px;
}
.bf-sw-title-bar { display: inline-block; width: 5px; height: 22px; border-radius: 3px; }
.bf-sw-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px 32px;
}
.bf-swi { display: flex; gap: 14px; align-items: flex-start; }
.bf-swi-icon {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: #fff; margin-top: 1px;
  box-shadow: 0 2px 6px rgba(0,0,0,.1);
  font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
}
.bf-swi-icon.bf-swi-ok { background: linear-gradient(135deg, #34d399, #059669); }
.bf-swi-icon.bf-swi-warn { background: linear-gradient(135deg, #fbbf24, #d97706); }
.bf-swi-body { flex: 1; min-width: 0; }
.bf-swi-title { font-size: 15px; font-weight: 800; color: #1F2937; margin-bottom: 5px; line-height: 1.35; }
.bf-swi-desc { font-size: 13px; color: #6B7280; line-height: 1.75; }
@media (max-width: 560px) {
  .bf-sw-grid { grid-template-columns: 1fr; gap: 16px; }
  .bf-sw-title { font-size: 20px; }
  .bf-swi-title { font-size: 14px; }
  .bf-swi-desc { font-size: 12.5px; }
}

/* DISC colored bar — clean 2-line layout */
.disc-item { margin-bottom: 16px; }
.disc-item:last-child { margin-bottom: 0; }
.disc-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.disc-item-name { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-primary); }
.disc-item-en { font-size: 12px; color: var(--text-secondary); font-weight: 400; }
.disc-item-pct { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.disc-bar-wrap { height: 12px; background: #f0f0f5; border-radius: 6px; overflow: hidden; }
.disc-bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease; }

// ============================================================
//  START TEST
// ============================================================
function startTest(testKey) {
  try {
    console.log('[DEBUG] startTest called with:', testKey);
    console.log('[DEBUG] TESTS keys:', Object.keys(TESTS));
    state.testKey = testKey;
    state.currentQ = 0;
    state.currentModule = 0;
    state.answers = {};
    state.view = 'quiz';
    state._locking = false;
    state._submitted = false;
    clearTimeout(state.autoTimer);

    // 霍兰德测试：组装三个模块的题目
    if (testKey === 'holland') {
      var test = TESTS.holland;
      var interestLen = test.interestQuestions.length;
      var abilityLen = test.abilityQuestions.length;
      test.questions = test.interestQuestions.concat(test.abilityQuestions, test.feedbackQuestions);
      test.moduleBreaks = [interestLen, interestLen + abilityLen];
      test._interestLen = interestLen;
      test._abilityLen = abilityLen;
    }

    console.log('[DEBUG] state.testKey =', state.testKey);
    console.log('[DEBUG] TESTS[state.testKey] =', TESTS[state.testKey] ? 'found' : 'NOT FOUND!');
    renderQuestion(false);
  } catch(e) {
    console.error('[DEBUG] startTest ERROR:', e.message, e.stack);
    showToast('❌ 加载失败：' + e.message);
  }
}

// ============================================================
//  RENDER QUESTION
//  animate=true: card slides in; false: appears instantly (first render)
// ============================================================
function renderQuestion(animate) {
  try {
  clearTimeout(state.autoTimer);
  var test = TESTS[state.testKey];
  console.log('[DEBUG] renderQuestion: testKey=' + state.testKey + ', test=' + (test ? test.name : 'NULL') + ', questions=' + (test ? test.questions.length : 'N/A'));
  if (!test) { showToast('❌ 未找到测评: ' + state.testKey); return; }
  var total = test.questions.length;
  var q = test.questions[state.currentQ];
  var selected = state.answers[state.currentQ];
  var progress = Math.round((state.currentQ / total) * 100);
  var body = document.getElementById('pageBody');

  // 霍兰德测试：确定当前模块
  var isHollandMulti = (state.testKey === 'holland' && test.modules);
  var currentModIdx = 0;
  var modStart = 0, modEnd = total;
  if (isHollandMulti) {
    for (var m = 0; m < test.moduleBreaks.length; m++) {
      if (state.currentQ >= test.moduleBreaks[m]) {
        currentModIdx = m + 1;
      }
    }
    state.currentModule = currentModIdx;
    modStart = currentModIdx === 0 ? 0 : test.moduleBreaks[currentModIdx - 1];
    modEnd = (currentModIdx < test.moduleBreaks.length) ? test.moduleBreaks[currentModIdx] : total;
  }

  var optsHtml = ANSWER_OPTS.map(function(t, i) {
    return '<div class="q-opt l'+i+(selected===i?' sel':'')+'" onclick="selectAnswer('+i+')">'+
      '<div class="q-label">'+t+'</div></div>';
  }).join('');

  // Dot indicators - for Holland show per-module dots, otherwise all
  var dotsHtml = '';
  if (isHollandMulti) {
    var modTotal = modEnd - modStart;
    var dotMax = Math.min(modTotal, 30); // cap at 30 visible dots
    var step = modTotal > dotMax ? Math.max(1, Math.floor(modTotal / dotMax)) : 1;
    for (var i = 0; i < modTotal; i += step) {
      var cls = 'q-dot';
      var qi = modStart + i;
      if (state.answers[qi] !== undefined && qi !== state.currentQ) cls += ' done';
      if (qi === state.currentQ) cls += ' current';
      dotsHtml += '<span class="'+cls+'" style="width:5px;height:5px;border-radius:50%;margin:0 1.5px"></span>';
    }
  } else {
    for (var i = 0; i < total; i++) {
      var cls = 'q-dot';
      if (state.answers[i] !== undefined && i !== state.currentQ) cls += ' done';
      if (i === state.currentQ) cls += ' current';
      dotsHtml += '<span class="'+cls+'"></span>';
    }
  }

  // Module indicator removed (integrated single test)
  var moduleHtml = '';

  // Card animation class
  var cardAnimClass = animate ? ' enter' : '';

  body.innerHTML =
    (moduleHtml ? moduleHtml : '') +
    '<div class="page-header">'+
      '<div class="page-title">'+test.name+'</div>'+
      '<div class="page-subtitle">'+
        '第 '+(state.currentQ+1)+' / '+total+' 题'+
      '</div>'+
    '</div>'+
    '<div class="prog-wrap">'+
      '<div class="prog-info"><span>完成进度</span><span id="progPct">'+progress+'%</span></div>'+
      '<div class="prog-bar"><div class="prog-fill" id="progFill" style="width:'+progress+'%"></div></div>'+
    '</div>'+
    '<div class="q-card'+cardAnimClass+'" id="quizCard">'+
      '<div class="q-num">Q'+(state.currentQ+1)+'</div>'+
      '<div class="q-text">'+q.q+'</div>'+
      '<div class="q-options" id="optsWrap">'+optsHtml+'</div>'+
    '</div>'+
    '<div class="q-nav-row">'+
      (state.currentQ>0 ? '<button class="btn-back" onclick="prevQ()">← 上一题</button>' : '<div></div>')+
      '<div class="q-indicator" id="dotInd">'+dotsHtml+'</div>'+
    '</div>';

  body.scrollTop = 0;

  // Clean up enter class after animation completes
  if (animate) {
    setTimeout(function() {
      var card = document.getElementById('quizCard');
      if (card) card.classList.remove('enter');
    }, 320);
  }
  } catch(e) {
    console.error('[DEBUG] renderQuestion ERROR:', e.message, e.stack);
    showToast('❌ 题目加载失败：' + e.message);
  }
}

// ============================================================
//  PROGRESSIVE UPDATE (no full re-render for small changes)
// ============================================================
function updateProgress(current, total) {
  var progress = Math.round((current / total) * 100);
  var fill = document.getElementById('progFill');
  var pct  = document.getElementById('progPct');
  if (fill) fill.style.width = progress + '%';
  if (pct)  pct.textContent = progress + '%';
}

function updateDots(total) {
  var dotInd = document.getElementById('dotInd');
  if (!dotInd) return;
  var html = '';
  for (var i = 0; i < total; i++) {
    var cls = 'q-dot';
    if (state.answers[i] !== undefined && i !== state.currentQ) cls += ' done';
    if (i === state.currentQ) cls += ' current';
    html += '<span class="'+cls+'"></span>';
  }
  dotInd.innerHTML = html;
}

// ============================================================
//  SELECT ANSWER → smooth highlight + auto-advance
// ============================================================
function selectAnswer(idx) {
  if (state._locking) return; // Prevent double-tap during transition
  clearTimeout(state.autoTimer);

  // Save answer
  state.answers[state.currentQ] = idx;

  // Instant visual highlight — no full re-render!
  var opts = document.querySelectorAll('#optsWrap .q-opt');
  opts.forEach(function(opt, i) {
    if (i === idx) opt.classList.add('sel');
    else opt.classList.remove('sel');
  });

  var test = TESTS[state.testKey];
  var total = test.questions.length;

  // Update dots: mark current as done
  var dots = document.querySelectorAll('#dotInd .q-dot');
  if (dots[state.currentQ]) {
    dots[state.currentQ].classList.remove('current');
    dots[state.currentQ].classList.add('done');
  }

  if (state.currentQ < total - 1) {
    // Auto-advance after a smooth pause
    state.autoTimer = setTimeout(function() {
      transitionNext();
    }, 350);
  } else {
    // Last question → results; lock to prevent double submission
    state._locking = true;
    state.autoTimer = setTimeout(function() {
      var card = document.getElementById('quizCard');
      if (card) { card.classList.add('exit'); }
      setTimeout(function() { calcResults(); }, 200);
    }, 350);
  }
}

// ============================================================
//  SMOOTH TRANSITION TO NEXT QUESTION
// ============================================================
function transitionNext() {
  state._locking = true;
  var card = document.getElementById('quizCard');

  if (card) {
    card.classList.add('exit');
    // Wait for exit animation, then rebuild with enter animation
    setTimeout(function() {
      state.currentQ++;
      renderQuestion(true);
      state._locking = false;
    }, 180);
  } else {
    state.currentQ++;
    renderQuestion(false);
    state._locking = false;
  }
}

// ============================================================
//  PREVIOUS QUESTION — slide in reverse
// ============================================================
function prevQ() {
  if (state._locking) return;
  clearTimeout(state.autoTimer);
  if (state.currentQ > 0) {
    state._locking = true;
    state.currentQ--;
    renderQuestion(false); // instant when going back (no animation needed)
    state._locking = false;
  }
}

// ============================================================
//  CALCULATE RESULTS
// ============================================================
function calcResults() {
  state.view = 'result';
  var test = TESTS[state.testKey];
  var scores = {};
  var counts = {};
  test.dimensions.forEach(function(d) { scores[d]=0; counts[d]=0; });

  // 霍兰德：按模块分别计分
  if (state.testKey === 'holland' && test.modules) {
    var interestLen = test._interestLen;
    var abilityLen = test._abilityLen;
    var moduleScores = { interest: {}, ability: {}, feedback: {} };
    var moduleRaws = { interest: {}, ability: {}, feedback: {} };

    function calcModule(qArr, startIdx, qCount) {
      var s = {}, c = {};
      test.dimensions.forEach(function(d) { s[d]=0; c[d]=0; });
      for (var i = 0; i < qCount; i++) {
        var qi = startIdx + i;
        var q = qArr[i];
        var rawScore = state.answers[qi] !== undefined ? state.answers[qi] : 3;
        s[q.dim] += rawScore;
        c[q.dim] += 1;
      }
      return { scores: s, counts: c };
    }

    var interestRes = calcModule(test.interestQuestions, 0, interestLen);
    var abilityRes = calcModule(test.abilityQuestions, interestLen, abilityLen);
    var feedbackRes = calcModule(test.feedbackQuestions, interestLen + abilityLen, test.feedbackQuestions.length);

    // Normalize each module to 0-100%
    ['interest','ability','feedback'].forEach(function(mod) {
      var res = mod === 'interest' ? interestRes : (mod === 'ability' ? abilityRes : feedbackRes);
      var max = {};
      test.dimensions.forEach(function(d) {
        max[d] = Math.round((res.scores[d] / (res.counts[d] * 6)) * 100);
      });
      moduleScores[mod] = max;
      moduleRaws[mod] = res.scores;
    });

    state.moduleScores = moduleScores;
    state.moduleRaws = moduleRaws;

    // 整体得分（兴趣为主，已在 scores 中）
    test.questions.forEach(function(q, i) {
      var rawScore = state.answers[i] !== undefined ? state.answers[i] : 3;
      scores[q.dim] += rawScore;
      counts[q.dim] += 1;
    });
  } else {
    test.questions.forEach(function(q, i) {
      var rawScore = state.answers[i] !== undefined ? state.answers[i] : 3;
      var pointValue = rawScore;
      if (test.reverseItems.indexOf(i) !== -1) {
        pointValue = 6 - rawScore;
      }
      scores[q.dim] += pointValue;
      counts[q.dim] += 1;
    });
  }

  // Normalize to 0-100%
  var maxScore = {};
  test.dimensions.forEach(function(d) {
    maxScore[d] = Math.round((scores[d] / (counts[d] * 6)) * 100);
  });

  state.scores = maxScore;
  state.rawScores = scores;

  // Submit to Supabase
  submitToSupabase(maxScore);

  // 同步保存到本地
  saveAssessmentResult(maxScore);

  // Unlock full report
  unlockFullReport(maxScore);
}

// ============================================================
//  BIG FIVE REPORT
// ============================================================
function renderBigFive(scores) {
  var test = TESTS.bigfive;
  var sorted = test.dimensions.map(function(d) { return {dim:d, score:scores[d]}; }).sort(function(a,b){return b.score-a.score;});
  var traitInfo = getBigFiveTraits();

  var heroDim = sorted[0].dim;
  var heroHtml = buildHero(scores, test);

  // Big Five: classic percentile bar chart
  var bfNames = {E:'外向性', A:'宜人性', C:'尽责性', N:'神经质', O:'开放性'};
  var bfZones = {E:{lo:'内向沉静',hi:'外向活跃'}, A:{lo:'理性为先',hi:'情感细腻'}, C:{lo:'灵活随性',hi:'运筹帷幄'}, N:{lo:'从容淡定',hi:'情绪敏感'}, O:{lo:'保守务实',hi:'天马行空'}};
  var bfColors = test.dimColors || {E:'#F97316', A:'#10B981', C:'#3B82F6', N:'#EC4899', O:'#6366F1'};

  var dimIcons = test.dimIcons || {E:'🎤', A:'🤝', C:'📋', N:'🧠', O:'💡'};
  var scoresHtml = test.dimensions.map(function(d){
    var s = scores[d];
    var z = bfZones[d];
    var tagCls = s >= 61 ? 'high' : (s >= 41 ? 'mid' : 'low');
    var tagText = s >= 61 ? z.hi : (s >= 41 ? '中等' : z.lo);
    return '<div class="bf-score-row">'+
      '<span class="bf-score-name"><span class="bf-score-name-icon bf-'+d+'">'+dimIcons[d]+'</span>'+bfNames[d]+'</span>'+
      '<div class="bf-bar-wrap">'+
        '<div class="bf-bar-fill" style="width:'+s+'%;background:'+bfColors[d]+'"></div>'+
      '</div>'+
      '<span class="bf-score-val">'+s+'%</span>'+
      '<span class="bf-score-tag '+tagCls+'">'+tagText+'</span>'+
    '</div>';
  }).join('');

  // 强项/短板 - 取最高3个维度的强项（各2条）& 最低3个维度的短板（各2条）
  var allStrengths = [];
  var allWeaknesses = [];

  // 强项：按得分从高到低取前3维度，每维度2条
  for (var si = 0; si < 3 && si < sorted.length; si++) {
    var dInfo = traitInfo[sorted[si].dim];
    var isHighS = sorted[si].score >= 50;
    var sList = isHighS ? dInfo.highStrengths : dInfo.lowStrengths;
    allStrengths.push(sList[0], sList[1]);
  }
  // 短板：按得分从低到高取前3维度，每维度2条
  var ascSorted = sorted.slice().sort(function(a,b){return a.score-b.score});
  for (var wi = 0; wi < 3 && wi < ascSorted.length; wi++) {
    var wInfo = traitInfo[ascSorted[wi].dim];
    var isHighW = ascSorted[wi].score >= 50;
    var wList = isHighW ? wInfo.highWeaknesses : wInfo.lowWeaknesses;
    allWeaknesses.push(wList[0], wList[1]);
  }

  function renderStrengthItem(item) {
    return '<div class="bf-swi">'+
      '<div class="bf-swi-icon bf-swi-ok">✓</div>'+
      '<div class="bf-swi-body">'+
        '<div class="bf-swi-title">'+item.title+'</div>'+
        '<div class="bf-swi-desc">'+item.desc+'</div>'+
      '</div>'+
    '</div>';
  }
  function renderWeaknessItem(item) {
    return '<div class="bf-swi">'+
      '<div class="bf-swi-icon bf-swi-warn">!</div>'+
      '<div class="bf-swi-body">'+
        '<div class="bf-swi-title">'+item.title+'</div>'+
        '<div class="bf-swi-desc">'+item.desc+'</div>'+
      '</div>'+
    '</div>';
  }

  var strengthsGrid = '<div class="bf-sw-grid">'+allStrengths.map(renderStrengthItem).join('')+'</div>';
  var weaknessesGrid = '<div class="bf-sw-grid">'+allWeaknesses.map(renderWeaknessItem).join('')+'</div>';

  document.getElementById('pageBody').innerHTML =
    '<div class="page-header"><div class="page-title">大五人格报告</div><div class="page-subtitle">OCEAN 五维人格分析</div></div>'+
    '<div class="report-export-wrap" id="reportExportWrap">'+
    buildReportInfoBar()+
    heroHtml+
    '<div class="score-card"><div class="score-title">人格特质特征</div>'+scoresHtml+'</div>'+
    '<div class="bf-sw-section">'+
      '<div class="bf-sw-title"><span class="bf-sw-title-bar" style="background:#10B981"></span><span>你的强项</span></div>'+
      strengthsGrid+
    '</div>'+
    '<div class="bf-sw-section">'+
      '<div class="bf-sw-title"><span class="bf-sw-title-bar" style="background:#F59E0B"></span><span>你的短板</span></div>'+
      weaknessesGrid+
    '</div>'+
    '</div>'+
    buildExportBtnRow();
}

// ============================================================
//  HOLLAND REPORT
// ============================================================
function renderHolland(scores) {
  var test = TESTS.holland;
  var raw = state.rawScores || {};
  var sorted = test.dimensions.map(function(d){return {dim:d, score:scores[d], raw: raw[d] || 0};}).sort(function(a,b){return b.score-a.score;});
  var top3 = sorted.slice(0,3);
  var code = top3.map(function(e){return e.dim;}).join('');
  state.lastHollandCode = code; // 保存当前霍兰德代码，供规划方案使用
  var typeNames = getHollandTypeNames();
  var typeName = typeNames[code];
  if (!typeName) {
    var dims = top3.map(function(d){return test.dimNames[d.dim].split(' ')[0];});
    typeName = dims[0] + '·' + dims[1] + '·' + dims[2];
  }

  var analysisText = getHollandAnalysis(code, sorted);
  var dims = test.dimensions;

  // ========== 综合打分表（兴趣 / 能力 / 回馈 / 总分 合一） ==========
  var moduleRaws = state.moduleRaws || {};

    interest: moduleRaws.interest || {},
    ability: moduleRaws.ability || {},
    feedback: moduleRaws.feedback || {}
  };

  dims.forEach(function(d) {
    totalByDim[d] = (rawByMod.interest[d]||0) + (rawByMod.ability[d]||0) + (rawByMod.feedback[d]||0);
  });
  if (!state.moduleRaws) {

  var headerCells = dims.map(function(d) {

    '<div class="page-header"><div class="page-title">霍兰德报告</div><div class="page-subtitle">RIASEC 职业兴趣 · 能力 · 回馈综合打分</div></div>'+

// 根据霍兰德三码生成规划方案
function generateHollandPlan(code, top3) {
  var dimNames = {
    R: '现实型', I: '研究型', A: '艺术型',
    S: '社会型', E: '企业型', C: '常规型'
  };
  var dimCareerMap = {
    R: ['技术/工程类', '操作/运维类', '户外/体育类'],
    I: ['研究/分析类', '数据/研发类', '学术/科研类'],
    A: ['设计/创意类', '文案/媒体类', '艺术/表演类'],
    S: ['教育/培训类', '咨询/服务类', '社工/护理类'],
    E: ['管理/销售类', '创业/市场类', '领导/协调类'],
    C: ['行政/财务类', '文档/审计类', '流程/质控类']
  };
  var dimActions = {
    R: ['参加一次实操实训或技能工作坊，积累动手能力',
        '考取与你目标职业相关的 1 项技能证书',
        '使用专业工具完成一个小项目并记录过程'],
    I: ['精读 1 本专业领域论文或行业研究报告',
        '尝试独立完成一个数据分析/实验探究类小课题',
        '学习一种研究或分析方法论（如 SPSS、Python 数据分析等）'],
    A: ['整理并更新个人作品集，展示你的创意成果',
        '参加一次创意工作坊、设计比赛或艺术展览',
        '学习 1 个相关创作工具（如 PS、剪辑、写作等）'],
    S: ['参与志愿服务或社会实践，锻炼沟通与助人能力',
        '加入社团或学生组织，担任一次活动策划或主持人',
        '与 1 位目标职业前辈进行深度访谈或职业咨询'],
    E: ['参加一次商业模拟、创业比赛或路演活动',
        '主动牵头完成一个小组项目，锻炼团队领导力',
        '学习项目管理、市场营销或财务基础中的 1 项'],
    C: ['建立个人学习与职业档案，养成系统记录习惯',
        '熟练使用办公软件，完成一次数据整理或流程优化任务',
        '参加行政、财务或办公自动化相关培训']
  };
  var commonSteps = [
    '调研 2-3 个目标职业的入职要求、薪资路径与行业趋势',
    '用 SMART 原则把本方案细化为可执行的周计划'
  ];
  var d1 = top3[0].dim, d2 = top3[1].dim, d3 = top3[2].dim;
  var title = code + ' 职业探索与发展计划';
  var careerTypes = (dimCareerMap[d1] || []).slice(0, 2).join('、') + '，兼顾 ' + (dimCareerMap[d2] || []).slice(0, 1).join('') + '与' + (dimCareerMap[d3] || []).slice(0, 1).join('') + '方向';
  var desc = '你的核心优势偏向「' + dimNames[d1] + '」，同时兼具「' + dimNames[d2] + '」与「' + dimNames[d3] + '」特质。推荐优先关注：' + careerTypes + '。';
  var steps = [];
  // 为 top3 各取 2 个行动建议
  [d1, d2, d3].forEach(function(d) {
    var actions = dimActions[d] || [];
    steps.push(actions[0]);
    if (actions[1]) steps.push(actions[1]);
  });
  // 加入通用步骤
  steps = steps.concat(commonSteps);
  return { title: title, desc: desc, cat: '技能提升', steps: steps };
}

// 把当前规划方案加入目标列表
function addPlanToGoals() {
  var plan = state.currentPlan || generateHollandPlan(state.lastHollandCode || 'RIASEC', []);
  if (!plan || !plan.steps) { showToast('暂无可用方案'); return; }

  var STORAGE_KEY = 'career_goals_v2';
  var goals = [];
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) goals = JSON.parse(raw);
  } catch(e) {}
  if (!Array.isArray(goals)) goals = [];

  var d = new Date();
  d.setDate(d.getDate() + 30);
  var deadline = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

  var goal = {
    id: Date.now(),
    title: plan.title,
    desc: plan.desc,
    cat: plan.cat || '技能提升',
    color: 'linear-gradient(90deg,#1d4ed8,#60a5fa)',
    deadline: deadline,
    done: false,
    steps: plan.steps.map(function(s) { return {text: s, done: false}; }),
    progress: 0
  };
  goals.push(goal);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(goals));
    showToast('已加入目标，即将跳转…');
    setTimeout(function() { window.location.href = 'goals.html'; }, 900);
  } catch(e) {
    showToast('保存失败：' + e.message);
  }
}

function renderStrength(scores) {
  var test = TESTS.strength;
  // scores: each dim = sum of 4 questions (range 4-24)
  var sorted = test.dimensions.map(function(d){return {dim:d,score:scores[d]||0};}).sort(function(a,b){return b.score-a.score;});
  var top5 = sorted.slice(0, 5);

  // Find dominant domain
  var domains = ['行动执行','表达影响','关系协同','认知探索'];
  var dColors = {'行动执行':'#F59E0B','表达影响':'#3B82F6','关系协同':'#10B981','认知探索':'#8B5CF6'};
  var dIcon = {'行动执行':'⚡','表达影响':'🎤','关系协同':'🤝','认知探索':'💡'};
  var domainAvgs = domains.map(function(dom){
    var themes = test.domains[dom].themes;
    var total = themes.reduce(function(s,d){return s+(scores[d]||0);}, 0);
    return {name:dom, avg: total / themes.length, themes: themes};
  });
  domainAvgs.sort(function(a,b){return b.avg - a.avg;});
  var dominantDomain = domainAvgs[0];

  // Custom Hero (Clifton-style: "您的 XX 才干主题最为突出")
  var strengthHeroHtml =
    '<div class="st-clifton-hero">'+
      '<div class="st-clifton-hero-label">您的</div>'+

      '<div class="st-clifton-hero-sub">领域最突出</div>'+
      '<div class="st-clifton-hero-pills">'+
        domains.map(function(dom){
          var active = dom === dominantDomain.name;
          var c = dColors[dom];
          return '<span class="hl-hero-pill" style="background:'+(active?c:c+'20')+';color:'+(active?'#fff':c)+';border:1px solid '+c+'">'+
            '<span class="hl-hero-pill-letter" style="background:'+(active?'#fff':c)+';color:'+(active?c:'#fff')+'">'+dIcon[dom]+'</span>'+dom+
          '</span>';
        }).join('')+
      '</div>'+
      '<div class="st-clifton-hero-top">您最常使用的前5个优势主题：'+top5.map(function(e){return test.dimNames[e.dim];}).join(' · ')+'</div>'+
    '</div>';

  // Description block
  var descHtml = '<div class="score-card" style="margin-bottom:14px">'+
    '<div style="font-size:13px;color:var(--text-secondary);line-height:1.8">此图表显示了您特有的优势潜能 34 个主题才干在四大领域中的相对分布。这些类别是一个非常好的起点，您可以查看自己最有可能在哪些方面表现出色，以及如何为团队做出最佳贡献。<br>请参阅下面的图表，了解有关您的优势在各领域分布情况的更多详细信息。</div>'+
  '</div>';

  // 4-domain stacked bar (Clifton-style)
  var maxScore = 24;
  var totalAll = domainAvgs.reduce(function(s,d){return s+d.avg;}, 0);
  var stBarHtml = '<div class="st-domain-bar">'+
    domainAvgs.map(function(d){
      var pct = (d.avg / maxScore) * 100;
      return '<div class="st-domain-seg" style="flex:'+pct+';background:'+dColors[d.name]+'">'+d.avg.toFixed(1)+'</div>';
    }).join('')+
  '</div>'+
  '<div class="st-domain-labels" style="grid-template-columns: repeat(4, 1fr)">'+
    domainAvgs.map(function(d){
      return '<div class="st-domain-label"><span class="st-domain-label-dot" style="background:'+dColors[d.name]+'"></span>'+d.name+'</div>';
    }).join('')+
  '</div>';

  // Top 5 with description (richer card)
  var top5Html = top5.map(function(e, i){
    var color = test.dimColors[e.dim];
    var dom = domains.find(function(d){return test.domains[d].themes.indexOf(e.dim)!==-1;})||'';
    var oneLiner = getStrengthOneLiner(e.dim);
    return '<div class="st-top-card" style="background:'+color+'10;border-left-color:'+color+'">'+
      '<div class="st-top-rank" style="background:'+color+'">'+(i+1)+'</div>'+
      '<div class="st-top-info">'+
        '<div class="st-top-name" style="color:'+color+'">'+test.dimNames[e.dim]+' <span style="font-size:11px;color:var(--text-secondary);font-weight:400;margin-left:6px">· '+dom+'</span></div>'+
        '<div class="st-top-desc">'+oneLiner+'</div>'+
      '</div>'+
      '<div class="st-top-score" style="color:'+color+'">'+e.score+'/24</div>'+
    '</div>';
  }).join('');

  // Domain averages as compact
  var domainHtml = domains.map(function(dom){
    var themes = test.domains[dom].themes;
    var total = themes.reduce(function(s,d){return s+(scores[d]||0);}, 0);
    var avg = Math.round(total / themes.length);
    var pct = Math.round((avg / 24) * 100);
    return '<div class="disc-item"><div class="disc-item-header">'+
      '<span class="disc-item-name"><span class="disc-dot-sm" style="background:'+dColors[dom]+'"></span><b>'+dom+'</b></span>'+
      '<span class="disc-item-pct">均分 '+avg+'/24</span></div>'+
      '<div class="disc-bar-wrap"><div class="disc-bar-fill" style="width:'+pct+'%;background:'+dColors[dom]+'"></div></div></div>';
  }).join('');

  // 34-theme grid (4 columns × 1 per domain, sorted within domain)
  var rankMap = {};
  sorted.forEach(function(e, i){ rankMap[e.dim] = i + 1; });
  var stGridHtml = '<div class="st-grid">'+
    domains.map(function(dom){
      var themes = test.domains[dom].themes
        .map(function(d){return {dim:d, score:scores[d]||0};})

        return '<div class="st-grid-cell '+lvl+'" style="'+(isTop5?'background:'+color:'')+'">'+
          '<div class="st-grid-cell-num">'+rank+'</div>'+
          '<div class="st-grid-cell-name">'+name+'</div>'+
        '</div>';
      }).join('');
      return '<div class="st-grid-col">'+
        '<div class="st-grid-col-head" style="background:'+dColors[dom]+'">'+dIcon[dom]+' '+dom+'</div>'+
        cells+
      '</div>';
    }).join('')+
  '</div>';

  document.getElementById('pageBody').innerHTML =
    '<div class="page-header"><div class="page-title">优势潜能报告</div><div class="page-subtitle">CSSPI-34 · 34主题优势探索</div></div>'+
    '<div class="report-export-wrap" id="reportExportWrap">'+
    buildReportInfoBar()+
    strengthHeroHtml+
    descHtml+
    '<div class="score-card" style="margin-bottom:14px"><div class="score-title">📊 您的优势在各领域的分布情况</div>'+stBarHtml+'</div>'+
    '<div class="score-card" style="margin-bottom:14px"><div class="score-title">✨ 当前最常使用的优势线索（Top 5）</div>'+top5Html+'</div>'+
    '<div class="score-card" style="margin-bottom:14px"><div class="score-title">📈 四大领域平均得分</div>'+domainHtml+'</div>'+
    '<div class="score-card" style="margin-bottom:14px"><div class="score-title">🔍 全部34主题才干矩阵</div>'+stGridHtml+'</div>'+
    '</div>'+
    buildExportBtnRow();
}

  // 3. 全宽场景人物图片

    '<div class="mbti-scene-img-wrap">'+
      '<img class="mbti-scene-img" src="'+photoUrl+'" alt="'+info.name+' 场景">'+
    '</div>';

  // 4. 维度条：截图风格（单色填充+白圆点+5个维度）
  // 身份特征(A-T)：基于已有维度推算（N/T/P高→Turbulent高）
  var identityPct = Math.round(
    ((scores.SN < 50 ? (100-scores.SN)*0.3 : scores.SN*0.1) +
     (scores.TF >= 50 ? scores.TF*0.3 : (100-scores.TF)*0.1) +
     (scores.JP < 50 ? (100-scores.JP)*0.3 : scores.JP*0.1)) * 1.1
  );
  identityPct = Math.max(35, Math.min(75, identityPct)); // 35-75范围
  var mbtiDims = [
    {key:'EI', label:'能量', leftText:'外向', rightText:'内向', color:'#3B82F6'},
    {key:'SN', label:'心智', leftText:'感觉', rightText:'直觉', color:'#F59E0B'},
    {key:'TF', label:'天性', leftText:'思维', rightText:'情感', color:'#10B981'},
    {key:'JP', label:'应对方式', leftText:'判断', rightText:'感知', color:'#8B5CF6'},
    {_pct:identityPct, label:'身份特征', leftText:'自信果断', rightText:'情绪易波动', color:'#EF4444'}
  ];
  var dimsHtml = mbtiDims.map(function(d){
    var s, isLeft;
    if (d._pct !== undefined) {
      s = d._pct; isLeft = s < 50; // 身份特征：<50=Assertive(左), ≥50=Turbulent(右)
    } else {
      s = Math.round(scores[d.key]); isLeft = s >= 50;
    }
    var activeText = isLeft ? d.leftText : d.rightText;
    return '<div class="mbti-dim-row">'+
      '<div class="mbti-dim-header">'+
        '<span class="mbti-dim-label" style="color:'+d.color+'">'+d.label+'</span>'+
        '<span class="mbti-dim-pct" style="color:'+d.color+'">'+s+'% '+activeText+'</span>'+
        '<span class="mbti-dim-help">?</span>'+
      '</div>'+
      '<div class="mbti-dim-track-wrap">'+
        '<div class="mbti-dim-track">'+
          '<div class="mbti-dim-fill" style="width:'+s+'%;background:'+d.color+'"></div>'+
        '</div>'+
        '<div class="mbti-dim-dot" style="left:'+s+'%;border-color:'+d.color+'"></div>'+
      '</div>'+
      '<div class="mbti-dim-footer">'+
        '<span>'+d.leftText+'</span>'+
        '<span>'+d.rightText+'</span>'+
      '</div>'+
    '</div>';
  }).join('');

  var section1Html =
    '<div class="mbti-section-title"><div class="mbti-section-num">1</div><div>人格特征</div></div>'+
    '<div class="mbti-dim-card">'+dimsHtml+'</div>';

  // 5. 人格画像
  var section2Html =
    '<div class="mbti-section-title"><div class="mbti-section-num">2</div><div>人格画像</div></div>'+
    '<div class="mbti-desc-card">'+
      '<p>作为一名 '+info.name+'，你的核心特质包括 <b>'+info.traits.join('、')+'</b>。'+info.desc+'</p>'+
      '<p>'+info.relationships+'</p>'+
      '<p>'+info.growth+'</p>'+
    '</div>';

  // 6. 个人成长
  var section3Html =
    '<div class="mbti-section-title"><div class="mbti-section-num">3</div><div>个人成长</div></div>'+
    '<div class="mbti-desc-card">'+
      '<p>'+info.growth+'</p>'+
      '<p>尽管你在 '+info.traits.join('、')+' 上展现出独特优势，也要注意在关系与目标之间找到平衡。持续探索自我，会让你在成长之路上走得更稳、更远。</p>'+
    '</div>';

  var allHtml = heroHtml + introHtml + sceneHtml + section1Html + section2Html + section3Html;

  document.getElementById('pageBody').innerHTML =
    '<div class="page-header"><div class="page-title">MBTI报告</div><div class="page-subtitle">16种人格 · '+info.name+'</div></div>'+
    '<div class="report-export-wrap mbti-report mbti-report-'+group+'" id="reportExportWrap">'+
    buildReportInfoBar()+
    allHtml +
    '</div>'+
    buildExportBtnRow();
}

//  UTILITY
// ============================================================
function goBack() {
  clearTimeout(state.autoTimer);
  if (state.chartInstance) { state.chartInstance.destroy(); state.chartInstance = null; }
  state.view = 'select';
  state.answers = {};
  state.currentQ = 0;
  renderSelect();
  document.getElementById('pageBody').scrollTop = 0;
}

function restartTest() {
  clearTimeout(state.autoTimer);
  if (state.chartInstance) { state.chartInstance.destroy(); state.chartInstance = null; }
  state.answers = {};
  state.currentQ = 0;
  state.view = 'quiz';
  state._locking = false;
  state._submitted = false;  // 重置提交标记
  renderQuestion(false);
  document.getElementById('pageBody').scrollTop = 0;
}

function showToast(msg) {
  var el = document.getElementById('toastEl');
  el.textContent = msg;
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(window._tt);
  window._tt = setTimeout(function(){el.style.transform='translateX(-50%) translateY(-120px)';},2000);
}

// ============================================================
//  EXPORT REPORT AS IMAGE
// ============================================================
function exportReport() {
  // If not yet verified, show verification overlay first
  if (!state._schoolVerified) {
    renderExportVerifyOverlay();
    return;
  }

  var btn = document.getElementById('exportBtn');
  if (btn) { btn.disabled = true; btn.textContent = '正在生成...'; }

  var target = document.getElementById('reportExportWrap') || document.getElementById('pageBody');
  if (!target) return;

  // Temporarily hide buttons during capture
  var btnRow = target.querySelector('.btn-row');
  var btnRowDisplay = btnRow ? btnRow.style.display : '';
  if (btnRow) btnRow.style.display = 'none';

  html2canvas(target, {
    scale: 2,
    backgroundColor: '#F0F4FF',
    useCORS: true,
    logging: false,
    scrollY: 0,
    windowWidth: 390
  }).then(function(canvas) {
    // Restore buttons
    if (btnRow) btnRow.style.display = btnRowDisplay;

    // Download as PNG
    var testName = TESTS[state.testKey] ? TESTS[state.testKey].name : '测评';
    var studentSchool = (state.studentInfo && state.studentInfo.school) || '';
    var fileName = testName + '_' + (studentSchool || '报告') + '_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '') + '.png';

    var link = document.createElement('a');
    link.download = fileName;
    link.href = canvas.toDataURL('image/png');
    link.click();

    if (btn) { btn.disabled = false; btn.textContent = '导出报告'; }
    showToast('✅ 报告已导出！');
  }).catch(function(err) {
    console.error('Export failed:', err);
    if (btnRow) btnRow.style.display = btnRowDisplay;
    if (btn) { btn.disabled = false; btn.textContent = '导出报告'; }
    showToast('❌ 导出失败，请重试');
  });
}

function closeVerifyOverlay() {
  var overlay = document.getElementById('exportVerifyOverlay');
  if (overlay) overlay.remove();
}

function doExportVerify() {
  var input = document.getElementById('exportSchoolInput');
  var errorEl = document.getElementById('exportVerifyError');
  var schoolName = (input.value || '').trim();

  if (!schoolName) {
    errorEl.textContent = '❌ 请输入学校名称';
    input.classList.add('error');
    input.focus();
    setTimeout(function() { input.classList.remove('error'); }, 500);
    return;
  }

  if (typeof verifySchool === 'function' && verifySchool(schoolName)) {
    // Store verified school info
    state._schoolVerified = true;
    if (!state.studentInfo) state.studentInfo = {};
    state.studentInfo.school = schoolName;

    // Close overlay with animation
    var card = document.getElementById('exportVerifyOverlay');
    if (card) {
      card.style.transition = 'opacity 0.35s ease';
      card.style.opacity = '0';
      setTimeout(function() {
        closeVerifyOverlay();
        // Now proceed with actual export
        exportReport();
      }, 350);
    }
  } else {
    errorEl.textContent = '❌ 该学校不在本校名单中，请确认学校名称或联系老师';
    input.classList.add('error');
    input.focus();
    input.select();
    setTimeout(function() { input.classList.remove('error'); }, 500);
  }
}

function renderSchoolGate() {

function verifySchoolCode() {
  var input = document.getElementById('schoolVerifyInput');
  var errorEl = document.getElementById('inviteError');
  var schoolName = (input.value || '').trim();

  if (!schoolName) {
    errorEl.textContent = '❌ 请输入学校名称';
    input.classList.add('error');
    input.focus();
    setTimeout(function() { input.classList.remove('error'); }, 500);
    return;
  }

  if (typeof verifySchool === 'function' && verifySchool(schoolName)) {
    // Ensure studentInfo exists even if user skipped info form
    if (!state.studentInfo) state.studentInfo = {};
    state.studentInfo.school = schoolName;
    state._schoolVerified = true;  // Skip export verification later
    // Also try to restore from localStorage if missing other fields
    try {
      var saved = localStorage.getItem('assessment_student_info');
      if (saved) {
        var parsed = JSON.parse(saved);
        state.studentInfo.name = state.studentInfo.name || parsed.name || '';
        state.studentInfo.studentId = state.studentInfo.studentId || parsed.studentId || '';
        state.studentInfo.className = state.studentInfo.className || parsed.className || '';
      }
    } catch(e) {}
    // Retry submission now that we have student info
    if (state.scores) submitToSupabase(state.scores);
    // Fade out the gate
    var card = document.getElementById('inviteCard');
    if (card) {
      card.style.transition = 'all 0.4s ease';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.95)';
    }
    setTimeout(function() {
      unlockFullReport(state.scores);
    }, 400);
  } else {
    errorEl.textContent = '❌ 该学校不在本校名单中，请确认学校名称或联系老师';
    input.classList.add('error');
    input.focus();
    input.select();
    setTimeout(function() { input.classList.remove('error'); }, 500);
  }
}

      '</div>'+

  }).join('');
}

// ============================================================
//  HOLLAND ANALYSIS TEXT
// ============================================================
function getHollandAnalysis(code, sorted) {
  var test = TESTS.holland;
  var top3 = sorted.slice(0,3);
  var typeNames = getHollandTypeNames();
  var typeName = typeNames[code] || '综合型';

  var dimDescs = {
    R: '动手能力强，偏好使用工具和机械',
    I: '善于思考分析，偏好研究和探索',
    A: '富有创意想象，偏好艺术和表达',
    S: '乐于帮助他人，偏好服务和沟通',
    E: '具有领导才能，偏好管理和说服',
    C: '注重规范细节，偏好数据和事务'
  };

  var intro = '你的霍兰德职业兴趣代码为 <b>' + code + '</b>（' + typeName + '）。';

  var top = top3[0], second = top3[1], third = top3[2];
  var d1 = test.dimNames[top.dim].split(' ')[0];
  var d2 = test.dimNames[second.dim].split(' ')[0];
  var d3 = test.dimNames[third.dim].split(' ')[0];

  var analysis =
    '你最突出的维度是 <b>' + d1 + '（' + top.dim + '）</b>，得分 ' + top.score + '%，说明' + dimDescs[top.dim] + '。' +
    '其次是 <b>' + d2 + '（' + second.dim + '）</b>，得分 ' + second.score + '%，反映你' + dimDescs[second.dim].replace('偏好','同时具备').replace('善于','同时具备') + '。';

  if (third.score >= 40) {
    analysis += '第三维度 <b>' + d3 + '（' + third.dim + '）</b>也有一定倾向，说明' + dimDescs[third.dim].replace('偏好','在某些场景下也') + '。';
  }

  analysis += '<br><br><b>适合方向：</b>你的三码组合暗示你适合从事与 "' + d1 + '、' + d2 + '、' + d3 + '" 相关的职业领域，可重点考虑融合这些特质的工作。';

  return intro + '<br><br>' + analysis;
}

function unlockFullReport(scores) {
  switch (state.testKey) {
    case 'bigfive': renderBigFive(scores); break;
    case 'holland': renderHolland(scores); break;
    case 'strength': renderStrength(scores); break;
    case 'mbti': renderMbti(scores); break;
  }
  document.getElementById('pageBody').scrollTop = 0;
  showToast('✅ 完整报告已解锁！');
}

}

function getMbtiGroup(type) {
  if (/^(INTJ|INTP|ENTJ|ENTP)$/.test(type)) return 'analysts';
  if (/^(INFJ|INFP|ENFJ|ENFP)$/.test(type)) return 'diplomats';
  if (/^(ISTJ|ISFJ|ESTJ|ESFJ)$/.test(type)) return 'sentinels';
  if (/^(ISTP|ISFP|ESTP|ESFP)$/.test(type)) return 'explorers';
  return 'diplomats';
}
function getMbtiGroupName(group) {
  return {analysts:'分析家', diplomats:'外交家', sentinels:'守护者', explorers:'探险家'}[group] || '';
}
function getMbtiGroupColor(group) {
  return {analysts:'#5B5BC5', diplomats:'#4DAB6E', sentinels:'#4A90A4', explorers:'#E0A94E'}[group] || '#4DAB6E';
}
function getMbtiPhotoUrl(type) {
  return 'assets/mbti/' + type + '.jpg';
}

// ============================================================
//  SAVE RESULT TO LOCAL STORAGE (for "我的" page)
// ============================================================
function saveAssessmentResult(scores) {
  try {
    var test = TESTS[state.testKey];
    var now = new Date().toISOString();
    var sorted = test.dimensions.map(function(d){return {dim:d,score:scores[d]};}).sort(function(a,b){return b.score-a.score;});
    var payload = { type: state.testKey, name: test.name, completedAt: now, scores: scores };

    if (state.testKey === 'holland') {
      payload.code = sorted.slice(0,3).map(function(e){return e.dim;}).join('');
      var typeNames = getHollandTypeNames();
      payload.summary = typeNames[payload.code];
      if (!payload.summary) {
        var dims = sorted.slice(0,3).map(function(e){return test.dimNames[e.dim].split(' ')[0];});
        payload.summary = dims[0] + '·' + dims[1] + '·' + dims[2] + '型';
      }
      // 保存三模块分数
      if (state.moduleScores) {
        payload.moduleScores = state.moduleScores;
        payload.moduleRaws = state.moduleRaws;
      }
      localStorage.setItem('holland_result', JSON.stringify(payload));
    } else if (state.testKey === 'mbti') {
      payload.type = (scores.EI>=50?'E':'I') + (scores.SN>=50?'S':'N') + (scores.TF>=50?'T':'F') + (scores.JP>=50?'J':'P');
      payload.summary = getMbtiInfo(payload.type).name;
      localStorage.setItem('mbti_result', JSON.stringify(payload));
    } else if (state.testKey === 'strength') {
      payload.type = sorted[0].dim;
      payload.summary = test.dimNames[sorted[0].dim];
      localStorage.setItem('strength_result', JSON.stringify(payload));
    } else if (state.testKey === 'bigfive') {
      payload.summary = test.dimNames[sorted[0].dim];
      localStorage.setItem('bigfive_result', JSON.stringify(payload));
    }
  } catch(e) { console.warn('saveAssessmentResult failed', e); }
}

// ============================================================
//  SUPABASE DATA SUBMISSION (uses config.js saveSubmission)
// ============================================================
function submitToSupabase(scores) {
  if (!state.studentInfo) return;
  // 防止重复提交（同一套测试只提交一次）
  if (state._submitted) { console.log('[submitToSupabase] 已提交，跳过重复'); return; }
  state._submitted = true;
  
  if (typeof saveSubmission !== 'function') {
    console.warn('saveSubmission 函数未加载，跳过提交');
    showToast('⚠️ 配置未加载，结果仅保存在本地');
    return;
  }
  var test = TESTS[state.testKey];

  // Build a result code/summary based on test type
  var resultCode = '';
  var resultSummary = '';
  var sorted = test.dimensions.map(function(d){return {dim:d,score:scores[d]};}).sort(function(a,b){return b.score-a.score;});

  if (state.testKey === 'holland') {
    resultCode = sorted.slice(0,3).map(function(e){return e.dim;}).join('');
    var typeNames = getHollandTypeNames();
    resultSummary = typeNames[resultCode];
    if (!resultSummary) {
      var dims = sorted.slice(0,3).map(function(e){return test.dimNames[e.dim].split(' ')[0];});
      resultSummary = dims[0] + '·' + dims[1] + '·' + dims[2] + '型';
    }
  } else if (state.testKey === 'mbti') {
    resultCode = (scores.EI>=50?'E':'I') + (scores.SN>=50?'S':'N') + (scores.TF>=50?'T':'F') + (scores.JP>=50?'J':'P');
    var info = getMbtiInfo(resultCode);
    resultSummary = info.name;
  } else if (state.testKey === 'strength') {
    resultCode = sorted[0].dim;
    resultSummary = test.dimNames[sorted[0].dim];
  } else {
    resultCode = sorted[0].dim;
    resultSummary = test.dimNames[sorted[0].dim];
  }

  var si = state.studentInfo || {};
  var payload = {
    name: si.name || '',
    school: si.school || '',
    student_id: si.studentId || '',
    class_name: si.className || '',
    test_type: state.testKey,
    test_name: test.name,
    answers: state.answers,
    scores: scores,
    result_code: resultCode,
    result_summary: resultSummary
  };

  // 霍兰德：三模块分数合并到 scores 中（DB 无独立列）
  if (state.testKey === 'holland' && state.moduleScores) {
    payload.scores = Object.assign({}, scores, {
      _module_scores: state.moduleScores,
      _module_raws: state.moduleRaws
    });
  }

  // 如果 db 未初始化，尝试重新初始化（最多尝试 3 次，每次间隔 500ms）
  if (typeof isDbReady === 'function' && !isDbReady() && typeof initSupabase === 'function') {
    for (var retry = 0; retry < 3; retry++) {
      if (initSupabase()) break;
    }
    if (!isDbReady()) {
      console.warn('[submitToSupabase] Supabase 仍未就绪，将降级到本地存储');
    }
  }

  saveSubmission(payload).then(function(result) {
    if (result && result.savedToCloud) {
      console.log('✅ 测评结果已提交给老师');
      showToast('✅ 测评结果已同步到教师端');
    } else {
      console.warn('测评结果已保存到本地，未同步到云端');
      showToast('⚠️ 结果已保存本地，但未同步到云端，请检查网络');
    }
  }).catch(function(err) {
    console.error('提交失败(不影响查看结果):', err);
    // 打印更多诊断信息
    console.error('[诊断] error.code:', err.code, 'error.message:', err.message);
    console.error('[诊断] db状态:', typeof isDbReady === 'function' ? (isDbReady() ? '已连接' : '未连接') : '未知');
    console.error('[诊断] 测试类型:', state.testKey);
    showToast('❌ 同步失败：' + (err.message || '请检查网络'));
  });
}

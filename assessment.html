<style>
:root {
  --primary: #6366f1;
  --primary-dark: #4338ca;
  --primary-light: #EEF0FF;
  --accent: #818cf8;
  --bg: #F0F4FF;
  --card: #FFFFFF;
  --text-primary: #1a1a2e;
  --text-secondary: #7C8594;
  --text-light: #B0B8C8;
  --border: #E8ECF2;
  --radius-sm: 14px;
  --radius-md: 20px;
  --radius-lg: 24px;
  --green: #10B981;
  --orange: #F59E0B;
  --red: #EF4444;
  --blue: #3B82F6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 16px;
  -webkit-font-smoothing: antialiased;
}
.phone {
  width: 390px; height: 844px;
  background: var(--bg);
  border-radius: 42px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(99,102,241,0.12), 0 0 0 1px rgba(99,102,241,0.08);
  display: flex; flex-direction: column;
}
.page-body {
  flex: 1; overflow-y: auto; padding: 8px 16px 12px;
  display: flex; flex-direction: column; gap: 0;
}
.page-body::-webkit-scrollbar { width: 0; }

/* Header */
.page-header { text-align: center; padding: 6px 0 4px; }
.page-title { font-size: 18px; font-weight: 800; color: var(--text-primary); }
.page-subtitle { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

/* Progress */
.prog-wrap { margin-bottom: 2px; }
.prog-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.prog-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 3px; transition: width 0.4s; }

/* ====== SELECTION SCREEN ====== */
.select-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
  padding: 4px 0;
}
.select-wrap .test-card {
  flex: 0 0 auto;
  min-height: 0;
  padding: 10px 14px;
  gap: 10px;
  align-items: flex-start;
}
.test-card {
  background: var(--card); border-radius: var(--radius-md);
  padding: 16px 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  cursor: pointer; transition: all 0.2s; display: flex; gap: 14px;
  border: 2px solid transparent; align-items: flex-start;
}
.test-card:active { transform: scale(0.97); }
.test-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(99,102,241,0.12); }
.select-wrap .test-icon {
  width: 44px; height: 44px; border-radius: 12px; font-size: 22px;
  margin-top: 2px;
}
.test-icon {
  width: 50px; height: 50px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.select-wrap .test-info { justify-content: flex-start; min-height: 0; }
.test-info { flex: 1; display: flex; flex-direction: column; }
.select-wrap .test-name { font-size: 16px; margin-bottom: 3px; }
.test-name { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
.select-wrap .test-quick { font-size: 12px; margin-bottom: 3px; }
.test-quick { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.select-wrap .test-desc {
  font-size: 12px; line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.test-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.select-wrap .test-meta { font-size: 11px; margin-top: 4px; padding-top: 0; }
.test-meta { font-size: 12px; color: var(--text-light); margin-top: auto; padding-top: 4px; }

/* ====== QUESTION SCREEN ====== */
.q-test-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 14px;
  font-size: 12px; font-weight: 600; color: var(--primary);
  background: var(--primary-light); margin-bottom: 8px;
}
.q-card {
  background: var(--card); border-radius: var(--radius-md); padding: 22px 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.q-card.enter { animation: slideEnter 0.3s ease forwards; }
.q-card.exit  { animation: slideExit 0.2s ease forwards; }
@keyframes slideEnter {
  from { opacity: 0; transform: translateX(24px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideExit {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-24px); }
}
.q-num { font-size: 12px; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
.q-text { font-size: 16px; color: var(--text-primary); font-weight: 600; line-height: 1.7; margin-bottom: 20px; }
.q-options { display: flex; flex-direction: column; gap: 10px; }
.q-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s;
  font-size: 14px; color: var(--text-secondary);
  background: var(--card);
}
.q-opt:active { transform: scale(0.98); }
.q-opt.sel {
  border-color: var(--primary); background: var(--primary-light);
  color: var(--primary); font-weight: 600;
}
.q-radio {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.q-opt.sel .q-radio { border-color: var(--primary); background: var(--primary); }
.q-opt.sel .q-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #fff; }

.q-nav-row { display: flex; gap: 10px; align-items: center; }
.btn-back {
  flex: 0 0 auto; padding: 12px 20px; border-radius: 24px;
  font-size: 14px; font-weight: 600; border: 1.5px solid var(--border);
  background: var(--card); color: var(--text-secondary); cursor: pointer;
}
.q-indicator {
  flex: 1; text-align: center; font-size: 12px; color: var(--text-light);
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.q-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.q-dot.done { background: var(--primary); }
.q-dot.current { width: 8px; height: 8px; background: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }

/* ====== RESULTS ====== */
.result-hero {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border-radius: var(--radius-lg); padding: 28px 20px;
  text-align: center; color: #fff;
}
.result-hero-icon { font-size: 44px; margin-bottom: 8px; }
.result-hero-type { font-size: 14px; opacity: 0.85; margin-bottom: 4px; }
.result-hero-code { font-size: 34px; font-weight: 900; letter-spacing: 8px; margin-bottom: 4px; }
.result-hero-name { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.result-hero-desc { font-size: 13px; opacity: 0.9; line-height: 1.7; }

.score-card {
  background: var(--card); border-radius: var(--radius-md); padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}
.score-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }
.score-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.score-label { width: 70px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; font-weight: 500; }
.score-bar-wrap { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
.score-bar { height: 100%; border-radius: 5px; transition: width 1s ease; }
.score-val { width: 38px; text-align: right; font-size: 13px; font-weight: 700; color: var(--text-primary); flex-shrink: 0; }

/* 16personalities style dimension bars */
.dim-section { margin-bottom: 20px; }
.dim-section:last-child { margin-bottom: 0; }
.dim-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.dim-section-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.dim-section-bar-wrap { height: 16px; background: var(--border); border-radius: 8px; position: relative; overflow: hidden; }
.dim-section-bar { height: 100%; border-radius: 8px; transition: width 1s ease; }
.dim-section-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border-radius: 50%; background: white; border: 3px solid; box-shadow: 0 2px 6px rgba(0,0,0,0.15); z-index: 2; transition: left 1s ease; }
.dim-section-footer { display: flex; justify-content: space-between; margin-top: 4px; font-size: 12px; color: var(--text-light); }

/* MBTI classic dual-bar */
.mbti-section { margin-bottom: 20px; }
.mbti-section:last-child { margin-bottom: 0; }
.mbti-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.mbti-section-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.mbti-section-pct { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.mbti-bar-full { height: 16px; border-radius: 8px; overflow: hidden; display: flex; position: relative; }
.mbti-bar-left { height: 100%; border-radius: 8px 0 0 8px; transition: flex 0.8s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
.mbti-bar-right { height: 100%; border-radius: 0 8px 8px 0; transition: flex 0.8s ease; display: flex; align-items: center; padding-left: 8px; }
.mbti-bar-text { font-size: 11px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.15); white-space: nowrap; }
.mbti-section-footer { display: flex; justify-content: space-between; margin-top: 4px; font-size: 12px; color: var(--text-light); }

/* Big Five classic bar */
.bf-score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.bf-score-row:last-child { margin-bottom: 0; }
.bf-score-name { font-size: 13px; font-weight: 600; color: var(--text-primary); width: 80px; flex-shrink: 0; }
.bf-bar-wrap { flex: 1; height: 18px; background: #f0f0f5; border-radius: 9px; overflow: hidden; position: relative; }
.bf-bar-fill { height: 100%; border-radius: 9px; transition: width 1s ease; }
.bf-bar-zone { position: absolute; top: 0; height: 100%; border-right: 1px dashed rgba(0,0,0,0.1); }
.bf-score-val { font-size: 13px; font-weight: 700; color: var(--text-primary); width: 36px; flex-shrink: 0; text-align: right; }
.bf-score-tag { font-size: 11px; font-weight: 500; flex-shrink: 0; padding: 2px 8px; border-radius: 8px; text-align: center; white-space: nowrap; }
.bf-score-tag.high { background: #DCFCE7; color: #166534; }
.bf-score-tag.mid { background: #FEF3C7; color: #92400E; }
.bf-score-tag.low { background: #FEE2E2; color: #991B1B; }

/* DISC colored bar — clean 2-line layout */
.disc-item { margin-bottom: 16px; }
.disc-item:last-child { margin-bottom: 0; }
.disc-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.disc-item-name { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-primary); }
.disc-item-en { font-size: 12px; color: var(--text-secondary); font-weight: 400; }
.disc-item-pct { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.disc-bar-wrap { height: 12px; background: #f0f0f5; border-radius: 6px; overflow: hidden; }
.disc-bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease; }
.disc-dot-sm { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.disc-dot-sm.disc-D { background: #0ea5e9; }
.disc-dot-sm.disc-I { background: #f59e0b; }
.disc-dot-sm.disc-S { background: #10b981; }
.disc-dot-sm.disc-C { background: #6366f1; }

.chart-card {
  background: var(--card); border-radius: var(--radius-md); padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}
.chart-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }
.chart-wrap { height: 260px; position: relative; }

.trait-card {
  background: var(--card); border-radius: var(--radius-md); padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}
.trait-row { display: flex; gap: 8px; flex-wrap: wrap; }
.trait-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 7px 14px; border-radius: 16px;
  font-size: 12px; font-weight: 600;
  border: 1.5px solid;
}
.trait-pos { background: #DCFCE7; border-color: #86EFAC; color: #166534; }
.trait-neg { background: #FEE2E2; border-color: #FCA5A5; color: #991B1B; }
.trait-neu { background: #FEF3C7; border-color: #FCD34D; color: #92400E; }

/* DISC color dots */
.disc-dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.disc-D { background: #EF4444; }
.disc-I { background: #F59E0B; }
.disc-S { background: #10B981; }
.disc-C { background: #3B82F6; }

.btn-row { display: flex; gap: 10px; }
.btn-primary {
  flex: 1; padding: 14px; border-radius: 25px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff; font-size: 15px; font-weight: 700; border: none;
  cursor: pointer; box-shadow: 0 4px 16px rgba(99,102,241,0.3);
  transition: all 0.2s; font-family: inherit;
}
.btn-primary:active { transform: scale(0.96); }
.btn-outline {
  flex: 1; padding: 14px; border-radius: 25px;
  background: var(--card); color: var(--primary);
  font-size: 14px; font-weight: 600;
  border: 1.5px solid var(--primary); cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.btn-outline:active { background: var(--primary-light); }

/* Export button */
.btn-export {
  flex: 1; padding: 14px; border-radius: 25px;
  background: linear-gradient(135deg, #10B981, #059669);
  color: #fff; font-size: 14px; font-weight: 700; border: none;
  cursor: pointer; box-shadow: 0 4px 16px rgba(16,185,129,0.3);
  transition: all 0.2s; font-family: inherit;
}
.btn-export:active { transform: scale(0.96); }
.btn-export:disabled { opacity: 0.6; cursor: wait; }

/* Report container for export */
.report-export-wrap { position: relative; }
.report-stamp {
  position: absolute; top: 12px; right: 12px;
  font-size: 10px; color: var(--text-light); z-index: 1;
}

/* Student info bar on report */
.report-info-bar {
  background: var(--primary-light); border-radius: var(--radius-sm);
  padding: 10px 14px; display: flex; gap: 12px; flex-wrap: wrap;
  font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;
}
.report-info-bar span { font-weight: 600; color: var(--primary); }

/* Bottom Nav */
.bottom-nav {
  height: 58px; background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  flex-shrink: 0; z-index: 100; padding: 0 4px;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  text-decoration: none; cursor: pointer; flex: 1; padding: 6px 0;
  color: var(--text-light); font-size: 10px; font-weight: 500;
}
.nav-item svg { width: 22px; height: 22px; }
.nav-item.active { color: var(--primary); }

.toast-el {
  position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-120px);
  background: var(--text-primary); color: #fff; padding: 11px 22px; border-radius: 14px;
  font-size: 14px; z-index: 9999; pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  transition: transform .35s cubic-bezier(.175,.885,.32,1.275); white-space: nowrap;
}

/* ====== INVITE CODE GATE ====== */
.invite-card {
  background: var(--card); border-radius: var(--radius-md); padding: 28px 22px 22px;
  box-shadow: 0 4px 20px rgba(99,102,241,0.1);
  text-align: center; position: relative;
  border: 2px dashed var(--primary);
}
.invite-icon { font-size: 42px; margin-bottom: 8px; }
.invite-title { font-size: 16px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
.invite-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 18px; padding: 0 8px; }
.invite-input {
  width: 100%; padding: 13px 16px; border: 2px solid var(--border);
  border-radius: 14px; font-size: 15px; text-align: center; font-family: inherit;
  color: var(--text-primary); background: var(--bg); outline: none;
  transition: border-color 0.2s; letter-spacing: 2px;
}
.invite-input:focus { border-color: var(--primary); }
.invite-input.error { border-color: var(--red); animation: shake 0.4s ease; }
.invite-error { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 18px; }
.invite-btn {
  width: 100%; padding: 14px; border-radius: 25px; margin-top: 12px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff; font-size: 15px; font-weight: 700; border: none;
  cursor: pointer; box-shadow: 0 4px 16px rgba(99,102,241,0.3);
  transition: all 0.2s; font-family: inherit;
}
.invite-btn:active { transform: scale(0.96); }
.invite-hint {
  margin-top: 12px; font-size: 11px; color: var(--text-light);
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
</style>

function submitStudentInfo() {
  var name = (document.getElementById('si-name').value || '').trim();
  var school = (document.getElementById('si-school').value || '').trim();
  var sid = (document.getElementById('si-sid').value || '').trim();
  var cls = (document.getElementById('si-class').value || '').trim();
  if (!name) { showToast('请输入姓名'); return; }
  if (!school) { showToast('请输入学校'); return; }
  if (!sid) { showToast('请输入学号'); return; }
  if (!cls) { showToast('请输入班级'); return; }
  // 验证学校是否为本校
  if (typeof verifySchool === 'function' && !verifySchool(school)) {
    showToast('❌ 仅限本校学生使用，请确认学校名称');
    var schoolInput = document.getElementById('si-school');
    schoolInput.classList.add('error');
    schoolInput.focus();
    schoolInput.select();
    setTimeout(function() { schoolInput.classList.remove('error'); }, 600);
    return;
  }
  state.studentInfo = { name: name, school: school, studentId: sid, className: cls };
  state._schoolVerified = true;  // 开始时已验证，后续不再验证
  // 持久化，下次不用重复填写
  try { localStorage.setItem('assessment_student_info', JSON.stringify(state.studentInfo)); } catch(e) {}
  renderSelect();
}

// ============================================================
function renderSelect() {
  state.view = 'select';
  var cards = Object.values(TESTS).map(function(t) {
    return '<div class="test-card" onclick="startTest(\''+t.id+'\')" style="border-left:4px solid '+t.dimColors[t.dimensions[0]]+';">'+
      '<div class="test-icon" style="background:'+t.iconBg+'">'+t.icon+'</div>'+
      '<div class="test-info">'+
        '<div class="test-name">'+t.name+'</div>'+
        '<div class="test-quick">'+t.shortDesc+'</div>'+
        '<div class="test-desc">'+t.desc+'</div>'+
        '<div class="test-meta">'+t.meta+'</div>'+
      '</div>'+
    '</div>';
  }).join('');

  document.getElementById('pageBody').innerHTML =
    '<div class="page-header">'+
      '<div class="page-title">职业兴趣测评</div>'+
      '<div class="page-subtitle">选择一种测试，探索你的职业性格</div>'+
    '</div>'+
    '<div class="select-wrap">' + cards + '</div>';
}

// ============================================================
//  START TEST
// ============================================================
function startTest(testKey) {
  state.testKey = testKey;
  state.currentQ = 0;
  state.answers = {};
  state.view = 'quiz';
  state._locking = false;
  state._submitted = false;  // 重置提交标记，允许新测试提交
  clearTimeout(state.autoTimer);
  renderQuestion(false);
}

// ============================================================
//  RENDER QUESTION
//  animate=true: card slides in; false: appears instantly (first render)
// ============================================================
function renderQuestion(animate) {
  clearTimeout(state.autoTimer);
  var test = TESTS[state.testKey];
  var total = test.questions.length;
  var q = test.questions[state.currentQ];
  var selected = state.answers[state.currentQ];
  var progress = Math.round((state.currentQ / total) * 100);
  var body = document.getElementById('pageBody');

  var optsHtml = ANSWER_OPTS.map(function(t, i) {
    return '<div class="q-opt'+(selected===i?' sel':'')+'" onclick="selectAnswer('+i+')">'+
      '<div class="q-radio"></div><span>'+t+'</span></div>';
  }).join('');

  // Dot indicators
  var dotsHtml = '';
  for (var i = 0; i < total; i++) {
    var cls = 'q-dot';
    if (state.answers[i] !== undefined && i !== state.currentQ) cls += ' done';
    if (i === state.currentQ) cls += ' current';
    dotsHtml += '<span class="'+cls+'"></span>';
  }

  // Card animation class
  var cardAnimClass = animate ? ' enter' : '';

  body.innerHTML =
    '<div class="page-header">'+
      '<div class="page-title">'+test.name+'</div>'+
      '<div class="page-subtitle">第 '+(state.currentQ+1)+' / '+total+' 题</div>'+
    '</div>'+
    '<div class="prog-wrap">'+
      '<div class="prog-info"><span>完成进度</span><span id="progPct">'+progress+'%</span></div>'+
      '<div class="prog-bar"><div class="prog-fill" id="progFill" style="width:'+progress+'%"></div></div>'+
    '</div>'+
    '<div class="q-card'+cardAnimClass+'" id="quizCard">'+
      '<div class="q-num">Q'+(state.currentQ+1)+'</div>'+
      '<div class="q-text">'+q.q+'</div>'+
      '<div class="q-options" id="optsWrap">'+optsHtml+'</div>'+
    '</div>'+
    '<div class="q-nav-row">'+
      (state.currentQ>0 ? '<button class="btn-back" onclick="prevQ()">← 上一题</button>' : '<div></div>')+
      '<div class="q-indicator" id="dotInd">'+dotsHtml+'</div>'+
    '</div>';

  body.scrollTop = 0;

  // Clean up enter class after animation completes
  if (animate) {
    setTimeout(function() {
      var card = document.getElementById('quizCard');
      if (card) card.classList.remove('enter');
    }, 320);
  }
}

// ============================================================
//  PROGRESSIVE UPDATE (no full re-render for small changes)
// ============================================================
function updateProgress(current, total) {
  var progress = Math.round((current / total) * 100);
  var fill = document.getElementById('progFill');
  var pct  = document.getElementById('progPct');
  if (fill) fill.style.width = progress + '%';
  if (pct)  pct.textContent = progress + '%';
}

function updateDots(total) {
  var dotInd = document.getElementById('dotInd');
  if (!dotInd) return;
  var html = '';
  for (var i = 0; i < total; i++) {
    var cls = 'q-dot';
    if (state.answers[i] !== undefined && i !== state.currentQ) cls += ' done';
    if (i === state.currentQ) cls += ' current';
    html += '<span class="'+cls+'"></span>';
  }
  dotInd.innerHTML = html;
}

// ============================================================
//  SELECT ANSWER → smooth highlight + auto-advance
// ============================================================
function selectAnswer(idx) {
  if (state._locking) return; // Prevent double-tap during transition
  clearTimeout(state.autoTimer);

  // Save answer
  state.answers[state.currentQ] = idx;

  // Instant visual highlight — no full re-render!
  var opts = document.querySelectorAll('#optsWrap .q-opt');
  opts.forEach(function(opt, i) {
    if (i === idx) opt.classList.add('sel');
    else opt.classList.remove('sel');
  });

  var test = TESTS[state.testKey];
  var total = test.questions.length;

  // Update dots: mark current as done
  var dots = document.querySelectorAll('#dotInd .q-dot');
  if (dots[state.currentQ]) {
    dots[state.currentQ].classList.remove('current');
    dots[state.currentQ].classList.add('done');
  }

  if (state.currentQ < total - 1) {
    // Auto-advance after a smooth pause
    state.autoTimer = setTimeout(function() {
      transitionNext();
    }, 350);
  } else {
    // Last question → results; lock to prevent double submission
    state._locking = true;
    state.autoTimer = setTimeout(function() {
      var card = document.getElementById('quizCard');
      if (card) { card.classList.add('exit'); }
      setTimeout(function() { calcResults(); }, 200);
    }, 350);
  }
}

// ============================================================
//  SMOOTH TRANSITION TO NEXT QUESTION
// ============================================================
function transitionNext() {
  state._locking = true;
  var card = document.getElementById('quizCard');

  if (card) {
    card.classList.add('exit');
    // Wait for exit animation, then rebuild with enter animation
    setTimeout(function() {
      state.currentQ++;
      renderQuestion(true);
      state._locking = false;
    }, 180);
  } else {
    state.currentQ++;
    renderQuestion(false);
    state._locking = false;
  }
}

// ============================================================
//  PREVIOUS QUESTION — slide in reverse
// ============================================================
function prevQ() {
  if (state._locking) return;
  clearTimeout(state.autoTimer);
  if (state.currentQ > 0) {
    state._locking = true;
    state.currentQ--;
    renderQuestion(false); // instant when going back (no animation needed)
    state._locking = false;
  }
}

// ============================================================
//  CALCULATE RESULTS
// ============================================================
function calcResults() {
  state.view = 'result';
  var test = TESTS[state.testKey];
  var scores = {};
  var counts = {};
  test.dimensions.forEach(function(d) { scores[d]=0; counts[d]=0; });

  test.questions.forEach(function(q, i) {
    var rawScore = state.answers[i] !== undefined ? state.answers[i] : 2;
    // Handle reverse items
    if (test.reverseItems.indexOf(i) !== -1) {
      rawScore = 4 - rawScore;
    }
    scores[q.dim] += rawScore;
    counts[q.dim] += 1;
  });

  // Normalize to 0-100%
  var maxScore = {};
  test.dimensions.forEach(function(d) {
    maxScore[d] = Math.round((scores[d] / (counts[d] * 4)) * 100);
  });

  state.scores = maxScore;

  // Submit to Supabase (teacher can see results)
  submitToSupabase(maxScore);

  // 同步保存到本地，供"我的"页面"我的测评"展示
  saveAssessmentResult(maxScore);

  // School already verified at info stage — directly unlock full report
  unlockFullReport(maxScore);
}

function showToast(msg) {
  var el = document.getElementById('toastEl');
  el.textContent = msg;
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(window._tt);
  window._tt = setTimeout(function(){el.style.transform='translateX(-50%) translateY(-120px)';},2000);

// ============================================================
//  EXPORT REPORT AS IMAGE
// ============================================================
function exportReport() {
  // If not yet verified, show verification overlay first
  if (!state._schoolVerified) {
    renderExportVerifyOverlay();
    return;
  }

  var btn = document.getElementById('exportBtn');
  if (btn) { btn.disabled = true; btn.textContent = '正在生成...'; }

  var target = document.getElementById('reportExportWrap') || document.getElementById('pageBody');
  if (!target) return;

  // Temporarily hide buttons during capture
  var btnRow = target.querySelector('.btn-row');
  var btnRowDisplay = btnRow ? btnRow.style.display : '';
  if (btnRow) btnRow.style.display = 'none';

  html2canvas(target, {
    scale: 2,
    backgroundColor: '#F0F4FF',
    useCORS: true,
    logging: false,
    scrollY: 0,
    windowWidth: 390
  }).then(function(canvas) {
    // Restore buttons
    if (btnRow) btnRow.style.display = btnRowDisplay;

    // Download as PNG
    var testName = TESTS[state.testKey] ? TESTS[state.testKey].name : '测评';
    var studentSchool = (state.studentInfo && state.studentInfo.school) || '';
    var fileName = testName + '_' + (studentSchool || '报告') + '_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '') + '.png';

    var link = document.createElement('a');
    link.download = fileName;
    link.href = canvas.toDataURL('image/png');
    link.click();

    if (btn) { btn.disabled = false; btn.textContent = '导出报告'; }
    showToast('✅ 报告已导出！');
  }).catch(function(err) {
    console.error('Export failed:', err);
    if (btnRow) btnRow.style.display = btnRowDisplay;
    if (btn) { btn.disabled = false; btn.textContent = '导出报告'; }
    showToast('❌ 导出失败，请重试');
  });
}

function closeVerifyOverlay() {
  var overlay = document.getElementById('exportVerifyOverlay');
  if (overlay) overlay.remove();
}

function doExportVerify() {
  var input = document.getElementById('exportSchoolInput');
  var errorEl = document.getElementById('exportVerifyError');
  var schoolName = (input.value || '').trim();

  if (!schoolName) {
    errorEl.textContent = '❌ 请输入学校名称';
    input.classList.add('error');
    input.focus();
    setTimeout(function() { input.classList.remove('error'); }, 500);
    return;
  }

  if (typeof verifySchool === 'function' && verifySchool(schoolName)) {
    // Store verified school info
    state._schoolVerified = true;
    if (!state.studentInfo) state.studentInfo = {};
    state.studentInfo.school = schoolName;

    // Close overlay with animation
    var card = document.getElementById('exportVerifyOverlay');
    if (card) {
      card.style.transition = 'opacity 0.35s ease';
      card.style.opacity = '0';
      setTimeout(function() {
        closeVerifyOverlay();
        // Now proceed with actual export
        exportReport();
      }, 350);
    }
  } else {
    errorEl.textContent = '❌ 该学校不在本校名单中，请确认学校名称或联系老师';
    input.classList.add('error');
    input.focus();
    input.select();
    setTimeout(function() { input.classList.remove('error'); }, 500);
  }

function verifySchoolCode() {
  var input = document.getElementById('schoolVerifyInput');
  var errorEl = document.getElementById('inviteError');
  var schoolName = (input.value || '').trim();

  if (!schoolName) {
    errorEl.textContent = '❌ 请输入学校名称';
    input.classList.add('error');
    input.focus();
    setTimeout(function() { input.classList.remove('error'); }, 500);
    return;
  }

  if (typeof verifySchool === 'function' && verifySchool(schoolName)) {
    // Ensure studentInfo exists even if user skipped info form
    if (!state.studentInfo) state.studentInfo = {};
    state.studentInfo.school = schoolName;
    state._schoolVerified = true;  // Skip export verification later
    // Also try to restore from localStorage if missing other fields
    try {
      var saved = localStorage.getItem('assessment_student_info');
      if (saved) {
        var parsed = JSON.parse(saved);
        state.studentInfo.name = state.studentInfo.name || parsed.name || '';
        state.studentInfo.studentId = state.studentInfo.studentId || parsed.studentId || '';
        state.studentInfo.className = state.studentInfo.className || parsed.className || '';
      }
    } catch(e) {}
    // Retry submission now that we have student info
    if (state.scores) submitToSupabase(state.scores);
    // Fade out the gate
    var card = document.getElementById('inviteCard');
    if (card) {
      card.style.transition = 'all 0.4s ease';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.95)';
    }
    setTimeout(function() {
      unlockFullReport(state.scores);
    }, 400);
  } else {
    errorEl.textContent = '❌ 该学校不在本校名单中，请确认学校名称或联系老师';
    input.classList.add('error');
    input.focus();
    input.select();
    setTimeout(function() { input.classList.remove('error'); }, 500);
  }
}

// ============================================================
//  BUILD HERO (shared by partial & full report)
// ============================================================
function buildHero(scores, test) {
  var sorted = test.dimensions.map(function(d){return {dim:d,score:scores[d]};}).sort(function(a,b){return b.score-a.score;});
  var heroDim = sorted[0].dim;

  switch (state.testKey) {
    case 'bigfive': {
      var traitInfo = getBigFiveTraits();
      var descHigh = sorted[0].score >= 50;
      return '<div class="result-hero">'+
        '<div class="result-hero-icon">'+test.dimIcons[heroDim]+'</div>'+
        '<div class="result-hero-type">你最突出的人格维度</div>'+
        '<div class="result-hero-name">'+test.dimNames[heroDim]+'</div>'+
        '<div class="result-hero-desc">'+(descHigh ? traitInfo[heroDim].high : traitInfo[heroDim].low)+'</div>'+
      '</div>';
    }
    case 'holland': {
      var top3 = sorted.slice(0,3).map(function(e){return e.dim;});
      var code = top3.join('');
  var typeNames = getHollandTypeNames();
  var typeName = typeNames[code];
  if (!typeName) {
    var dims = top3.map(function(d){return test.dimNames[d].split(' ')[0];});
    typeName = dims[0] + '·' + dims[1] + '·' + dims[2] + '型';
  }
      return '<div class="result-hero">'+
        '<div class="result-hero-type">你的霍兰德职业代码</div>'+
        '<div class="result-hero-code">'+code+'</div>'+
        '<div class="result-hero-name">'+typeName+'</div>'+
        '<div class="result-hero-desc">你最适合的领域集中在：'+test.dimNames[top3[0]].split(' ')[0]+'、'+test.dimNames[top3[1]].split(' ')[0]+'、'+test.dimNames[top3[2]].split(' ')[0]+'</div>'+
      '</div>';
    }
    case 'disc': {
      var discNames = getDiscNames();
      var discDescs = getDiscDescs();
      var top = sorted[0];
      var isHigh = top.score >= 50;
      var desc = isHigh ? discDescs[top.dim].high : discDescs[top.dim].low;
      return '<div class="result-hero">'+
        '<div class="result-hero-icon"><span class="disc-dot disc-'+top.dim+'" style="width:44px;height:44px;"></span></div>'+
        '<div class="result-hero-name">'+discNames[top.dim]+'</div>'+
        '<div class="result-hero-desc">'+desc+'</div>'+
      '</div>';
    }
    case 'mbti': {
      var EorI = scores.EI >= 50 ? 'E' : 'I';
      var SorN = scores.SN >= 50 ? 'S' : 'N';
      var TorF = scores.TF >= 50 ? 'T' : 'F';
      var JorP = scores.JP >= 50 ? 'J' : 'P';
      var mbtiType = EorI + SorN + TorF + JorP;
      var info = getMbtiInfo(mbtiType);
      return '<div class="result-hero">'+
        '<div class="result-hero-icon">🧩</div>'+
        '<div class="result-hero-type">你的 MBTI 人格类型</div>'+
        '<div class="result-hero-code">'+mbtiType+'</div>'+
        '<div class="result-hero-name">'+info.name+'</div>'+
        '<div class="result-hero-desc">'+info.desc+'</div>'+
      '</div>';
    }
    default: return '';
  }
}

// ============================================================
//  BUILD SCORES HTML
// ============================================================
function buildScoresHtml(scores, test) {
  var sorted = test.dimensions.map(function(d){return {dim:d,score:scores[d]};}).sort(function(a,b){return b.score-a.score;});

  // Holland: 16personalities style with circle dot markers
  var colors = test.dimColors || {};
  var hollandEnds = {
    R: {left:'动手实操', right:'创意想象'},
    I: {left:'逻辑分析', right:'感性体验'},
    A: {left:'务实严谨', right:'自由创作'},
    S: {left:'独立工作', right:'助人合作'},
    E: {left:'执行落实', right:'引领影响'},
    C: {left:'灵活创新', right:'规范有序'}
  };
  return sorted.map(function(e) {
    var color = colors[e.dim] || '#6366f1';
    var name = test.dimNames[e.dim].split(' ')[0];
    var isHigh = e.score >= 50;
    var actTend = isHigh ? '较高' : '较低';
    var ends = hollandEnds[e.dim] || {left:'较低', right:'较高'};
    return '<div class="dim-section">'+
      '<div class="dim-section-header">'+
        '<span class="dim-section-label">'+name+': <span style="color:'+color+'">'+e.score+'% '+actTend+'</span></span>'+
      '</div>'+
      '<div class="dim-section-bar-wrap">'+
        '<div class="dim-section-bar" style="width:'+e.score+'%;background:'+color+'"></div>'+
        '<div class="dim-section-dot" style="left:'+e.score+'%;border-color:'+color+'"></div>'+
      '</div>'+
      '<div class="dim-section-footer">'+
        '<span>'+ends.left+'</span><span>'+ends.right+'</span>'+
      '</div>'+
    '</div>';
  }).join('');
}

function saveAssessmentResult(scores) {
  try {
    var test = TESTS[state.testKey];
    var now = new Date().toISOString();
    var sorted = test.dimensions.map(function(d){return {dim:d,score:scores[d]};}).sort(function(a,b){return b.score-a.score;});
    var payload = { type: state.testKey, name: test.name, completedAt: now, scores: scores };

    if (state.testKey === 'holland') {
      payload.code = sorted.slice(0,3).map(function(e){return e.dim;}).join('');
      var typeNames = getHollandTypeNames();
      payload.summary = typeNames[payload.code];
      if (!payload.summary) {
        var dims = sorted.slice(0,3).map(function(e){return test.dimNames[e.dim].split(' ')[0];});
        payload.summary = dims[0] + '·' + dims[1] + '·' + dims[2] + '型';
      }
      localStorage.setItem('holland_result', JSON.stringify(payload));
    } else if (state.testKey === 'mbti') {
      payload.type = (scores.EI>=50?'E':'I') + (scores.SN>=50?'S':'N') + (scores.TF>=50?'T':'F') + (scores.JP>=50?'J':'P');
      payload.summary = getMbtiInfo(payload.type).name;
      localStorage.setItem('mbti_result', JSON.stringify(payload));
    } else if (state.testKey === 'disc') {
      payload.type = sorted[0].dim;
      payload.summary = getDiscNames()[sorted[0].dim];
      localStorage.setItem('disc_result', JSON.stringify(payload));
    } else if (state.testKey === 'bigfive') {
      payload.summary = test.dimNames[sorted[0].dim];
      localStorage.setItem('bigfive_result', JSON.stringify(payload));
    }
  } catch(e) { console.warn('saveAssessmentResult failed', e); }
}

// ============================================================
//  SUPABASE DATA SUBMISSION (uses config.js saveSubmission)
// ============================================================
function submitToSupabase(scores) {
  if (!state.studentInfo) return;
  // 防止重复提交（同一套测试只提交一次）
  if (state._submitted) { console.log('[submitToSupabase] 已提交，跳过重复'); return; }
  state._submitted = true;
  
  if (typeof saveSubmission !== 'function') {
    console.warn('saveSubmission 函数未加载，跳过提交');
    showToast('⚠️ 配置未加载，结果仅保存在本地');
    return;
  }
  var test = TESTS[state.testKey];

  // Build a result code/summary based on test type
  var resultCode = '';
  var resultSummary = '';
  var sorted = test.dimensions.map(function(d){return {dim:d,score:scores[d]};}).sort(function(a,b){return b.score-a.score;});

  if (state.testKey === 'holland') {
    resultCode = sorted.slice(0,3).map(function(e){return e.dim;}).join('');
    var typeNames = getHollandTypeNames();
    resultSummary = typeNames[resultCode];
    if (!resultSummary) {
      var dims = sorted.slice(0,3).map(function(e){return test.dimNames[e.dim].split(' ')[0];});
      resultSummary = dims[0] + '·' + dims[1] + '·' + dims[2] + '型';
    }
  } else if (state.testKey === 'mbti') {
    resultCode = (scores.EI>=50?'E':'I') + (scores.SN>=50?'S':'N') + (scores.TF>=50?'T':'F') + (scores.JP>=50?'J':'P');
    var info = getMbtiInfo(resultCode);
    resultSummary = info.name;
  } else if (state.testKey === 'disc') {
    resultCode = sorted[0].dim;
    var discNames = getDiscNames();
    resultSummary = discNames[sorted[0].dim];
  } else {
    resultCode = sorted[0].dim;
    resultSummary = test.dimNames[sorted[0].dim];
  }

  var si = state.studentInfo || {};
  var payload = {
    name: si.name || '',
    school: si.school || '',
    student_id: si.studentId || '',
    class_name: si.className || '',
    test_type: state.testKey,
    test_name: test.name,
    answers: state.answers,
    scores: scores,
    result_code: resultCode,
    result_summary: resultSummary
  };

  // 如果 db 未初始化，尝试重新初始化
  if (typeof isDbReady === 'function' && !isDbReady() && typeof initSupabase === 'function') {
    initSupabase();
  }

  saveSubmission(payload).then(function(result) {
    if (result && result.savedToCloud) {
      console.log('✅ 测评结果已提交给老师');
      showToast('✅ 测评结果已同步到教师端');
    } else {
      console.warn('测评结果已保存到本地，未同步到云端');
      showToast('⚠️ 结果已保存本地，但未同步到云端，请检查网络');
    }
  }).catch(function(err) {
    console.warn('提交失败(不影响查看结果):', err);
    showToast('❌ 同步失败：' + (err.message || '请检查网络'));
  });
}

// ============================================================
//  INIT
// ============================================================
state._locking = false;
// 调用 config.js 的 initSupabase()，设置全局 db 变量
if (typeof initSupabase === 'function') {
  initSupabase();
} else {
  console.warn('config.js 未加载，Supabase 无法初始化');
}
// 优先恢复已保存的学生信息，没有则先填写
(function(){
  try {
    var saved = localStorage.getItem('assessment_student_info');
    if (saved) {
      state.studentInfo = JSON.parse(saved);
      state._schoolVerified = true;  // 已保存的信息在填写时已验证过学校
      renderSelect();
    }
    else { renderStudentInfo(); }
  } catch(e) { renderStudentInfo(); }
})();
</script>

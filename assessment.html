<title>职业兴趣测评 · 自在生涯工作室</title>
<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js" defer></script>

  var v = '20250709-2';
  if (localStorage.getItem('app_version') !== v) {
    localStorage.setItem('app_version', v);
    if (location.search.indexOf('v=') === -1) {
      location.replace(location.href + (location.search ? '&' : '?') + 'v=' + v);
    }
  }
})();

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --primary: #6366f1;
  --primary-dark: #4338ca;
  --primary-light: #EEF0FF;
  --accent: #818cf8;
  --bg: #F0F4FF;
  --card: #FFFFFF;
  --text-primary: #1a1a2e;
  --text-secondary: #7C8594;
  --text-light: #B0B8C8;
  --border: #E8ECF2;
  --radius-sm: 14px;
  --radius-md: 20px;
  --radius-lg: 24px;
  --green: #10B981;
  --orange: #F59E0B;
  --red: #EF4444;
  --blue: #3B82F6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 16px;
  -webkit-font-smoothing: antialiased;
}
.phone {
  width: 390px; height: 844px;
  background: var(--bg);
  border-radius: 42px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(99,102,241,0.12), 0 0 0 1px rgba(99,102,241,0.08);
  display: flex; flex-direction: column;
}
.page-body {
  flex: 1; overflow-y: auto; padding: 8px 16px 12px;
  display: flex; flex-direction: column; gap: 0;
}
.page-body::-webkit-scrollbar { width: 0; }

/* Header */
.page-header { text-align: center; padding: 8px 0 10px; }
.page-title { font-size: 18px; font-weight: 800; color: var(--text-primary); }
.page-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }

/* Progress */
.prog-wrap { margin-bottom: 10px; }
.prog-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
.prog-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.4s ease; }

/* ====== SELECTION SCREEN ====== */
.select-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
  padding: 4px 0;
}
.select-wrap .test-card {
  flex: 0 0 auto;
  min-height: 0;
  padding: 10px 14px;
  gap: 10px;
  align-items: flex-start;
}
.test-card {
  background: var(--card); border-radius: var(--radius-md);
  padding: 16px 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  cursor: pointer; transition: all 0.2s; display: flex; gap: 14px;
  border: 2px solid transparent; align-items: flex-start;
}
.test-card:active { transform: scale(0.97); }
.test-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(99,102,241,0.12); }
.select-wrap .test-icon {
  width: 44px; height: 44px; border-radius: 12px; font-size: 22px;
  margin-top: 2px;
}
.test-icon {
  width: 50px; height: 50px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.select-wrap .test-info { justify-content: flex-start; min-height: 0; }
.test-info { flex: 1; display: flex; flex-direction: column; }
.select-wrap .test-name { font-size: 16px; margin-bottom: 3px; }
.test-name { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
.select-wrap .test-quick { font-size: 12px; margin-bottom: 3px; }
.test-quick { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.select-wrap .test-desc {
  font-size: 12px; line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.test-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.select-wrap .test-meta { font-size: 11px; margin-top: 4px; padding-top: 0; }
.test-meta { font-size: 12px; color: var(--text-light); margin-top: auto; padding-top: 4px; }

/* ====== QUESTION SCREEN ====== */
.q-test-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 14px;
  font-size: 12px; font-weight: 600; color: var(--primary);
  background: var(--primary-light); margin-bottom: 8px;
}
.q-card {
  background: var(--card); border-radius: var(--radius-md); padding: 28px 20px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  transition: opacity 0.25s ease, transform 0.25s ease;
  text-align: center;
}
.q-card.enter { animation: slideEnter 0.3s ease forwards; }
.q-card.exit  { animation: slideExit 0.2s ease forwards; }
@keyframes slideEnter {
  from { opacity: 0; transform: translateX(24px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideExit {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-24px); }
}
.q-num { display: none; }
.q-text { font-size: 18px; color: var(--text-primary); font-weight: 700; line-height: 1.6; margin-bottom: 32px; padding: 0 4px; }
/* Vertical option buttons — neutral gray radio style */
.q-options {
  display: flex; flex-direction: column;
  gap: 10px; padding: 0 4px; margin-bottom: 0;
}
.q-opt {
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent; user-select: none;
  padding: 12px 16px; border-radius: 12px; font-size: 15px; font-weight: 500;
  border: 1.5px solid #E5E7EB; background: #fff; color: #374151;
  min-height: 48px;
}
.q-opt:hover { transform: translateY(-1px); border-color: #D1D5DB; }
.q-opt:active { transform: scale(0.98); }
/* Radio circle */
.q-opt .q-radio-circle {
  flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid #D1D5DB; display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
}
.q-opt .q-radio-circle::after {
  content: ''; width: 10px; height: 10px; border-radius: 50%; background: transparent; transition: all 0.2s ease;
}
/* Selected state */
.q-opt.sel { border-color: #6366F1; background: #F5F5FF; color: #4F46E5; font-weight: 600; box-shadow: 0 2px 8px rgba(99,102,241,0.12); }
.q-opt.sel .q-radio-circle { border-color: #6366F1; }
.q-opt.sel .q-radio-circle::after { background: #6366F1; }
.q-label { pointer-events: none; }
/* Remove old scale labels row */
.q-scale-labels { display: none; }
.q-radio { display: none; }

.q-nav-row { display: flex; gap: 10px; align-items: center; margin-top: 20px; }
.btn-back {
  flex: 0 0 auto; padding: 10px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 600; border: none;
  background: var(--bg); color: var(--text-secondary); cursor: pointer;
  transition: all 0.2s;
}
.btn-back:hover { background: var(--border); }
.q-indicator {
  flex: 1; text-align: center; font-size: 12px; color: var(--text-light);
  display: flex; align-items: center; justify-content: center; gap: 4px; flex-wrap: wrap;
}
.q-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: all 0.25s; }
.q-dot.done { background: var(--primary); }
.q-dot.current { width: 8px; height: 8px; background: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.25); }

/* ====== RESULTS ====== */
.result-hero {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border-radius: var(--radius-lg); padding: 28px 20px;
  text-align: center; color: #fff;
  position: relative; overflow: hidden;
}
/* Big Five dimension-specific hero gradients */
.result-hero.bf-E { background: linear-gradient(145deg, #f97316 0%, #ea580c 40%, #c2410c 100%); }
.result-hero.bf-A { background: linear-gradient(145deg, #10b981 0%, #059669 40%, #047857 100%); }
.result-hero.bf-C { background: linear-gradient(145deg, #3b82f6 0%, #2563eb 40%, #1d4ed8 100%); }
.result-hero.bf-N { background: linear-gradient(145deg, #ec4899 0%, #db2777 40%, #be185d 100%); }
.result-hero.bf-O { background: linear-gradient(145deg, #6366f1 0%, #4f46e5 40%, #4338ca 100%); }
.result-hero .bf-glow {
  position: absolute; width: 180px; height: 180px; border-radius: 50%;
  filter: blur(50px); opacity: 0.25; pointer-events: none;
}
.result-hero .bf-glow-1 { top: -40px; right: -30px; background: #fff; }
.result-hero .bf-glow-2 { bottom: -30px; left: -20px; background: rgba(255,255,255,.5); }
.result-hero-icon-wrap {
  display: inline-flex; align-items: center; justify-content: center;
  width: 72px; height: 72px; border-radius: 22px;
  background: rgba(255,255,255,.18);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1.5px solid rgba(255,255,255,.25);
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
  margin-bottom: 16px; position: relative; z-index: 2;
}
.result-hero-icon { font-size: 38px; line-height: 1; }
.result-hero-type { font-size: 13px; opacity: .82; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; position: relative; z-index: 2; }
.result-hero-code { font-size: 34px; font-weight: 900; letter-spacing: 8px; margin-bottom: 4px; position: relative; z-index: 2; }
.result-hero-name { font-size: 19px; font-weight: 800; margin-bottom: 10px; letter-spacing: .3px; position: relative; z-index: 2; }
.result-hero-desc { font-size: 13px; opacity: .92; line-height: 1.75; position: relative; z-index: 2; }

.score-card {
  background: var(--card); border-radius: var(--radius-md); padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}
.score-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }
.score-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.score-label { width: 70px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; font-weight: 500; }
.score-bar-wrap { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
.score-bar { height: 100%; border-radius: 5px; transition: width 1s ease; }
.score-val { width: 38px; text-align: right; font-size: 13px; font-weight: 700; color: var(--text-primary); flex-shrink: 0; }

/* ====== HOLLAND TABLE RESULT (reference image style) ====== */
.hl-hero {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border-radius: var(--radius-lg); padding: 26px 20px;
  text-align: center; color: #fff; margin-bottom: 14px;
}
.hl-hero-label { font-size: 13px; opacity: 0.85; margin-bottom: 8px; }
.hl-hero-code { font-size: 42px; font-weight: 900; letter-spacing: 10px; margin-bottom: 6px; }
.hl-hero-type { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.hl-hero-code-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.hl-hero-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px 6px 6px; border-radius: 18px;
  font-size: 13px; font-weight: 600; backdrop-filter: blur(4px);
}
.hl-hero-pill-letter {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
}

.hl-table-card, .hl-analysis-card {
  background: var(--card); border-radius: var(--radius-md); padding: 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 14px;
}
.hl-table-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }

/* Reference-image style: R I A S E C columns */
.hl-table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  font-size: 13px; border: 1px solid #e2e8f0;
  border-radius: 10px; overflow: hidden;
}
.hl-table thead th {
  padding: 12px 8px; font-weight: 700; font-size: 13px;
  text-align: center; border-bottom: 1px solid #e2e8f0;
  background: #f8fafc;
}
.hl-table thead th.hl-th-dim {
  background: #f1f5f9; text-align: left; padding-left: 14px;
  color: var(--text-primary); font-weight: 700;
}
.hl-table thead th.hl-th-code {
  width: 42px; font-weight: 800; font-size: 14px;
}

.hl-table tbody td {
  padding: 12px 8px; text-align: center;
  border-bottom: 1px solid #e2e8f0; font-weight: 600; color: var(--text-primary);
}
.hl-table tbody td:first-child {
  text-align: left; padding-left: 14px; font-weight: 600;
  color: var(--text-secondary); background: #fafbfc;
  border-right: 1px solid #e2e8f0;
}
.hl-table tbody tr:last-child td {
  border-bottom: none;
}
.hl-table tbody tr:last-child td:first-child {
  background: #eef0f5; font-weight: 700; color: var(--text-primary);
}
.hl-table tbody tr:last-child td:not(:first-child) {
  background: #f5f7fa; font-weight: 700;
}
.hl-table .hl-cell-empty { color: #c0c5d0; font-weight: 400; }

.hl-analysis-text { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }
.hl-dim-list { display: flex; flex-direction: column; gap: 10px; }
.hl-dim-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border-radius: 10px; background: var(--bg); }
.hl-dim-item.hl-dim-highlight { background: rgba(99,102,241,0.06); }
.hl-dim-tag {
  flex-shrink: 0; padding: 4px 10px; border-radius: 10px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
}
.hl-dim-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.6; padding-top: 2px; }

/* 16personalities style dimension bars */
.dim-section { margin-bottom: 20px; }
.dim-section:last-child { margin-bottom: 0; }
.dim-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.dim-section-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.dim-section-bar-wrap { height: 16px; background: var(--border); border-radius: 8px; position: relative; overflow: hidden; }
.dim-section-bar { height: 100%; border-radius: 8px; transition: width 1s ease; }
.dim-section-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border-radius: 50%; background: white; border: 3px solid; box-shadow: 0 2px 6px rgba(0,0,0,0.15); z-index: 2; transition: left 1s ease; }
.dim-section-footer { display: flex; justify-content: space-between; margin-top: 4px; font-size: 12px; color: var(--text-light); }

/* MBTI classic dual-bar */
.mbti-section { margin-bottom: 20px; }
.mbti-section:last-child { margin-bottom: 0; }
.mbti-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.mbti-section-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.mbti-section-pct { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.mbti-bar-full { height: 16px; border-radius: 8px; overflow: hidden; display: flex; position: relative; }
.mbti-bar-left { height: 100%; border-radius: 8px 0 0 8px; transition: flex 0.8s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
.mbti-bar-right { height: 100%; border-radius: 0 8px 8px 0; transition: flex 0.8s ease; display: flex; align-items: center; padding-left: 8px; }
.mbti-bar-text { font-size: 11px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.15); white-space: nowrap; }
.mbti-section-footer { display: flex; justify-content: space-between; margin-top: 4px; font-size: 12px; color: var(--text-light); }

/* Big Five: radar chart + score table + one-liner + advice */
.bf-radar-card { background: #fff; border-radius: 20px; padding: 24px 20px 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); text-align: center; }
.bf-radar-card .bf-radar-title { font-size: 18px; font-weight: 800; color: #1f2937; margin-bottom: 12px; }
.bf-radar-svg { max-width: 320px; width: 100%; height: auto; }

/* 分数表 */
.bf-table-card { background: #fff; border-radius: 20px; padding: 20px 20px 16px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.bf-table-card .bf-table-title { font-size: 16px; font-weight: 800; color: #1f2937; margin-bottom: 14px; }
.bf-table { width: 100%; border-collapse: collapse; }
.bf-table th { font-size: 12px; font-weight: 600; color: #9ca3af; text-transform: uppercase; padding: 8px 6px; border-bottom: 2px solid #f3f4f6; text-align: center; }
.bf-table th:first-child { text-align: left; padding-left: 0; width: 80px; }
.bf-table td { font-size: 14px; padding: 10px 6px; text-align: center; border-bottom: 1px solid #f9fafb; }
.bf-table td:first-child { text-align: left; padding-left: 0; font-weight: 700; color: #1f2937; }
.bf-table .bf-td-bar-wrap { display: flex; align-items: center; gap: 8px; }
.bf-table .bf-td-bar { flex: 1; height: 8px; border-radius: 4px; background: #f3f4f6; overflow: hidden; }
.bf-table .bf-td-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
.bf-table .bf-td-val { font-size: 14px; font-weight: 700; color: #1f2937; min-width: 36px; }
.bf-table .bf-td-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 8px; }
.bf-table .bf-td-tag.high { background: #dcfce7; color: #166534; }
.bf-table .bf-td-tag.mid { background: #fef3c7; color: #92400E; }
.bf-table .bf-td-tag.low { background: #fee2e2; color: #991B1B; }

/* 一句话解释 */
.bf-oneliner-card { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.bf-oneliner-card .bf-oneliner-title { font-size: 16px; font-weight: 800; color: #1f2937; margin-bottom: 14px; }
.bf-oneliner-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; padding: 10px 12px; border-radius: 12px; background: #f9fafb; }
.bf-oneliner-item:last-child { margin-bottom: 0; }
.bf-oneliner-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.bf-oneliner-text { font-size: 13px; color: #4b5563; line-height: 1.7; }
.bf-oneliner-text strong { color: #1f2937; }

/* 应用建议卡片 */
.bf-advice-card { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.bf-advice-card .bf-advice-title { font-size: 16px; font-weight: 800; color: #1f2937; margin-bottom: 6px; }
.bf-advice-card .bf-advice-subtitle { font-size: 12px; color: #9ca3af; margin-bottom: 16px; }
.bf-advice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.bf-advice-item { padding: 14px; border-radius: 14px; background: #f9fafb; border-left: 4px solid #e5e7eb; }
.bf-advice-item .bf-advice-label { font-size: 12px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.bf-advice-item .bf-advice-text { font-size: 12.5px; color: #6b7280; line-height: 1.65; }

@media (max-width: 560px) {
  .bf-radar-card { padding: 20px 14px 16px; }
  .bf-radar-svg { max-width: 260px; }
  .bf-table-card { padding: 16px 14px 14px; }
  .bf-table td { font-size: 12px; padding: 8px 4px; }
  .bf-table th { font-size: 10px; padding: 6px 4px; }
  .bf-table .bf-td-val { font-size: 12px; min-width: 28px; }
  .bf-table .bf-td-tag { font-size: 10px; padding: 1px 6px; }
  .bf-oneliner-card { padding: 16px 14px; }
  .bf-oneliner-text { font-size: 12px; }
  .bf-advice-grid { grid-template-columns: 1fr; }
  .bf-advice-card { padding: 16px 14px; }
  .bf-advice-item { padding: 12px; }
}

/* DISC colored bar — clean 2-line layout */
.disc-item { margin-bottom: 16px; }
.disc-item:last-child { margin-bottom: 0; }
.disc-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.disc-item-name { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-primary); }

    if (i === state.currentQ) cls += ' current';
    dotsHtml += '<span class="'+cls+'"></span>';

  var moduleHtml = '';

// ============================================================
//  SELECT ANSWER → smooth highlight + auto-advance
// ============================================================
function selectAnswer(idx) {
  if (state._locking) return; // Prevent double-tap during transition
  clearTimeout(state.autoTimer);

  // Save answer
  state.answers[state.currentQ] = idx;

  // Instant visual highlight — no full re-render!
  var opts = document.querySelectorAll('#optsWrap .q-opt');
  opts.forEach(function(opt, i) {
    if (i === idx) opt.classList.add('sel');
    else opt.classList.remove('sel');
  });

  var test = TESTS[state.testKey];
  if (!test.questions) return; // Not a standard question flow (e.g. matrix)
  var total = test.questions.length;

  // Update dots: mark current as done
  var dots = document.querySelectorAll('#dotInd .q-dot');
  if (dots[state.currentQ]) {
    dots[state.currentQ].classList.remove('current');
    dots[state.currentQ].classList.add('done');
  }

  if (state.currentQ < total - 1) {
    // Auto-advance after a smooth pause
    state.autoTimer = setTimeout(function() {
      transitionNext();
    }, 350);
  } else {
    // Last question → results; lock to prevent double submission
    state._locking = true;
    state.autoTimer = setTimeout(function() {
      var card = document.getElementById('quizCard');
      if (card) { card.classList.add('exit'); }
      setTimeout(function() { calcResults(); }, 200);
    }, 350);
  }
}

// ============================================================
//  SMOOTH TRANSITION TO NEXT QUESTION
// ============================================================
function transitionNext() {
  state._locking = true;
  var card = document.getElementById('quizCard');

  if (card) {
    card.classList.add('exit');
    // Wait for exit animation, then rebuild with enter animation
    setTimeout(function() {
      state.currentQ++;
      renderQuestion(true);
      state._locking = false;
    }, 180);
  } else {
    state.currentQ++;
    renderQuestion(false);
    state._locking = false;
  }
}

// ============================================================
//  PREVIOUS QUESTION — slide in reverse
// ============================================================
function prevQ() {
  if (state._locking) return;
  clearTimeout(state.autoTimer);
  if (state.currentQ > 0) {
    state._locking = true;
    state.currentQ--;
    renderQuestion(false); // instant when going back (no animation needed)
    state._locking = false;
  }
}

// ============================================================
// ============================================================
//  CALCULATE RESULTS
// ============================================================
function calcResults() {
  state.view = 'result';
  var test = TESTS[state.testKey];
  var scores = {};
  var counts = {};
  test.dimensions.forEach(function(d) { scores[d]=0; counts[d]=0; });

  // ---- 霍兰德计分（含兴趣/能力/回馈三维细分）----
  if (state.testKey === 'holland') {
    var aspectScores = {interest:{}, ability:{}, feedback:{}};
    var aspectRaws = {interest:{}, ability:{}, feedback:{}};
    test.dimensions.forEach(function(d) {
      aspectScores.interest[d]=0; aspectScores.ability[d]=0; aspectScores.feedback[d]=0;
      aspectRaws.interest[d]=0; aspectRaws.ability[d]=0; aspectRaws.feedback[d]=0;
    });

    var options = test.options || ANSWER_OPTS;
    var maxOption = options.length - 1;
    var defaultAnswer = Math.floor(maxOption / 2);

    test.questions.forEach(function(q, i) {
      var rawScore = state.answers[i] !== undefined ? state.answers[i] : defaultAnswer;
      scores[q.dim] += rawScore;
      counts[q.dim]++;
      if (q.aspect && aspectRaws[q.aspect]) {
        aspectRaws[q.aspect][q.dim] += rawScore;
      }
    });

    var maxScore = {};
    test.dimensions.forEach(function(d) {
      maxScore[d] = Math.round((scores[d] / (counts[d] * maxOption)) * 100);
    });

    // 三维细分：每维度每方面5题，满分5×4=20
    var aspCounts = {interest:{}, ability:{}, feedback:{}};
    test.dimensions.forEach(function(d){aspCounts.interest[d]=0;aspCounts.ability[d]=0;aspCounts.feedback[d]=0;});
    test.questions.forEach(function(q){if(q.aspect && aspCounts[q.aspect]) aspCounts[q.aspect][q.dim]++;});
    ['interest','ability','feedback'].forEach(function(asp) {
      test.dimensions.forEach(function(d) {
        var n = aspCounts[asp][d] || 1;
        aspectScores[asp][d] = Math.round((aspectRaws[asp][d] / (n * maxOption)) * 100);
      });
    });

    state.rawScores = scores;
    state.scores = maxScore;
    state.aspectScores = aspectScores;
    state.aspectRaws = aspectRaws;
    submitToSupabase(maxScore);
    saveAssessmentResult(maxScore);
    unlockFullReport(maxScore);
    return;
  }

  var options = test.options || ANSWER_OPTS;
  var maxOption = options.length - 1; // 0-based max index
  var defaultAnswer = Math.floor(maxOption / 2);

  test.questions.forEach(function(q, i) {
    var rawScore = state.answers[i] !== undefined ? state.answers[i] : defaultAnswer;
    var pointValue = rawScore;
    if (test.reverseItems && test.reverseItems.indexOf(i) !== -1) {
      pointValue = maxOption - rawScore;
    }
    scores[q.dim] += pointValue;
    counts[q.dim] += 1;
  });

  // Normalize to 0-100%
  var maxScore = {};
  test.dimensions.forEach(function(d) {
    maxScore[d] = Math.round((scores[d] / (counts[d] * maxOption)) * 100);
  });

  // Save raw and normalized scores
  state.rawScores = scores;
  state.scores = maxScore;

  // Submit to Supabase
  submitToSupabase(maxScore);

  // 同步保存到本地
  saveAssessmentResult(maxScore);

  // Unlock full report
  unlockFullReport(maxScore);
}

function renderBigFive(scores) {
  var test = TESTS.bigfive;
  var sorted = test.dimensions.map(function(d) { return {dim:d, score:scores[d]}; }).sort(function(a,b){return b.score-a.score;});
  var traitInfo = getBigFiveTraits();
  var bfNames = {E:'外向性', A:'宜人性', C:'尽责性', N:'神经质', O:'开放性'};
  var bfZones = {E:{lo:'内向沉静',hi:'外向活跃'}, A:{lo:'理性为先',hi:'情感细腻'}, C:{lo:'灵活随性',hi:'运筹帷幄'}, N:{lo:'从容淡定',hi:'情绪敏感'}, O:{lo:'保守务实',hi:'天马行空'}};
  var bfColors = test.dimColors || {E:'#F97316', A:'#10B981', C:'#3B82F6', N:'#EC4899', O:'#6366F1'};
  var advIcons = {study:'📚',social:'🤝',career:'💼',stress:'🧘'};

  // ===== 1. SVG 雷达图 =====
  var order = ['E','A','C','N','O']; // clockwise from top
  var cx = 160, cy = 160, r = 125;
  var angles = order.map(function(_,i){ return -Math.PI/2 + (2*Math.PI/5)*i; });
  function pt(a, dist) { return [cx + dist*Math.cos(a), cy + dist*Math.sin(a)]; }

  // Background grid
  var gridPaths = [];
  for (var lvl = 1; lvl <= 3; lvl++) {
    var lr = r * lvl / 3;
    var pts = angles.map(function(a){ var p=pt(a,lr); return p[0].toFixed(1)+','+p[1].toFixed(1); }).join(' ');
    gridPaths.push('<polygon points="'+pts+'" fill="none" stroke="'+(lvl===3?'#d1d5db':'#e5e7eb')+'" stroke-width="'+(lvl===3?2:1)+'"/>');
  }
  // Axis lines
  var axisLines = order.map(function(_,i){
    var p = pt(angles[i], r);
    return '<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="#e5e7eb" stroke-width="1"/>';
  }).join('');

  // Score polygon
  var scorePts = order.map(function(d,i){
    var dist = r * (scores[d]/100);
    var p = pt(angles[i], dist);
    return p[0].toFixed(1)+','+p[1].toFixed(1);
  }).join(' ');
  var scoreFill = '<polygon points="'+scorePts+'" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="2.5" stroke-linejoin="round"/>';

  // Score dots
  var scoreDots = order.map(function(d,i){
    var dist = r * (scores[d]/100);
    var p = pt(angles[i], dist);
    return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="5" fill="'+bfColors[d]+'" stroke="#fff" stroke-width="2"/>';
  }).join('');

  // Labels
  var labels = order.map(function(d,i){
    var labelR = r + 22;
    var p = pt(angles[i], labelR);
    var a = (angles[i] + Math.PI*2) % (Math.PI*2);
    var anchor = a < 0.001 || a > 6.28 || Math.abs(a-Math.PI) < 0.01 ? 'middle' : (a < Math.PI ? 'start' : 'end');
    return '<text x="'+p[0].toFixed(1)+'" y="'+p[1].toFixed(1)+'" text-anchor="'+anchor+'" dominant-baseline="middle" font-size="11" fill="#6b7280" font-weight="600">'+bfNames[d]+'</text>'+
      '<text x="'+p[0].toFixed(1)+'" y="'+(p[1]+14).toFixed(1)+'" text-anchor="'+anchor+'" dominant-baseline="middle" font-size="13" fill="'+bfColors[d]+'" font-weight="800">'+scores[d]+'%</text>';
  }).join('');

  var radarSvg = '<svg viewBox="0 0 320 340" class="bf-radar-svg" xmlns="http://www.w3.org/2000/svg">'+
    gridPaths.join('')+axisLines+scoreFill+scoreDots+labels+
  '</svg>';

  // ===== 2. 五维分数表 =====
  var tableRows = test.dimensions.map(function(d){
    var s = scores[d];
    var z = bfZones[d];
    var tagCls = s >= 61 ? 'high' : (s >= 41 ? 'mid' : 'low');
    var tagText = s >= 61 ? z.hi : (s >= 41 ? '中等' : z.lo);
    return '<tr>'+
      '<td>'+bfNames[d]+'</td>'+
      '<td><div class="bf-td-bar-wrap"><div class="bf-td-bar"><div class="bf-td-bar-fill" style="width:'+s+'%;background:'+bfColors[d]+'"></div></div><span class="bf-td-val">'+s+'%</span></div></td>'+
      '<td><span class="bf-td-tag '+tagCls+'">'+tagText+'</span></td>'+
    '</tr>';
  }).join('');

  var tableHtml = '<div class="bf-table-card">'+
    '<div class="bf-table-title">📊 五维得分表</div>'+
    '<table class="bf-table">'+
    '<thead><tr><th>维度</th><th>得分</th><th>倾向</th></tr></thead>'+
    '<tbody>'+tableRows+'</tbody>'+
    '</table></div>';

  // ===== 3. 每个维度一句话解释 =====
  var oneLinerItems = test.dimensions.map(function(d){
    var info = traitInfo[d];
    var isHigh = scores[d] >= 50;
    return '<div class="bf-oneliner-item">'+
      '<span class="bf-oneliner-dot" style="background:'+bfColors[d]+'"></span>'+
      '<div class="bf-oneliner-text"><strong>'+bfNames[d]+'：</strong>'+(isHigh ? info.oneLiner.high : info.oneLiner.low)+'</div>'+
    '</div>';
  }).join('');

  var oneLinerHtml = '<div class="bf-oneliner-card">'+
    '<div class="bf-oneliner-title">💡 五维一句话解读</div>'+
    oneLinerItems+
  '</div>';

  // ===== 4. 应用建议 =====
  var adviceKeys = ['study','social','career','stress'];
  var adviceLabels = {study:'学习建议',social:'人际建议',career:'职业探索',stress:'压力管理'};

  var adviceItems = adviceKeys.map(function(key){
    // 取最高和最低两个维度的建议
    var topD = sorted[0].dim, bottomD = sorted[4].dim;
    var topHigh = sorted[0].score >= 50;
    var botHigh = sorted[4].score >= 50;
    var topAdv = topHigh ? traitInfo[topD].advice.high[key] : traitInfo[topD].advice.low[key];
    var botAdv = botHigh ? traitInfo[bottomD].advice.low[key] : traitInfo[bottomD].advice.high[key];
    return '<div class="bf-advice-item" style="border-left-color:'+bfColors[topD]+'">'+
      '<div class="bf-advice-label">'+advIcons[key]+' '+adviceLabels[key]+'</div>'+
      '<div class="bf-advice-text">'+topAdv+'</div>'+
    '</div>';
  }).join('');

  var adviceHtml = '<div class="bf-advice-card">'+
    '<div class="bf-advice-title">🎯 应用版建议</div>'+
    '<div class="bf-advice-subtitle">基于你最突出维度「'+bfNames[sorted[0].dim]+'」的个性化指导</div>'+
    '<div class="bf-advice-grid">'+adviceItems+'</div>'+
  '</div>';

  document.getElementById('pageBody').innerHTML =
    '<div class="page-header"><div class="page-title">大五人格报告</div><div class="page-subtitle">OCEAN 五维人格分析</div></div>'+
    '<div class="report-export-wrap" id="reportExportWrap">'+
    buildReportInfoBar()+
    '<div class="bf-radar-card"><div class="bf-radar-title">五维雷达图</div>'+radarSvg+'</div>'+
    tableHtml+
    oneLinerHtml+
    adviceHtml+
    '</div>'+
    buildExportBtnRow();
}

// 根据霍兰德三码生成规划方案
function generateHollandPlan(code, top3) {
  var dimNames = {
    R: '现实型', I: '研究型', A: '艺术型',
    S: '社会型', E: '企业型', C: '常规型'
  };
  var dimCareerMap = {
    R: ['技术/工程类', '操作/运维类', '户外/体育类'],
    I: ['研究/分析类', '数据/研发类', '学术/科研类'],
    A: ['设计/创意类', '文案/媒体类', '艺术/表演类'],
    S: ['教育/培训类', '咨询/服务类', '社工/护理类'],
    E: ['管理/销售类', '创业/市场类', '领导/协调类'],
    C: ['行政/财务类', '文档/审计类', '流程/质控类']
  };
  var dimActions = {
    R: ['参加一次实操实训或技能工作坊，积累动手能力',
        '考取与你目标职业相关的 1 项技能证书',
        '使用专业工具完成一个小项目并记录过程'],
    I: ['精读 1 本专业领域论文或行业研究报告',
        '尝试独立完成一个数据分析/实验探究类小课题',
        '学习一种研究或分析方法论（如 SPSS、Python 数据分析等）'],
    A: ['整理并更新个人作品集，展示你的创意成果',
        '参加一次创意工作坊、设计比赛或艺术展览',
        '学习 1 个相关创作工具（如 PS、剪辑、写作等）'],
    S: ['参与志愿服务或社会实践，锻炼沟通与助人能力',
        '加入社团或学生组织，担任一次活动策划或主持人',
        '与 1 位目标职业前辈进行深度访谈或职业咨询'],
    E: ['参加一次商业模拟、创业比赛或路演活动',
        '主动牵头完成一个小组项目，锻炼团队领导力',
        '学习项目管理、市场营销或财务基础中的 1 项'],
    C: ['建立个人学习与职业档案，养成系统记录习惯',
        '熟练使用办公软件，完成一次数据整理或流程优化任务',
        '参加行政、财务或办公自动化相关培训']
  };
  var commonSteps = [
    '调研 2-3 个目标职业的入职要求、薪资路径与行业趋势',
    '用 SMART 原则把本方案细化为可执行的周计划'
  ];
  var d1 = top3[0].dim, d2 = top3[1].dim, d3 = top3[2].dim;
  var title = code + ' 职业探索与发展计划';
  var careerTypes = (dimCareerMap[d1] || []).slice(0, 2).join('、') + '，兼顾 ' + (dimCareerMap[d2] || []).slice(0, 1).join('') + '与' + (dimCareerMap[d3] || []).slice(0, 1).join('') + '方向';
  var desc = '你的核心优势偏向「' + dimNames[d1] + '」，同时兼具「' + dimNames[d2] + '」与「' + dimNames[d3] + '」特质。推荐优先关注：' + careerTypes + '。';
  var steps = [];
  // 为 top3 各取 2 个行动建议
  [d1, d2, d3].forEach(function(d) {
    var actions = dimActions[d] || [];
    steps.push(actions[0]);
    if (actions[1]) steps.push(actions[1]);
  });
  // 加入通用步骤
  steps = steps.concat(commonSteps);
  return { title: title, desc: desc, cat: '技能提升', steps: steps };
}

// 把当前规划方案加入目标列表
function addPlanToGoals() {
  var plan = state.currentPlan || generateHollandPlan(state.lastHollandCode || 'RIASEC', []);
  if (!plan || !plan.steps) { showToast('暂无可用方案'); return; }

  var STORAGE_KEY = 'career_goals_v2';
  var goals = [];
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) goals = JSON.parse(raw);
  } catch(e) {}
  if (!Array.isArray(goals)) goals = [];

  var d = new Date();
  d.setDate(d.getDate() + 30);
  var deadline = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

  var goal = {
    id: Date.now(),
    title: plan.title,
    desc: plan.desc,
    cat: plan.cat || '技能提升',
    color: 'linear-gradient(90deg,#1d4ed8,#60a5fa)',
    deadline: deadline,
    done: false,
    steps: plan.steps.map(function(s) { return {text: s, done: false}; }),
    progress: 0
  };
  goals.push(goal);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(goals));
    showToast('已加入目标，即将跳转…');
    setTimeout(function() { window.location.href = 'goals.html'; }, 900);
  } catch(e) {
    showToast('保存失败：' + e.message);
  }
}

// ============================================================
function renderMbti(scores) {
  var test = TESTS.mbti;
  var EorI = scores.EI >= 50 ? 'E' : 'I';
  var SorN = scores.SN >= 50 ? 'S' : 'N';
  var TorF = scores.TF >= 50 ? 'T' : 'F';
  var JorP = scores.JP >= 50 ? 'J' : 'P';
  var mbtiType = EorI + SorN + TorF + JorP;
  var info = getMbtiInfo(mbtiType);
  var group = getMbtiGroup(mbtiType);
  var groupName = getMbtiGroupName(group);
  var accentColor = getMbtiGroupColor(group);
  var photoUrl = getMbtiPhotoUrl(mbtiType);

  // 1. 顶部横幅：左侧文字 + 右侧人物照片
  var heroHtml =
    '<div class="mbti-hero">'+
      '<div class="mbti-hero-bg"></div>'+
      '<div class="mbti-hero-content">'+
        '<div class="mbti-hero-left">'+
          '<div class="mbti-hero-label">你的人格类型是</div>'+
          '<div class="mbti-hero-type">'+info.name+'</div>'+
          '<div class="mbti-hero-code">'+mbtiType+'</div>'+
        '</div>'+
        '<img class="mbti-hero-img" src="'+photoUrl+'" alt="'+info.name+'">'+
      '</div>'+
    '</div>';

  // 2. 类型介绍文案
  var introHtml =
    '<div class="mbti-intro-text">'+
      '<p>作为一名 <b>'+mbtiType+'（'+info.name+'）</b>，'+info.desc+'</p>'+
      '<p>你属于 <b>'+groupName+'</b> 阵营，这一人格群体通常以'+info.traits.join('、')+'著称。'+info.relationships+' '+info.growth+'</p>'+
    '</div>';

  // 3. 全宽场景人物图片已移除，只保留顶部人物照片

  // 4. 维度条：截图风格（单色填充+白圆点+5个维度）
  // 身份特征(A-T)：基于已有维度推算（N/T/P高→Turbulent高）
  var identityPct = Math.round(
    ((scores.SN < 50 ? (100-scores.SN)*0.3 : scores.SN*0.1) +
     (scores.TF >= 50 ? scores.TF*0.3 : (100-scores.TF)*0.1) +
     (scores.JP < 50 ? (100-scores.JP)*0.3 : scores.JP*0.1)) * 1.1
  );
  identityPct = Math.max(35, Math.min(75, identityPct)); // 35-75范围
  var mbtiDims = [
    {key:'EI', label:'能量', leftText:'外向', rightText:'内向', color:'#3B82F6'},
    {key:'SN', label:'心智', leftText:'感觉', rightText:'直觉', color:'#F59E0B'},
    {key:'TF', label:'天性', leftText:'思维', rightText:'情感', color:'#10B981'},
    {key:'JP', label:'应对方式', leftText:'判断', rightText:'感知', color:'#8B5CF6'},
    {_pct:identityPct, label:'身份特征', leftText:'自信果断', rightText:'情绪易波动', color:'#EF4444'}
  ];
  var dimsHtml = mbtiDims.map(function(d){
    var s, isLeft;
    if (d._pct !== undefined) {
      s = d._pct; isLeft = s < 50; // 身份特征：<50=Assertive(左), ≥50=Turbulent(右)
    } else {
      s = Math.round(scores[d.key]); isLeft = s >= 50;
    }
    var activeText = isLeft ? d.leftText : d.rightText;
    return '<div class="mbti-dim-row">'+
      '<div class="mbti-dim-header">'+
        '<span class="mbti-dim-label" style="color:'+d.color+'">'+d.label+'</span>'+
        '<span class="mbti-dim-pct" style="color:'+d.color+'">'+s+'% '+activeText+'</span>'+
        '<span class="mbti-dim-help">?</span>'+
      '</div>'+
      '<div class="mbti-dim-track-wrap">'+
        '<div class="mbti-dim-track">'+
          '<div class="mbti-dim-fill" style="width:'+s+'%;background:'+d.color+'"></div>'+
        '</div>'+
        '<div class="mbti-dim-dot" style="left:'+s+'%;border-color:'+d.color+'"></div>'+
      '</div>'+
      '<div class="mbti-dim-footer">'+
        '<span>'+d.leftText+'</span>'+
        '<span>'+d.rightText+'</span>'+
      '</div>'+
    '</div>';
  }).join('');

  var section1Html =
    '<div class="mbti-section-title"><div class="mbti-section-num">1</div><div>人格特征</div></div>'+
    '<div class="mbti-dim-card">'+dimsHtml+'</div>';

  // 5. 人格画像
  var section2Html =
    '<div class="mbti-section-title"><div class="mbti-section-num">2</div><div>人格画像</div></div>'+
    '<div class="mbti-desc-card">'+
      '<p>作为一名 '+info.name+'，你的核心特质包括 <b>'+info.traits.join('、')+'</b>。'+info.desc+'</p>'+
      '<p>'+info.relationships+'</p>'+
      '<p>'+info.growth+'</p>'+
    '</div>';

  // 6. 个人成长
  var section3Html =
    '<div class="mbti-section-title"><div class="mbti-section-num">3</div><div>个人成长</div></div>'+
    '<div class="mbti-desc-card">'+
      '<p>'+info.growth+'</p>'+
      '<p>尽管你在 '+info.traits.join('、')+' 上展现出独特优势，也要注意在关系与目标之间找到平衡。持续探索自我，会让你在成长之路上走得更稳、更远。</p>'+
    '</div>';

  var allHtml = heroHtml + introHtml + section1Html + section2Html + section3Html;

  document.getElementById('pageBody').innerHTML =
    '<div class="page-header"><div class="page-title">测评结果</div><div class="page-subtitle">16种人格 · '+info.name+'</div></div>'+
    '<div class="report-export-wrap mbti-report mbti-report-'+group+'" id="reportExportWrap">'+
    buildReportInfoBar()+
    allHtml +
    '</div>'+
    buildExportBtnRow();
}

function showToast(msg) {
  var el = document.getElementById('toastEl');
  el.textContent = msg;
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(window._tt);
  window._tt = setTimeout(function(){el.style.transform='translateX(-50%) translateY(-120px)';},2000);
}

// ============================================================
//  EXPORT REPORT AS IMAGE
// ============================================================
function exportReport() {
  // If not yet verified, show verification overlay first
  if (!state._schoolVerified) {
    renderExportVerifyOverlay();
    return;
  }

  var btn = document.getElementById('exportBtn');
  if (btn) { btn.disabled = true; btn.textContent = '正在生成...'; }

  var target = document.getElementById('reportExportWrap') || document.getElementById('pageBody');
  if (!target) return;

  // Temporarily hide buttons during capture
  var btnRow = target.querySelector('.btn-row');
  var btnRowDisplay = btnRow ? btnRow.style.display : '';
  if (btnRow) btnRow.style.display = 'none';

  html2canvas(target, {
    scale: 2,
    backgroundColor: '#F0F4FF',
    useCORS: true,
    logging: false,
    scrollY: 0,
    windowWidth: 390
  }).then(function(canvas) {
    // Restore buttons
    if (btnRow) btnRow.style.display = btnRowDisplay;

    // Download as PNG
    var testName = TESTS[state.testKey] ? TESTS[state.testKey].name : '测评';
    var studentSchool = (state.studentInfo && state.studentInfo.school) || '';
    var fileName = testName + '_' + (studentSchool || '报告') + '_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '') + '.png';

    var link = document.createElement('a');
    link.download = fileName;
    link.href = canvas.toDataURL('image/png');
    link.click();

    if (btn) { btn.disabled = false; btn.textContent = '导出报告'; }
    showToast('✅ 报告已导出！');
  }).catch(function(err) {
    console.error('Export failed:', err);
    if (btnRow) btnRow.style.display = btnRowDisplay;
    if (btn) { btn.disabled = false; btn.textContent = '导出报告'; }
    showToast('❌ 导出失败，请重试');
  });
}

function doExportVerify() {
  var input = document.getElementById('exportSchoolInput');
  var errorEl = document.getElementById('exportVerifyError');
  var schoolName = (input.value || '').trim();

  if (!schoolName) {
    errorEl.textContent = '❌ 请输入学校名称';
    input.classList.add('error');
    input.focus();
    setTimeout(function() { input.classList.remove('error'); }, 500);
    return;
  }

  if (typeof verifySchool === 'function' && verifySchool(schoolName)) {
    // Store verified school info
    state._schoolVerified = true;
    if (!state.studentInfo) state.studentInfo = {};
    state.studentInfo.school = schoolName;

    // Close overlay with animation
    var card = document.getElementById('exportVerifyOverlay');
    if (card) {
      card.style.transition = 'opacity 0.35s ease';
      card.style.opacity = '0';
      setTimeout(function() {
        closeVerifyOverlay();

function verifySchoolCode() {
  var input = document.getElementById('schoolVerifyInput');

  if (!schoolName) {

    // Retry submission now that we have student info
    if (state.scores) submitToSupabase(state.scores);

    setTimeout(function() { input.classList.remove('error'); }, 500);
  }
}

      var EorI = scores.EI >= 50 ? 'E' : 'I';

      var TorF = scores.TF >= 50 ? 'T' : 'F';
      var JorP = scores.JP >= 50 ? 'J' : 'P';

}

// ============================================================
//  BUILD SCORES HTML
// ============================================================
function buildScoresHtml(scores, test) {
  var sorted = test.dimensions.map(function(d){return {dim:d,score:scores[d]};}).sort(function(a,b){return b.score-a.score;});

  // Holland: 16personalities style with circle dot markers
  var colors = test.dimColors || {};
  var hollandEnds = {
    R: {left:'动手实操', right:'创意想象'},
    I: {left:'逻辑分析', right:'感性体验'},
    A: {left:'务实严谨', right:'自由创作'},
    S: {left:'独立工作', right:'助人合作'},
    E: {left:'执行落实', right:'引领影响'},
    C: {left:'灵活创新', right:'规范有序'}
  };
  return sorted.map(function(e) {
    var color = colors[e.dim] || '#6366f1';
    var name = test.dimNames[e.dim].split(' ')[0];
    var isHigh = e.score >= 50;
    var actTend = isHigh ? '较高' : '较低';
    var ends = hollandEnds[e.dim] || {left:'较低', right:'较高'};
    return '<div class="dim-section">'+
      '<div class="dim-section-header">'+
        '<span class="dim-section-label">'+name+': <span style="color:'+color+'">'+e.score+'% '+actTend+'</span></span>'+
      '</div>'+
      '<div class="dim-section-bar-wrap">'+
        '<div class="dim-section-bar" style="width:'+e.score+'%;background:'+color+'"></div>'+
        '<div class="dim-section-dot" style="left:'+e.score+'%;border-color:'+color+'"></div>'+
      '</div>'+
      '<div class="dim-section-footer">'+
        '<span>'+ends.left+'</span><span>'+ends.right+'</span>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ============================================================
//  HOLLAND ANALYSIS TEXT
// ============================================================
function getHollandAnalysis(code, sorted) {
  var test = TESTS.holland;
  var top3 = sorted.slice(0,3);
  var typeNames = getHollandTypeNames();
  var typeName = typeNames[code] || '综合型';

  var dimDescs = {
    R: '动手能力强，偏好使用工具和机械',
    I: '善于思考分析，偏好研究和探索',
    A: '富有创意想象，偏好艺术和表达',
    S: '乐于帮助他人，偏好服务和沟通',
    E: '具有领导才能，偏好管理和说服',
    C: '注重规范细节，偏好数据和事务'
  };

  var intro = '你的霍兰德职业兴趣代码为 <b>' + code + '</b>（' + typeName + '）。';

  var top = top3[0], second = top3[1], third = top3[2];
  var d1 = test.dimNames[top.dim].split(' ')[0];
  var d2 = test.dimNames[second.dim].split(' ')[0];
  var d3 = test.dimNames[third.dim].split(' ')[0];

  var analysis =
    '你最突出的维度是 <b>' + d1 + '（' + top.dim + '）</b>，得分 ' + top.score + '%，说明' + dimDescs[top.dim] + '。' +
    '其次是 <b>' + d2 + '（' + second.dim + '）</b>，得分 ' + second.score + '%，反映你' + dimDescs[second.dim].replace('偏好','同时具备').replace('善于','同时具备') + '。';

  if (third.score >= 40) {
    analysis += '第三维度 <b>' + d3 + '（' + third.dim + '）</b>也有一定倾向，说明' + dimDescs[third.dim].replace('偏好','在某些场景下也') + '。';
  }

  analysis += '<br><br><b>适合方向：</b>你的三码组合暗示你适合从事与 "' + d1 + '、' + d2 + '、' + d3 + '" 相关的职业领域，可重点考虑融合这些特质的工作。';

  return intro + '<br><br>' + analysis;
}

  return 'diplomats';

// ============================================================
//  SAVE RESULT TO LOCAL STORAGE (for "我的" page)
// ============================================================
function saveAssessmentResult(scores) {
  try {
    var test = TESTS[state.testKey];
    var now = new Date().toISOString();
    var sorted = test.dimensions.map(function(d){return {dim:d,score:scores[d]};}).sort(function(a,b){return b.score-a.score;});
    var payload = { type: state.testKey, name: test.name, completedAt: now, scores: scores };

    if (state.testKey === 'holland') {
      payload.code = sorted.slice(0,3).map(function(e){return e.dim;}).join('');
      var typeNames = getHollandTypeNames();
      payload.summary = typeNames[payload.code];
      if (!payload.summary) {
        var dims = sorted.slice(0,3).map(function(e){return test.dimNames[e.dim].split(' ')[0];});
        payload.summary = dims[0] + '·' + dims[1] + '·' + dims[2] + '型';
      }
      // 保存三维评分数据（兴趣/能力/回馈）
      if (state.aspectScores) payload.aspectScores = state.aspectScores;
      if (state.aspectRaws) payload.aspectRaws = state.aspectRaws;
      localStorage.setItem('holland_result', JSON.stringify(payload));
    } else if (state.testKey === 'mbti') {
      payload.type = (scores.EI>=50?'E':'I') + (scores.SN>=50?'S':'N') + (scores.TF>=50?'T':'F') + (scores.JP>=50?'J':'P');
      payload.summary = getMbtiInfo(payload.type).name;
      localStorage.setItem('mbti_result', JSON.stringify(payload));
    } else if (state.testKey === 'strength') {
      payload.type = sorted[0].dim;
      payload.summary = test.dimNames[sorted[0].dim];
      localStorage.setItem('strength_result', JSON.stringify(payload));
    } else if (state.testKey === 'bigfive') {
      payload.summary = test.dimNames[sorted[0].dim];
      localStorage.setItem('bigfive_result', JSON.stringify(payload));
    }
  } catch(e) { console.warn('saveAssessmentResult failed', e); }
}

function submitToSupabase(scores) {
  if (!state.studentInfo) return;
  // 防止重复提交（同一套测试只提交一次）
  if (state._submitted) { console.log('[submitToSupabase] 已提交，跳过重复'); return; }
  state._submitted = true;
  
  if (typeof saveSubmission !== 'function') {
    console.warn('saveSubmission 函数未加载，跳过提交');
    showToast('⚠️ 配置未加载，结果仅保存在本地');
    return;
  }
  var test = TESTS[state.testKey];

  // Build a result code/summary based on test type
  var resultCode = '';
  var resultSummary = '';
  var sorted = test.dimensions.map(function(d){return {dim:d,score:scores[d]};}).sort(function(a,b){return b.score-a.score;});

  if (state.testKey === 'holland') {
    resultCode = sorted.slice(0,3).map(function(e){return e.dim;}).join('');
    var typeNames = getHollandTypeNames();
    resultSummary = typeNames[resultCode];
    if (!resultSummary) {
      var dims = sorted.slice(0,3).map(function(e){return test.dimNames[e.dim].split(' ')[0];});
      resultSummary = dims[0] + '·' + dims[1] + '·' + dims[2] + '型';
    }
  } else if (state.testKey === 'mbti') {
    resultCode = (scores.EI>=50?'E':'I') + (scores.SN>=50?'S':'N') + (scores.TF>=50?'T':'F') + (scores.JP>=50?'J':'P');
    var info = getMbtiInfo(resultCode);
    resultSummary = info.name;
  } else if (state.testKey === 'strength') {
    resultCode = sorted[0].dim;
    resultSummary = test.dimNames[sorted[0].dim];
  } else {
    resultCode = sorted[0].dim;
    resultSummary = test.dimNames[sorted[0].dim];
  }

  var si = state.studentInfo || {};
  var payload = {
    name: si.name || '',
    school: si.school || '',
    student_id: si.studentId || '',
    class_name: si.className || '',
    test_type: state.testKey,
    test_name: test.name,
    answers: state.answers,
    scores: scores,
    result_code: resultCode,
    result_summary: resultSummary
  };

  // 如果 db 未初始化，尝试重新初始化（最多尝试 3 次，每次间隔 500ms）
  if (typeof isDbReady === 'function' && !isDbReady() && typeof initSupabase === 'function') {
    for (var retry = 0; retry < 3; retry++) {
      if (initSupabase()) break;
    }
    if (!isDbReady()) {
      console.warn('[submitToSupabase] Supabase 仍未就绪，将降级到本地存储');
    }
  }

  saveSubmission(payload).then(function(result) {
    if (result && result.savedToCloud) {
      console.log('✅ 测评结果已提交给老师');
      showToast('✅ 测评结果已同步到教师端');
    } else {
      console.warn('测评结果已保存到本地，未同步到云端');
      showToast('⚠️ 结果已保存本地，但未同步到云端，请检查网络');
    }
  }).catch(function(err) {
    console.error('提交失败(不影响查看结果):', err);
    // 打印更多诊断信息
    console.error('[诊断] error.code:', err.code, 'error.message:', err.message);
    console.error('[诊断] db状态:', typeof isDbReady === 'function' ? (isDbReady() ? '已连接' : '未连接') : '未知');
    console.error('[诊断] 测试类型:', state.testKey);
    showToast('❌ 同步失败：' + (err.message || '请检查网络'));
  });
}

// ============================================================
//  INIT
// ============================================================
console.log('[DEBUG] assessment.html v20260709-09 loaded');
console.log('[DEBUG] TESTS available:', typeof TESTS !== 'undefined' ? Object.keys(TESTS).join(', ') : 'UNDEFINED');
state._locking = false;
// 调用 config.js 的 initSupabase()，设置全局 db 变量
try {
  if (typeof initSupabase === 'function') {
    initSupabase();
  } else {
    console.warn('config.js 未加载，Supabase 无法初始化');
  }
} catch(e) {
  console.warn('Supabase 初始化失败(不影响测评):', e.message);
  window.db = null;
}
// 优先恢复已保存的学生信息，没有则先填写
(function(){
  // 检查URL参数：从"我的"页面跳转查看历史测评结果
  var params = new URLSearchParams(window.location.search);
  var viewParam = params.get('view');
  var typeParam = params.get('type');
  
  if (viewParam === 'result' && typeParam) {
    // 从localStorage加载历史测评结果
    var keyMap = { holland:'holland_result', mbti:'mbti_result', bigfive:'bigfive_result', strength:'strength_result' };
    var storageKey = keyMap[typeParam];
    if (storageKey) {
      try {
        var savedResult = JSON.parse(localStorage.getItem(storageKey) || 'null');
        if (savedResult && savedResult.scores) {
          state.testKey = typeParam;
          state.scores = savedResult.scores;
          state.view = 'result';
          state._viewingHistory = true;
          // 恢复三维评分数据（兼容旧版moduleScores和moduleRaws）
          if (savedResult.aspectScores) state.aspectScores = savedResult.aspectScores;
          if (savedResult.aspectRaws) state.aspectRaws = savedResult.aspectRaws;
          if (savedResult.moduleScores && !state.aspectScores) state.aspectScores = savedResult.moduleScores;
          if (savedResult.moduleRaws && !state.aspectRaws) state.aspectRaws = savedResult.moduleRaws;
          // 恢复学生信息
          try {
            var savedInfo = localStorage.getItem('assessment_student_info');
            if (savedInfo) {
              state.studentInfo = JSON.parse(savedInfo);
              state._schoolVerified = true;
            }
          } catch(e) {}
          // 直接渲染报告
          unlockFullReport(savedResult.scores);
          return;
        }
      } catch(e) {
        console.warn('加载历史测评结果失败:', e);
      }
    }
  }
  
  try {
    var saved = localStorage.getItem('assessment_student_info');
    if (saved) {
      state.studentInfo = JSON.parse(saved);
      state._schoolVerified = true;  // 已保存的信息在填写时已验证过学校
      renderSelect();
    }
    else { renderStudentInfo(); }
  } catch(e) { renderStudentInfo(); }
})();
</script>

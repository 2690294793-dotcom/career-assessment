<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>规划方案 · 自在生涯工作室</title>
<style>
:root {
  --bg: #faf5ff;
  --card: #FFFFFF;
  --text-primary: #1e1b4b;
  --text-secondary: #6B7280;
  --text-light: #9CA3AF;
  --border: #E5E7EB;
  --primary: #7e22ce;
  --primary-dark: #4c1d95;
  --primary-light: #faf5ff;
  --accent: #a855f7;
  --radius-sm: 14px;
  --radius-md: 20px;
}
* { margin:0; padding:0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 16px;
  -webkit-font-smoothing: antialiased;
}

.phone-frame {
  width: 390px; height: 844px;
  background: linear-gradient(180deg, #ede9fe 0%, #faf5ff 35%, #ffffff 100%);
  border-radius: 42px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(76,29,149,0.15), 0 0 0 1px rgba(126,34,206,0.08);
  display: flex; flex-direction: column;
}

/* Nav Header */
.nav-header {
  height: 52px; padding: 0 18px;
  display: flex; align-items: center; justify-content: space-between;
  background: transparent; flex-shrink: 0;
}
.nav-back {
  width: 32px; height: 32px; border-radius: 50%;
  background: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--text-primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  text-decoration: none;
}
.nav-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
.nav-placeholder { width: 32px; }

/* Scroll Area */
.scroll-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; padding: 0 18px 16px;
}
.scroll-area::-webkit-scrollbar { width: 0; }

/* Page Header */
.page-header { text-align: center; padding: 8px 0 16px; }
.page-header h1 {
  font-size: 24px; font-weight: 800;
  background: linear-gradient(135deg, #4c1d95, #7e22ce);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.page-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

/* Input Form */
.form-card {
  background: #fff; border-radius: var(--radius-md);
  padding: 18px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  margin-bottom: 16px;
}
.form-section-title {
  font-size: 15px; font-weight: 700; color: var(--primary);
  margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
}
.input-row { margin-bottom: 12px; }
.input-row label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-primary); margin-bottom: 5px;
}
.input-row label .req { color: #ef4444; }
.input-row input, .input-row select, .input-row textarea {
  width: 100%; padding: 11px 14px;
  border: 2px solid var(--border); border-radius: 12px;
  font-size: 14px; font-family: inherit; color: var(--text-primary);
  background: #fafafa; outline: none; transition: border-color .2s, background .2s;
}
.input-row input:focus, .input-row select:focus, .input-row textarea:focus {
  border-color: var(--primary); background: #fff;
}
.input-row textarea { resize: vertical; min-height: 60px; }
.input-row select {
  appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%239CA3AF' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 14px center;
  padding-right: 36px;
}
.inline-2 { display: flex; gap: 10px; }
.inline-2 .input-row { flex: 1; }

.generate-btn {
  width: 100%; padding: 14px; border: none; border-radius: 24px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: transform .15s;
  box-shadow: 0 4px 16px rgba(126,34,206,0.3); margin-top: 4px;
}
.generate-btn:active { transform: scale(0.98); }

/* Plan Result */
.plan-result { display: none; margin-bottom: 16px; }
.plan-result.show { display: block; animation: fadeIn .4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.plan-header {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border-radius: var(--radius-md); padding: 20px 18px;
  color: #fff; margin-bottom: 14px; text-align: center;
}
.plan-header .plan-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.plan-header .plan-subtitle { font-size: 12px; opacity: 0.85; }
.plan-header .plan-date { font-size: 11px; opacity: 0.6; margin-top: 8px; }

.plan-section {
  background: #fff; border-radius: var(--radius-md);
  padding: 16px; margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.plan-section-header {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 700; color: var(--text-primary);
  margin-bottom: 12px;
}
.plan-section-header .psi {
  width: 32px; height: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.psi.purple { background: #ede9fe; }
.psi.blue { background: #dbeafe; }
.psi.green { background: #dcfce7; }
.psi.amber { background: #fef3c7; }
.psi.rose { background: #fce7f3; }

.plan-item {
  display: flex; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid #f3f4f6;
}
.plan-item:last-child { border-bottom: none; }
.plan-item-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); margin-top: 6px; flex-shrink: 0;
}
.plan-item-body { flex: 1; }
.plan-item-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.plan-item-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-top: 2px; }

.plan-actions {
  display: flex; gap: 10px; margin-top: 4px;
}
.save-plan-btn {
  flex: 1; padding: 13px; border: none; border-radius: 20px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: inherit; box-shadow: 0 4px 14px rgba(126,34,206,0.25);
  transition: transform .15s;
}
.save-plan-btn:active { transform: scale(0.98); }
.regen-btn {
  padding: 13px 20px; border: 2px solid var(--border); border-radius: 20px;
  background: #fff; color: var(--text-secondary); font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all .2s;
}
.regen-btn:active { background: #f9fafb; }

/* Saved Plans */
.saved-section { margin-top: 6px; }
.saved-section-title {
  font-size: 15px; font-weight: 700; color: var(--text-primary);
  margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.saved-empty {
  text-align: center; padding: 30px 20px;
  color: var(--text-light);
}
.saved-empty .se-icon { font-size: 36px; margin-bottom: 8px; }
.saved-empty p { font-size: 13px; }
.saved-card {
  background: #fff; border-radius: var(--radius-md);
  padding: 14px 16px; margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  border-left: 4px solid var(--primary);
  transition: transform .15s;
}
.saved-card:active { transform: scale(0.98); }
.saved-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.saved-card-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.saved-card-date { font-size: 11px; color: var(--text-light); }
.saved-card-info { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 6px; }
.saved-card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.saved-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 8px;
  background: #ede9fe; color: var(--primary); font-weight: 600;
}
.saved-card-actions { display: flex; gap: 8px; margin-top: 8px; }
.saved-view-btn {
  flex: 1; padding: 8px; border: 1.5px solid var(--primary); border-radius: 14px;
  background: transparent; color: var(--primary); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.saved-sync-btn {
  flex: 1; padding: 8px; border: 1.5px solid #10b981; border-radius: 14px;
  background: transparent; color: #10b981; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.saved-del-btn {
  padding: 8px 14px; border: 1.5px solid #fecaca; border-radius: 14px;
  background: transparent; color: #ef4444; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}

/* Bottom Nav */
.bottom-nav {
  height: 58px; background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  z-index: 100; flex-shrink: 0; padding: 0 4px;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  text-decoration: none; cursor: pointer; flex: 1; padding: 6px 0;
  -webkit-tap-highlight-color: transparent;
  color: var(--text-light); transition: color 0.2s;
}
.nav-item svg { width: 22px; height: 22px; }
.nav-item span { font-size: 10px; font-weight: 500; }
.nav-item.active { color: var(--primary); }

/* Toast */
.toast-el {
  position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-120px);
  background: var(--text-primary); color: #fff; padding: 11px 22px; border-radius: 14px;
  font-size: 14px; font-weight: 500; z-index: 9999;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15); pointer-events: none;
  transition: transform .35s cubic-bezier(.175,.885,.32,1.275); white-space: nowrap;
}

/* Plan Detail Overlay */
.detail-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500;
  display: none; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s;
}
.detail-overlay.show { display: flex; opacity: 1; }
.detail-box {
  width: 340px; max-height: 78vh; overflow-y: auto;
  background: #fff; border-radius: 22px; padding: 20px 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative;
}
.detail-close {
  position: absolute; top: 12px; right: 14px;
  width: 28px; height: 28px; border-radius: 50%;
  background: #f1f5f9; border: none; cursor: pointer;
  font-size: 16px; color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
}
.detail-title { font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.detail-sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 14px; }
</style>

// ============ Default Plan Generator ============
function getDefaultCareerPlan(career, major) {
  // 基于职业方向名称和专业的通用规划模板
  var firstStage = '初级' + career.replace(/[（(].*[）)]/g, '').replace(/技术|工程|管理|设计|运营|开发/g, '').replace(/与.*$/g, '') + '师/专员';
  if (firstStage.length < 4) firstStage = '初级' + career.replace(/[（(].*[）)]/g, '').substring(0, 3) + '岗';
  return {
    icon: '🎯', color: 'indigo',
    roadmap: [
      {title: firstStage, desc: '掌握岗位基础技能，熟悉行业工作流程与业务规范'},
      {title: '中级专业人员', desc: '能够独立承担项目任务，解决常见专业问题'},
      {title: '高级/资深专家', desc: '主导重点项目，具备系统思维和跨领域协作能力'},
      {title: '管理/专家路线', desc: '成为团队负责人或领域专家，制定技术标准与业务策略'}
    ],
    timeline: function(grade) {
      var base = [];
      if (grade === '大一' || grade === '大二') {
        base.push({title: '专业基础', desc: '认真学习' + major + '核心课程，打牢专业理论基础'});
        base.push({title: '技能拓展', desc: '了解' + career + '所需工具/证书/技能，参加相关社团或竞赛'});
        base.push({title: '实践入门', desc: '利用假期参加认知实习或企业参观，建立行业认知'});
      } else if (grade === '大三') {
        base.push({title: '技能强化', desc: '针对' + career + '方向，系统学习岗位核心技能并做项目练习'});
        base.push({title: '实习积累', desc: '积极投递相关企业实习，积累真实工作经验'});
        base.push({title: '秋招冲刺', desc: '9-11月关注目标企业校园招聘，准备简历与面试'});
      } else {
        base.push({title: '求职冲刺', desc: '春招补录阶段持续投递，扩大目标企业范围'});
        base.push({title: '入职准备', desc: '提前了解目标岗位职责，复习专业知识，做好角色转换'});
      }
      return base;
    },
    skills: [
      {title: '专业知识', desc: '扎实的' + major + '专业知识，能够将理论应用于实际问题'},
      {title: '岗位技能', desc: '掌握' + career + '岗位所需的核心工具、方法与流程'},
      {title: '项目经验', desc: '通过课程设计、实习或竞赛积累相关项目经历'},
      {title: '综合素质', desc: '良好的沟通表达、团队协作、学习能力和职业素养'}
    ],
    strategy: [
      {title: '目标企业', desc: '关注与' + major + '和' + career + '相关的优质企业，分层投递'},
      {title: '简历重点', desc: '突出专业课程、项目经历、实习经验和相关证书'},
      {title: '面试准备', desc: '准备专业知识问答、项目介绍、职业规划等常见面试题'},
      {title: '加分项', desc: '考取行业相关证书、参加专业竞赛、积累对口实习经历'}
    ]
  };
}

// ============ State ============
var currentPlan = null;

// ============ Generate Plan ============
function generatePlan() {
  var name = (document.getElementById('inpName').value || '').trim();
  var major = (document.getElementById('inpMajor').value || '').trim();
  var grade = (document.getElementById('inpGrade').value || '').trim();
  var career = (document.getElementById('inpCareer').value || '').trim();
  var interests = (document.getElementById('inpInterests').value || '').trim();
  var strengths = (document.getElementById('inpStrengths').value || '').trim();

  if (!name) { showToast('请输入姓名'); document.getElementById('inpName').focus(); return; }
  if (!major) { showToast('请输入专业'); document.getElementById('inpMajor').focus(); return; }
  if (!grade) { showToast('请选择年级'); document.getElementById('inpGrade').focus(); return; }
  if (!career) { showToast('请选择目标职业方向'); document.getElementById('inpCareer').focus(); return; }

  var db = CAREER_DB[career] || getDefaultCareerPlan(career, major);

  var timeline = db.timeline(grade);

  currentPlan = {
    inputs: { name: name, major: major, grade: grade, career: career, interests: interests, strengths: strengths },
    plan: {
      icon: db.icon,
      color: db.color,
      roadmap: db.roadmap,
      timeline: timeline,
      skills: db.skills,
      strategy: db.strategy
    },
    createdAt: new Date().toISOString()
  };

  renderPlan(currentPlan);
  document.getElementById('planResult').classList.add('show');
  document.getElementById('planResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderPlan(p) {
  document.getElementById('planTitle').textContent = p.inputs.name + '的职业规划方案';
  document.getElementById('planSubtitle').textContent = p.inputs.major + ' · ' + p.inputs.grade + ' · 目标：' + p.inputs.career;
  document.getElementById('planDate').textContent = '生成时间：' + new Date(p.createdAt).toLocaleString('zh-CN');

  var d = p.plan;
  var html = '';

  // Roadmap
  html += '<div class="plan-section">' +
    '<div class="plan-section-header"><div class="psi ' + d.color + '">' + d.icon + '</div>🗺️ 职业路线图</div>';
  d.roadmap.forEach(function(item, i) {
    html += '<div class="plan-item"><div class="plan-item-dot"></div><div class="plan-item-body">' +
      '<div class="plan-item-title">' + (i+1) + '. ' + item.title + '</div>' +
      '<div class="plan-item-desc">' + item.desc + '</div></div></div>';
  });
  html += '</div>';

  // Timeline
  html += '<div class="plan-section">' +
    '<div class="plan-section-header"><div class="psi ' + d.color + '">⏰</div>时间规划</div>';
  d.timeline.forEach(function(item, i) {
    html += '<div class="plan-item"><div class="plan-item-dot"></div><div class="plan-item-body">' +
      '<div class="plan-item-title">' + item.title + '</div>' +
      '<div class="plan-item-desc">' + item.desc + '</div></div></div>';
  });
  html += '</div>';

  // Skills
  html += '<div class="plan-section">' +
    '<div class="plan-section-header"><div class="psi ' + d.color + '">📈</div>技能提升计划</div>';
  d.skills.forEach(function(item, i) {
    html += '<div class="plan-item"><div class="plan-item-dot"></div><div class="plan-item-body">' +
      '<div class="plan-item-title">' + item.title + '</div>' +
      '<div class="plan-item-desc">' + item.desc + '</div></div></div>';
  });
  html += '</div>';

  // Strategy
  html += '<div class="plan-section">' +
    '<div class="plan-section-header"><div class="psi ' + d.color + '">💼</div>求职策略</div>';
  d.strategy.forEach(function(item, i) {
    html += '<div class="plan-item"><div class="plan-item-dot"></div><div class="plan-item-body">' +
      '<div class="plan-item-title">' + item.title + '</div>' +
      '<div class="plan-item-desc">' + item.desc + '</div></div></div>';
  });
  html += '</div>';

  // Personalized tips
  if (p.inputs.interests || p.inputs.strengths) {
    html += '<div class="plan-section">' +
      '<div class="plan-section-header"><div class="psi ' + d.color + '">✨</div>个性化建议</div>';
    if (p.inputs.interests) {
      html += '<div class="plan-item"><div class="plan-item-dot"></div><div class="plan-item-body">' +
        '<div class="plan-item-title">结合你的兴趣特长</div>' +
        '<div class="plan-item-desc">你的兴趣（' + esc(p.inputs.interests) + '）可以与' + p.inputs.career + '方向结合，' +
        '比如在求职简历中突出相关经历，或在工作中发挥这些特长形成差异化优势。</div></div></div>';
    }
    if (p.inputs.strengths) {
      html += '<div class="plan-item"><div class="plan-item-dot"></div><div class="plan-item-body">' +
        '<div class="plan-item-title">发挥你的个人优势</div>' +
        '<div class="plan-item-desc">基于你的自我评价（' + esc(p.inputs.strengths) + '），' +
        '建议在' + p.inputs.career + '领域中选择能最大化发挥这些优势的岗位，扬长避短。</div></div></div>';
    }
    html += '</div>';
  }

  document.getElementById('planContent').innerHTML = html;
}

function regenerate() {
  document.getElementById('planResult').classList.remove('show');
  currentPlan = null;
  document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
}

// ============ Save Plan ============
function savePlan() {
  if (!currentPlan) { showToast('请先生成规划方案'); return; }

  var saved = getSavedPlans();
  var planToSave = JSON.parse(JSON.stringify(currentPlan));
  planToSave.id = Date.now();
  saved.unshift(planToSave);
  localStorage.setItem('saved_plans', JSON.stringify(saved));

  showToast('✅ 方案已保存，可在「我的」页面查看');
  renderSavedPlans();
}

function getSavedPlans() {
  try {
    return JSON.parse(localStorage.getItem('saved_plans') || '[]');
  } catch(e) { return []; }
}

function renderSavedPlans() {
  var saved = getSavedPlans();
  var container = document.getElementById('savedList');

  if (saved.length === 0) {
    container.innerHTML = '<div class="saved-empty"><div class="se-icon">📋</div><p>暂无已保存的方案<br>填写信息生成你的第一个规划方案</p></div>';
    return;
  }

  container.innerHTML = saved.map(function(p, i) {
    return '<div class="saved-card">' +
      '<div class="saved-card-header">' +
        '<div class="saved-card-name">' + esc(p.inputs.name) + ' · ' + esc(p.inputs.career) + '</div>' +
        '<div class="saved-card-date">' + new Date(p.createdAt).toLocaleDateString('zh-CN') + '</div>' +
      '</div>' +
      '<div class="saved-card-info">' + esc(p.inputs.major) + ' · ' + esc(p.inputs.grade) + '</div>' +
      '<div class="saved-card-tags">' +
        '<span class="saved-tag">路线图</span>' +
        '<span class="saved-tag">时间规划</span>' +
        '<span class="saved-tag">技能计划</span>' +
        '<span class="saved-tag">求职策略</span>' +
      '</div>' +
      '<div class="saved-card-actions">' +
        '<button class="saved-view-btn" onclick="viewSavedPlan(' + i + ')">查看详情</button>' +
        '<button class="saved-sync-btn" onclick="syncPlanToGoals(' + i + ')">🎯 同步到目标</button>' +
        '<button class="saved-del-btn" onclick="deletePlan(' + i + ')">删除</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function viewSavedPlan(index) {
  var saved = getSavedPlans();
  var p = saved[index];
  if (!p) return;

  var d = p.plan;
  var html = '<button class="detail-close" onclick="closeDetail()">✕</button>' +
    '<div class="detail-title">' + esc(p.inputs.name) + '的职业规划</div>' +
    '<div class="detail-sub">' + esc(p.inputs.major) + ' · ' + esc(p.inputs.grade) + ' · ' + esc(p.inputs.career) + ' · ' + new Date(p.createdAt).toLocaleString('zh-CN') + '</div>';

  function renderSection(icon, title, items) {
    var h = '<div style="margin-bottom:14px;">' +
      '<div style="font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:8px;">' + icon + ' ' + title + '</div>';
    items.forEach(function(item, i) {
      h += '<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;">' +
        '<div style="width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0;"></div>' +
        '<div style="flex:1;"><div style="font-size:13px;font-weight:600;color:var(--text-primary);">' + (item.title || (i+1)) + '</div>' +
        '<div style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin-top:2px;">' + esc(item.desc || '') + '</div></div></div>';
    });
    h += '</div>';
    return h;
  }

  html += renderSection('🗺️', '职业路线图', d.roadmap);
  html += renderSection('⏰', '时间规划', d.timeline);
  html += renderSection('📈', '技能提升', d.skills);
  html += renderSection('💼', '求职策略', d.strategy);

  document.getElementById('detailBox').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('show');
}

function closeDetail(e) {
  if (e && e.target !== document.getElementById('detailOverlay')) return;
  document.getElementById('detailOverlay').classList.remove('show');
}

function deletePlan(index) {
  var saved = getSavedPlans();
  saved.splice(index, 1);
  localStorage.setItem('saved_plans', JSON.stringify(saved));
  showToast('方案已删除');
  renderSavedPlans();
}

// ============ Sync Plan to Goals ============
// 将已保存的规划方案同步为目标，保留 goals.html 原有的"创建目标"功能。
// 目标数据使用与 goals.html 一致的 localStorage key: career_goals_v2
function syncPlanToGoals(index) {
  var saved = getSavedPlans();
  var p = saved[index];
  if (!p) { showToast('方案不存在'); return; }

  var d = p.plan || {};
  var inputs = p.inputs || {};
  var catMap = {
    '互联网产品': '技能提升',
    '软件开发': '技能提升',
    '数据分析': '技能提升',
    '产品运营': '求职投递',
    '市场营销': '求职投递',
    '人力资源': '人脉拓展',
    '财务管理': '技能提升',
    '平面设计': '技能提升',
    '新媒体': '求职投递',
    '电商运营': '求职投递',
    '其他': '技能提升'
  };
  var cat = catMap[inputs.career] || '技能提升';

  // 截止日期：30 天后
  var dt = new Date();
  dt.setDate(dt.getDate() + 30);
  var deadline = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');

  // 子步骤：把路线图 / 时间规划 / 技能 / 策略统一展开为可勾选的步骤
  var steps = [];
  function pushSteps(prefix, list) {
    if (!Array.isArray(list)) return;
    list.forEach(function(item) {
      var text = (item && item.title) ? item.title : '';
      if (!text) return;
      steps.push(prefix + text);
    });
  }
  pushSteps('🗺️ ', d.roadmap);
  pushSteps('⏰ ', d.timeline);
  pushSteps('📈 ', d.skills);
  pushSteps('💼 ', d.strategy);
  if (inputs.interests) steps.push('✨ 结合兴趣：' + inputs.interests);
  if (inputs.strengths) steps.push('💪 发挥优势：' + inputs.strengths);

  // 描述：综合展示该方案的核心信息
  var descParts = [];
  descParts.push('基于「' + (inputs.name || '') + ' · ' + (inputs.major || '') + ' · ' + (inputs.grade || '') + ' · ' + (inputs.career || '') + '」的规划方案自动创建。');
  if (d.roadmap && d.roadmap[0]) descParts.push('目标方向：' + d.roadmap[0].title + ' → ' + d.roadmap[d.roadmap.length - 1].title + '。');
  if (steps.length) descParts.push('已拆解为 ' + steps.length + ' 个子步骤，请前往「目标」页面查看并逐步完成。');

  var goal = {
    id: Date.now(),
    title: (inputs.name || '我的') + '的职业目标：' + (inputs.career || '方向探索'),
    desc: descParts.join(''),
    cat: cat,
    color: 'linear-gradient(90deg,#1d4ed8,#60a5fa)',
    deadline: deadline,
    done: false,
    steps: steps.map(function(s) { return { text: s, done: false }; }),
    progress: 0,
    fromPlan: true,
    createdAt: new Date().toISOString()
  };

  var STORAGE_KEY = 'career_goals_v2';
  var goals = [];
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) goals = JSON.parse(raw);
  } catch (e) {}
  if (!Array.isArray(goals)) goals = [];

  // 避免重复：标题相同则提示
  var dup = goals.find(function(g) { return g.title === goal.title; });
  if (dup) {
    if (!confirm('已存在同名目标，是否仍要添加一个新目标？')) return;
  }

  goals.unshift(goal);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(goals));
  showToast('✅ 已同步到目标，正在跳转…');
  setTimeout(function() { window.location.href = 'goals.html'; }, 900);
}

// ============ Utils ============
function showToast(msg) {
  var el = document.getElementById('toastEl');
  el.textContent = msg;
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(window._toastT);
  window._toastT = setTimeout(function() {
    el.style.transform = 'translateX(-50%) translateY(-120px)';
  }, 2200);
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ============ INIT ============
renderSavedPlans();

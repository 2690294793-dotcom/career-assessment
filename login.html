<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>登录 · 自在生涯工作室</title>
<style>
:root {
  --primary: #6366f1;
  --text-primary: #1a1a2e;
  --text-secondary: #7C8594;
  --text-light: #B0B8C8;
  --bg: #F7F8FA;
  --card: #FFFFFF;
  --border: #E8ECF2;
  --teacher: #4338ca;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #fff; display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 16px;
}
.phone-frame {
  width: 390px; height: 844px; background: #fff;
  border-radius: 42px; overflow: hidden; position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
  display: flex; flex-direction: column;
}

/* Header */
.login-header-bar {
  height: 52px; display: flex; align-items: center; justify-content: center;
  position: relative; flex-shrink: 0; padding: 0 16px;
}
.back-btn {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  width: 32px; height: 32px; border-radius: 50%; border: none; background: none;
  cursor: pointer; font-size: 20px; color: var(--text-primary); display: flex;
  align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;
}
.back-btn:active { background: rgba(0,0,0,0.04); }
.header-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }

/* Content */
.login-content {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 60px 32px 40px;
  overflow-y: auto;
}

/* Logo */
.login-logo-wrap {
  width: 88px; height: 88px; border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #4338ca);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px; box-shadow: 0 8px 24px rgba(99,102,241,0.25);
}
.login-logo-wrap svg { width: 48px; height: 48px; }

.login-app-name { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.login-app-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 36px; }

/* Role cards */
.role-list {
  width: 100%; display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px;
}
.role-card {
  width: 100%; padding: 18px 18px; border-radius: 14px; border: 1.5px solid var(--border);
  background: #fff; cursor: pointer; display: flex; align-items: center; gap: 14px;
  text-align: left; font-family: inherit; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.role-card:active { transform: scale(0.98); background: #fafbff; }
.role-card .role-icon {
  width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; font-size: 22px;
}
.role-card.student .role-icon { background: linear-gradient(135deg, #e0e7ff, #c7d2fe); color: var(--primary); }
.role-card.teacher .role-icon { background: linear-gradient(135deg, #ede9fe, #ddd6fe); color: var(--teacher); }
.role-card .role-info { flex: 1; }
.role-card .role-name { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.role-card .role-desc { font-size: 12px; color: var(--text-secondary); }
.role-card .role-arrow { color: var(--text-light); font-size: 20px; }

/* Buttons */
.login-btn-primary {
  width: 100%; height: 50px; border-radius: 10px; border: none;
  background: #1a1a2e; color: #fff; font-size: 16px; font-weight: 500;
  cursor: pointer; font-family: inherit; letter-spacing: 0.5px;
  transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  -webkit-tap-highlight-color: transparent;
}
.login-btn-primary:active { opacity: 0.85; }

.login-btn-cancel {
  width: 100%; height: 48px; border-radius: 10px; border: none; background: none;
  color: var(--text-secondary); font-size: 15px; font-weight: 400; cursor: pointer;
  font-family: inherit; margin-top: 8px; -webkit-tap-highlight-color: transparent;
}
.login-btn-cancel:active { color: var(--text-primary); }

/* Form (simple) */
.simple-form {
  width: 100%; display: none; flex-direction: column; gap: 14px; margin-top: 10px;
}
.simple-form.show { display: flex; }
.simple-input {
  width: 100%; height: 48px; padding: 0 16px; border: 1px solid var(--border); border-radius: 10px;
  font-size: 15px; color: var(--text-primary); outline: none; font-family: inherit;
  transition: border-color 0.2s;
}
.simple-input:focus { border-color: var(--primary); }
.simple-input::placeholder { color: var(--text-light); }

/* Form (teacher password) */
.teacher-form {
  width: 100%; display: none; flex-direction: column; gap: 14px; margin-top: 10px;
}
.teacher-form.show { display: flex; }

/* Agreement */
.agreement-row {
  display: flex; align-items: center; gap: 8px; margin-top: auto; padding-top: 20px;
}
.agreement-row input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer;
}
.agreement-row label { font-size: 12px; color: var(--text-secondary); cursor: pointer; }
.agreement-row a { color: var(--primary); text-decoration: none; font-weight: 500; }

/* Error text */
.form-error {
  color: #ef4444; font-size: 13px; min-height: 18px; margin-top: 2px; text-align: left;
  padding-left: 2px;
}
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Header -->
  <div class="login-header-bar">
    <button class="back-btn" onclick="goBack()">‹</button>
    <div class="header-title" id="headerTitle">登录</div>
  </div>

  <!-- Content -->
  <div class="login-content">
    <div class="login-logo-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
        <circle cx="12" cy="12" r="3" fill="#fff" stroke="none"/>
      </svg>
    </div>
    <div class="login-app-name">职趣星图</div>
    <div class="login-app-sub">自在生涯工作室</div>

    <!-- 角色选择 -->
    <div class="role-list" id="roleList">
      <button class="role-card student" onclick="selectRole('student')">
        <div class="role-icon">🎓</div>
        <div class="role-info">
          <div class="role-name">学生端登录</div>
          <div class="role-desc">填写姓名学号，开启测评与生涯探索</div>
        </div>
        <div class="role-arrow">›</div>
      </button>
      <button class="role-card teacher" onclick="selectRole('teacher')">
        <div class="role-icon">👨‍🏫</div>
        <div class="role-info">
          <div class="role-name">教师端登录</div>
          <div class="role-desc">查看学生测评数据与预约记录</div>
        </div>
        <div class="role-arrow">›</div>
      </button>
    </div>

    <!-- 学生登录：简易信息填写 -->
    <div class="simple-form" id="studentForm">
      <input type="text" class="simple-input" id="sName" placeholder="请输入姓名" maxlength="20">
      <input type="text" class="simple-input" id="sSid" placeholder="请输入学号" maxlength="20">
      <input type="text" class="simple-input" id="sClass" placeholder="请输入班级，如：2023级计算机1班" maxlength="30">
      <div class="simple-input" style="padding:14px 16px; background:#f8f9fa; border:1px solid #eee; border-radius:10px; font-size:15px; color:var(--text-primary); font-weight:600; text-align:left;">广州职业技术大学</div>
      <button class="login-btn-primary" onclick="doStudentLogin()">确认登录</button>
      <button class="login-btn-cancel" onclick="backToRoleList()">‹ 返回选择</button>
    </div>

    <!-- 教师登录：密码输入 -->
    <div class="teacher-form" id="teacherForm">
      <input type="password" class="simple-input" id="tPwd" placeholder="请输入教师端密码" maxlength="20" autocomplete="current-password">
      <div class="form-error" id="teacherError"></div>
      <button class="login-btn-primary" onclick="doTeacherLogin()">进入教师端</button>
      <button class="login-btn-cancel" onclick="backToRoleList()">‹ 返回选择</button>
    </div>

    <!-- Agreement -->
    <div class="agreement-row" id="agreementRow">
      <input type="checkbox" id="agreeCheck" checked>
      <label for="agreeCheck">同意<a href="javascript:void(0)" onclick="alert('用户协议：本小程序仅用于职业规划辅助，用户信息保存在本地，不会上传至服务器。')">《用户协议》</a>和<a href="javascript:void(0)" onclick="alert('隐私政策：我们非常重视您的隐私，所有数据仅保存在您的设备本地。')">《隐私政策》</a></label>
    </div>
  </div>
</div>

<script>
// ============================================
// 自在生涯工作室 · 登录页（双入口）
// v20260710-03
// ============================================

// 教师端密码
var TEACHER_PASSWORD = '123';

function goBack() {
  var redirect = sessionStorage.getItem('login_redirect') || 'index.html';
  sessionStorage.removeItem('login_redirect');
  window.location.href = redirect;
}

function show(elId) { document.getElementById(elId).classList.add('show'); }
function hide(elId) { document.getElementById(elId).classList.remove('show'); }
function setDisplay(elId, val) { document.getElementById(elId).style.display = val; }

function selectRole(role) {
  if (!document.getElementById('agreeCheck').checked) {
    alert('请先同意用户协议和隐私政策'); return;
  }
  // 先隐藏两个表单和底部协议，清空内容，再显示目标角色表单，避免余留
  hide('studentForm');
  hide('teacherForm');
  hide('roleList');
  hide('agreementRow');
  resetStudentForm();
  resetTeacherForm();
  if (role === 'student') {
    document.getElementById('headerTitle').textContent = '学生端登录';
    // 检查是否已有学生信息
    try {
      var saved = localStorage.getItem('app_user_info');
      if (saved) {
        var info = JSON.parse(saved);
        if (info && info.name) {
          goBack();
          return;
        }
      }
    } catch(e) {}
    show('studentForm');
  } else if (role === 'teacher') {
    document.getElementById('headerTitle').textContent = '教师端登录';
    show('teacherForm');
    setTimeout(function() {
      var pwd = document.getElementById('tPwd');
      if (pwd) pwd.focus();
    }, 100);
  }
}

function resetStudentForm() {
  ['sName', 'sSid', 'sClass'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
}

function resetTeacherForm() {
  var pwd = document.getElementById('tPwd');
  if (pwd) pwd.value = '';
  var err = document.getElementById('teacherError');
  if (err) err.textContent = '';
}

function backToRoleList() {
  hide('studentForm');
  hide('teacherForm');
  show('roleList');
  show('agreementRow');
  document.getElementById('headerTitle').textContent = '登录';
  // 清空教师端密码与错误提示
  var pwd = document.getElementById('tPwd');
  if (pwd) pwd.value = '';
  var err = document.getElementById('teacherError');
  if (err) err.textContent = '';
}

// ===== 学生端登录 =====
function doStudentLogin() {
  if (!document.getElementById('agreeCheck').checked) {
    alert('请先同意用户协议和隐私政策'); return;
  }
  var name = document.getElementById('sName').value.trim();
  var sid = document.getElementById('sSid').value.trim();
  var className = document.getElementById('sClass').value.trim();
  var school = '广州职业技术大学';
  if (!name) { alert('请输入姓名'); return; }
  if (!sid) { alert('请输入学号'); return; }
  if (!className) { alert('请输入班级'); return; }
  var userInfo = { name: name, sid: sid, className: className, school: school, loginTime: new Date().toISOString() };
  localStorage.setItem('app_user_info', JSON.stringify(userInfo));
  // 同步班级到完善资料页
  try {
    var resumeData = JSON.parse(localStorage.getItem('resumeData') || '{}');
    if (!resumeData.basic) resumeData.basic = {};
    resumeData.basic.name = name;
    resumeData.basic.sid = sid;
    resumeData.basic.className = className;
    resumeData.basic.school = school;
    localStorage.setItem('resumeData', JSON.stringify(resumeData));
  } catch(e) {}
  goBack();
}

// ===== 教师端登录 =====
function doTeacherLogin() {
  var pwd = document.getElementById('tPwd').value;
  var errEl = document.getElementById('teacherError');
  if (!pwd) {
    errEl.textContent = '请输入密码';
    return;
  }
  if (pwd === TEACHER_PASSWORD) {
    errEl.textContent = '';
    // 记录教师端登录态
    try { sessionStorage.setItem('teacher_login', '1'); } catch(e) {}
    // 跳转到教师端
    window.location.href = 'teacher.html';
  } else {
    errEl.textContent = '密码错误，请重试';
    document.getElementById('tPwd').value = '';
    document.getElementById('tPwd').focus();
  }
}

// 回车提交
document.addEventListener('DOMContentLoaded', function() {
  var tPwd = document.getElementById('tPwd');
  if (tPwd) {
    tPwd.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doTeacherLogin();
    });
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>自在生涯工作室</title>
<style>
:root {
  --primary: #6366f1; --primary-dark: #4338ca; --primary-light: #EEF0FF;
  --accent: #818cf8; --bg: #F0F4FF; --card: #FFFFFF;
  --text-primary: #1a1a2e; --text-secondary: #7C8594; --text-light: #B0B8C8;
  --border: #E8ECF2; --radius-sm: 14px; --radius-md: 20px; --radius-lg: 24px;
  --green: #10B981; --orange: #F59E0B; --red: #EF4444; --blue: #3B82F6; --purple: #A78BFA;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 50%, #f5f7ff 100%);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 16px;
  -webkit-font-smoothing: antialiased;
}

/* ====== Phone Frame ====== */
.phone-frame {
  width: 390px; height: 844px;
  background: linear-gradient(180deg, #EBF0FF 0%, #F0F3FF 30%, #F8F9FF 70%, #FFFFFF 100%);
  border-radius: 42px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 20px 60px rgba(99,102,241,0.12), 0 0 0 1px rgba(99,102,241,0.08);
  display: flex; flex-direction: column;
}
.phone-frame::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,0.06) 1px, transparent 0);
  background-size: 24px 24px;
  pointer-events: none;
  z-index: 0;
}
.phone-frame::after {
  content: ''; position: absolute; bottom: 58px; left: 0; right: 0; height: 60px;
  background: linear-gradient(to top, rgba(235,240,255,0.6), transparent);
  pointer-events: none; z-index: 0;
}

/* Career background elements */
.career-bg-layer {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}
.career-icon {
  position: absolute; font-size: 20px;
  opacity: 0.2; filter: grayscale(0.2);
  animation: careerFloat 8s ease-in-out infinite;
}
.career-icon-1 { top: 70px; left: 20px; font-size: 22px; animation-delay: 0s; }
.career-icon-2 { top: 120px; right: 18px; font-size: 18px; animation-delay: 1.2s; }
.career-icon-3 { top: 200px; left: 12px; font-size: 16px; animation-delay: 2.5s; }
.career-icon-4 { top: 250px; right: 25px; font-size: 20px; animation-delay: 0.8s; }
.career-icon-5 { top: 380px; left: 15px; font-size: 18px; animation-delay: 3s; }
.career-icon-6 { top: 420px; right: 20px; font-size: 16px; animation-delay: 1.8s; }
.career-icon-7 { top: 500px; left: 22px; font-size: 20px; animation-delay: 2.2s; }
.career-icon-8 { top: 550px; right: 15px; font-size: 18px; animation-delay: 0.5s; }
.career-icon-9 { top: 620px; left: 18px; font-size: 16px; animation-delay: 3.5s; }
.career-icon-10 { top: 680px; right: 22px; font-size: 22px; animation-delay: 1.5s; }
@keyframes careerFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.18; }
  50% { transform: translateY(-10px) rotate(5deg); opacity: 0.3; }
}

/* Scroll Area */
.scroll-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  position: relative;
  z-index: 1;
}
.scroll-area::-webkit-scrollbar { width: 0; }

/* Top bar (inside phone frame) */
.top-bar {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  color: #fff; padding: 0 16px; height: 52px; display: flex; align-items: center;
  justify-content: space-between; box-shadow: 0 2px 12px rgba(99,102,241,0.2);
  flex-shrink: 0; position: relative; z-index: 10;
}
.top-bar .brand { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; }
.top-bar .nav-links { display: inline-flex; align-items: center; gap: 0; background: rgba(255,255,255,0.15); border-radius: 22px; padding: 3px; }
.top-bar .nav-links a {
  color: rgba(255,255,255,0.7); text-decoration: none;
  padding: 5px 10px; border-radius: 19px; font-size: 12px; font-weight: 600;
  transition: all 0.3s cubic-bezier(.4,0,.2,1);
  white-space: nowrap; display: flex; align-items: center; gap: 4px;
}
.top-bar .nav-links a:hover { color: rgba(255,255,255,0.95); }
.top-bar .nav-links a.active {
  background: #fff; color: var(--primary-dark);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.top-bar .nav-links a svg { width: 13px; height: 13px; }

/* Container */
.container { padding: 12px 14px; }

/* Login */
.login-wrap {
  display: flex; justify-content: center; align-items: center; flex: 1;
  padding: 30px 14px;
}
.login-card {
  background: var(--card); border-radius: var(--radius-lg); padding: 32px 28px;
  max-width: 320px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(99,102,241,0.1);
  margin: 0 14px;
}
.login-card .lock { font-size: 40px; margin-bottom: 14px; }
.login-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.login-card p { color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; }
.login-card input {
  width: 100%; padding: 12px 16px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); font-size: 14px; text-align: center;
  outline: none; transition: border-color 0.2s; margin-bottom: 14px;
}
.login-card input:focus { border-color: var(--primary); }
.login-card button {
  width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.15s;
}
.login-card button:active { transform: scale(0.97); }
.login-card .hint { color: var(--text-light); font-size: 11px; margin-top: 16px; }

/* ===== TABS ===== */
.tab-bar {
  display: flex; gap: 2px; background: var(--card); border-radius: var(--radius-md);
  padding: 5px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  flex-wrap: wrap;
}
.tab-btn {
  flex: 1; padding: 8px 8px; border: none; background: transparent;
  border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--text-secondary); transition: all 0.2s; text-align: center;
  white-space: nowrap;
}
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
.tab-btn:hover:not(.active) { background: var(--primary-light); color: var(--primary); }
.tab-btn .tab-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 6px; }
.tab-btn .tab-dot.red { background: var(--red); animation: pulse-dot 1.5s infinite; }
@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Tab panels */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Stats */
.stats-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px; margin-bottom: 14px;
}
.stat-card {
  background: var(--card); border-radius: var(--radius-md); padding: 14px 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04); text-align: center;
}
.stat-val { font-size: 22px; font-weight: 900; color: var(--primary); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.stat-card.warn .stat-val { color: var(--orange); }
.stat-card.good .stat-val { color: var(--green); }
.stat-card.danger .stat-val { color: var(--red); }

/* Table (测评管理) */
.table-wrap {
  background: var(--card); border-radius: var(--radius-md);
  box-shadow: 0 2px 12px rgba(0,0,0,0.04); overflow-x: auto;
}
.toolbar {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.toolbar input, .toolbar select {
  padding: 7px 10px; border: 2px solid var(--border); border-radius: 10px;
  font-size: 12px; outline: none; transition: border-color 0.2s;
  background: var(--card); color: var(--text-primary);
}
.toolbar input { flex: 1; min-width: 100px; }
.toolbar input:focus, .toolbar select:focus { border-color: var(--primary); }
.toolbar .btn {
  padding: 7px 10px; border: none; border-radius: 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: var(--primary-light); color: var(--primary); transition: all 0.2s;
  white-space: nowrap;
}
.toolbar .btn:hover { background: var(--primary); color: #fff; }
.toolbar .btn-danger { background: #FEE2E2; color: var(--red); }
.toolbar .btn-danger:hover { background: var(--red); color: #fff; }

table { min-width: 520px; width: 100%; border-collapse: collapse; }
th {
  background: #F8F9FC; padding: 10px 8px; text-align: left; font-size: 10px;
  font-weight: 700; color: var(--text-secondary); text-transform: uppercase;
  letter-spacing: 0.3px; border-bottom: 2px solid var(--border); white-space: nowrap;
}
td { padding: 9px 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
tr:hover td { background: rgba(99,102,241,0.02); }
tr:last-child td { border-bottom: none; }

.badge {
  display: inline-block; padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: 700;
}
.badge-bigfive { background: #FEF3C7; color: #92400e; }
.badge-holland { background: #DBEAFE; color: #1e40af; }
.badge-strength { background: #FCE7F3; color: #9d174d; }
.badge-mbti { background: #E0E7FF; color: #3730a3; }
.result-code { font-weight: 800; font-size: 14px; letter-spacing: 1px; color: var(--primary); }

.empty {
  text-align: center; padding: 60px 20px; color: var(--text-light);
}
.empty .icon { font-size: 44px; margin-bottom: 12px; }

/* ===== APPOINTMENT CARDS ===== */
.apt-filter-bar {
  display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
}
.apt-filter-chip {
  padding: 6px 12px; border: 2px solid var(--border); border-radius: 20px;
  font-size: 12px; font-weight: 600; cursor: pointer; background: var(--card);
  color: var(--text-secondary); transition: all 0.2s;
}
.apt-filter-chip:hover { border-color: var(--primary); color: var(--primary); }
.apt-filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.apt-filter-chip .count {
  display: inline-block; min-width: 18px; background: rgba(255,255,255,0.25);
  border-radius: 10px; padding: 1px 6px; font-size: 10px; margin-left: 3px;
}

.apt-card {
  background: var(--card); border-radius: var(--radius-md); padding: 14px 16px;
  margin-bottom: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  border-left: 4px solid var(--border); transition: all 0.2s;
}
.apt-card.pending { border-left-color: var(--orange); }
.apt-card.accepted { border-left-color: var(--green); }
.apt-card.rejected { border-left-color: var(--red); }
.apt-card.completed { border-left-color: var(--blue); }
.apt-card.new-apt { animation: slideIn 0.4s ease-out; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

.apt-card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.apt-card-header .apt-no { font-size: 11px; color: var(--text-light); }
.apt-card-header .apt-status {
  font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 10px;
}
.apt-card-header .apt-status.pending { background: #FEF3C7; color: #92400e; }
.apt-card-header .apt-status.accepted { background: #D1FAE5; color: #065f46; }
.apt-card-header .apt-status.rejected { background: #FEE2E2; color: #991b1b; }
.apt-card-header .apt-status.completed { background: #DBEAFE; color: #1e40af; }

.apt-card-body { display: flex; flex-direction: column; gap: 6px; }
.apt-row { display: flex; align-items: center; gap: 8px; font-size: 14px; flex-wrap: wrap; }
.apt-row .label { color: var(--text-secondary); font-size: 12px; min-width: 48px; }
.apt-row .label::after { content: '：'; }
.apt-row .value { font-weight: 600; color: var(--text-primary); }
.apt-row .value.mentor { color: var(--primary); }

.apt-card-actions {
  display: flex; gap: 8px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border); flex-wrap: wrap;
}
.apt-card-actions button {
  padding: 7px 12px; border: none; border-radius: 10px; font-size: 12px;
  font-weight: 700; cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.apt-btn-accept { background: var(--green); color: #fff; }
.apt-btn-accept:hover { background: #059669; }
.apt-btn-reject { background: var(--red); color: #fff; }
.apt-btn-reject:hover { background: #DC2626; }
.apt-btn-notes { background: var(--primary-light); color: var(--primary); }
.apt-btn-notes:hover { background: var(--primary); color: #fff; }
.apt-btn-delete { background: #F3F4F6; color: var(--text-secondary); }
.apt-btn-delete:hover { background: var(--text-secondary); color: #fff; }

/* Notes panel */
.apt-notes-panel {
  display: none; margin-top: 12px; padding: 14px; background: #F8F9FC;
  border-radius: 12px;
}
.apt-notes-panel textarea {
  width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 10px;
  font-size: 13px; outline: none; font-family: inherit; resize: vertical;
  min-height: 80px;
}
.apt-notes-panel textarea:focus { border-color: var(--primary); }
.apt-notes-panel .notes-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }

/* Multi-field notes form */
.notes-form { display: flex; flex-direction: column; gap: 10px; }
.notes-field-group { display: flex; flex-direction: column; gap: 6px; }
.notes-field-label {
  font-size: 12px; font-weight: 700; color: var(--text-secondary);
  display: flex; align-items: center; gap: 4px;
}
.notes-field-textarea {
  width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 10px;
  font-size: 13px; outline: none; font-family: inherit; resize: vertical;
  min-height: 60px; background: #fff; line-height: 1.5;
}
.notes-field-textarea:focus { border-color: var(--primary); background: #fff; }
.notes-field-display {
  padding: 10px 12px; background: #fff; border-radius: 10px; border: 1px solid var(--border);
  font-size: 13px; color: var(--text-primary); line-height: 1.5; min-height: 40px;
}

.timestamp { font-size: 11px; color: var(--text-light); }

/* Workflow step indicator */
.apt-workflow-tip {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 12px; padding: 10px 14px;
  background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
  border-radius: 12px; font-size: 12px; flex-wrap: wrap;
}
.workflow-step {
  padding: 4px 10px; border-radius: 8px; font-weight: 600;
  background: #d1fae5; color: #065f46;
}
.workflow-step.active {
  background: var(--green); color: #fff;
  animation: pulse-step 1.5s infinite;
}
.workflow-step:not(.active) { opacity: 0.6; }
.workflow-arrow { color: var(--text-light); font-size: 14px; }
@keyframes pulse-step {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.85; transform: scale(1.03); }
}

/* Completed consultation notes display */
.apt-notes-display {
  margin: 12px 0; padding: 14px 16px;
  background: #f8f9fc; border-radius: 12px;
  border-left: 3px solid var(--blue);
}
.notes-display-title {
  font-size: 13px; font-weight: 700; color: var(--primary);
  margin-bottom: 8px;
}
.notes-display-content {
  font-size: 13px; color: var(--text-primary); line-height: 1.7;
  white-space: pre-wrap;
}

/* Toast */
.toast {
  position: fixed; top: 76px; left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--text-primary); color: #fff; padding: 12px 24px;
  border-radius: 12px; font-size: 14px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 9999;
  transition: transform 0.35s cubic-bezier(.175,.885,.32,1.275);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }

/* Modal */
.modal-bg {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 200; align-items: center; justify-content: center; padding: 24px;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--card); border-radius: var(--radius-lg); max-width: 360px;
  width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.15);
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px; border-bottom: 1px solid var(--border);
}
.modal-head h3 { font-size: 16px; font-weight: 700; }
.modal-close {
  background: none; border: none; font-size: 22px; cursor: pointer;
  color: var(--text-light); padding: 4px 8px; border-radius: 8px;
}
.modal-close:hover { background: var(--bg); }
.modal-body { padding: 18px; }
.detail-row {
  display: flex; padding: 10px 0; border-bottom: 1px solid var(--border);
}
.detail-label { width: 90px; font-size: 14px; color: var(--text-secondary); font-weight: 600; flex-shrink: 0; }
.detail-val { font-size: 14px; color: var(--text-primary); flex: 1; }
.score-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.score-bar-label { font-size: 13px; color: var(--text-secondary); width: 70px; flex-shrink: 0; }
.score-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--primary), var(--accent)); }
.score-bar-val { font-size: 13px; font-weight: 700; color: var(--primary); width: 40px; text-align: right; }

/* Holland result code clickable */
.result-code.clickable {
  cursor: pointer; padding: 3px 9px; border-radius: 10px;
  background: var(--primary-light); color: var(--primary);
  transition: all 0.2s; display: inline-block;
}
.result-code.clickable:hover { background: var(--primary); color: #fff; }

/* Holland analysis modal content */
.ha-hero { text-align: center; padding: 12px 0 20px; }
.ha-hero-code { font-size: 40px; font-weight: 900; letter-spacing: 6px; color: var(--primary); }
.ha-hero-type { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-top: 4px; }
.ha-hero-pills { display: flex; justify-content: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.ha-hero-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px 5px 5px; border-radius: 16px; font-size: 12px; font-weight: 600; }
.ha-hero-pill-letter { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
.ha-analysis { font-size: 14px; line-height: 1.8; color: var(--text-secondary); }
.ha-analysis h4 { font-size: 15px; color: var(--text-primary); margin-bottom: 10px; margin-top: 16px; }
.ha-analysis p { margin-bottom: 10px; }
.ha-dim-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.ha-dim-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border-radius: 10px; background: var(--bg); }
.ha-dim-tag { flex-shrink: 0; padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.ha-dim-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* Time slots: only show available slots from mentor schedule */
.time-grid .time-slot.unavailable { display: none; }
.time-grid:empty::before { content: "该日暂无可预约时段"; display: block; grid-column: 1/-1; text-align: center; padding: 24px 0; color: var(--text-light); font-size: 13px; }
.loading { display: flex; justify-content: center; padding: 40px; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== 时间管理 Tab ===== */
.schedule-toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border-radius: var(--radius-md); padding: 14px 16px;
  margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  gap: 10px;
}
.schedule-toggle-label { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.schedule-toggle-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.toggle-switch {
  position: relative; width: 52px; height: 28px; cursor: pointer;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0; background: var(--border); border-radius: 14px;
  transition: all 0.3s;
}
.toggle-slider::before {
  content: ''; position: absolute; width: 22px; height: 22px;
  left: 3px; bottom: 3px; background: #fff; border-radius: 11px;
  transition: all 0.3s;
}
.toggle-switch input:checked + .toggle-slider { background: var(--green); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(24px); }

.schedule-add-card {
  background: var(--card); border-radius: var(--radius-md); padding: 14px 16px;
  margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.schedule-add-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }
.schedule-form-row {
  display: flex; gap: 6px; align-items: center;
  flex-wrap: wrap;
.schedule-form-row select, .schedule-form-row input, .schedule-form-row button {
  flex-shrink: 0;
}
.schedule-form-row select { min-width: 70px; font-size: 12px; padding: 8px 6px; }
.schedule-form-row input[type="date"] { min-width: 108px; width: 108px; font-size: 12px; padding: 8px 6px; }
.schedule-form-row input[type="time"] { width: 78px; text-align: center; padding: 8px 4px; font-size: 12px; }
.schedule-add-btn { padding: 8px 12px; }
@media (max-width: 400px) {
  .schedule-form-row { gap: 6px; }
  .schedule-form-row input[type="date"] { min-width: 108px; width: 108px; }
  .schedule-form-row input[type="time"] { width: 78px; }
  .schedule-add-btn { padding: 8px 12px; }
}
.schedule-add-btn {
  padding: 8px 12px; border: none; border-radius: 10px; font-size: 12px;
  font-weight: 700; cursor: pointer; background: var(--primary); color: #fff;
  transition: all 0.2s;
}
.schedule-add-btn:hover { background: var(--primary-dark); }

.schedule-list-card {
  background: var(--card); border-radius: var(--radius-md); padding: 14px 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.schedule-list-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }
.schedule-day-group { margin-bottom: 16px; }
.schedule-day-name {
  font-size: 13px; font-weight: 700; color: var(--primary);
  padding: 4px 12px; background: var(--primary-light); border-radius: 8px;
  display: inline-block; margin-bottom: 8px;
}
.schedule-slot-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; background: #F8F9FC; border-radius: 10px;
  margin-bottom: 6px; font-size: 13px;
}
.schedule-slot-time { font-weight: 600; color: var(--text-primary); }
.schedule-slot-del {
  padding: 4px 10px; border: none; border-radius: 8px; font-size: 12px;
  font-weight: 700; cursor: pointer; background: #FEE2E2; color: var(--red);
  transition: all 0.2s;
}
.schedule-slot-del:hover { background: var(--red); color: #fff; }

.schedule-mentor-tabs {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.schedule-mentor-tab {
  padding: 8px 16px; border: 2px solid var(--border); border-radius: 14px;
  font-size: 13px; font-weight: 600; cursor: pointer; background: var(--card);
  color: var(--text-secondary); transition: all 0.2s;
}
.schedule-mentor-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.schedule-mentor-tab:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

.schedule-closed-msg {
  margin-top: 10px; padding: 10px 14px; background: #FEF3C7; border-radius: 10px;
  font-size: 13px; color: #92400e; display: flex; align-items: center; gap: 8px;
}
.schedule-closed-msg textarea {
  flex: 1; padding: 8px 12px; border: 2px solid #FCD34D; border-radius: 8px;
  font-size: 13px; outline: none; background: #FEF3C7; color: #92400e;
}

/* ===== Batch Delete (测评管理) ===== */
.row-checkbox {
  width: 18px; height: 18px; accent-color: var(--primary);
  cursor: pointer; flex-shrink: 0;
}
.th-checkbox {
  display: flex; align-items: center; justify-content: center;
}
.th-checkbox input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
tr.selected td:not(:first-child) { background: rgba(99,102,241,0.06); }

.batch-bar {
  display: none; position: sticky; bottom: 0; z-index: 50;
  background: #fff; border-top: 2px solid var(--primary);
  padding: 12px 18px; margin-top: 0; border-radius: 0 0 var(--radius-md) var(--radius-md);
  align-items: center; justify-content: space-between; gap: 12px;
  box-shadow: 0 -4px 20px rgba(99,102,241,0.12);
  animation: slideUpBar 0.25s ease-out;
}
.batch-bar.show { display: flex; }
@keyframes slideUpBar { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.batch-info { font-size: 14px; font-weight: 600; color: var(--primary); }
.batch-actions { display: flex; gap: 8px; align-items: center; }
.batch-actions .btn-batch-del {
  padding: 8px 18px; border-radius: 10px; border: none; background: var(--red);
  color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.batch-actions .btn-batch-del:hover { background: #DC2626; transform: scale(1.02); }
.batch-actions .btn-batch-cancel {
  padding: 8px 14px; border-radius: 10px; border: none; background: none;
  color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer;
}

@media (max-width: 768px) {
  .container { padding: 12px 14px; }
  .top-bar { padding: 0 16px; }
  .top-bar .nav-links a { padding: 5px 10px; font-size: 12px; }

  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar input, .toolbar select { width: 100%; }

  .hide-mobile { display: none; }
  .apt-card { padding: 14px 16px; }
  .apt-card-actions button { padding: 7px 14px; font-size: 12px; }
}
</style>
</head>

<script>
// ============================================
// 自在生涯工作室 - 教师端
// ============================================

var TEACHER_PASSWORD = "123";
var currentTab = "assessments";

// ===== Test Info =====
var TEST_INFO = {
  bigfive: { name: "大五人格", dims: ["E","A","C","N","O"], dimNames: {E:"外向性",A:"宜人性",C:"尽责性",N:"神经质",O:"开放性"} },
  holland: { name: "霍兰德", dims: ["R","I","A","S","E","C"], dimNames: {R:"现实型",I:"研究型",A:"艺术型",S:"社会型",E:"企业型",C:"常规型"} },
  strength: { name: "优势潜能", dims: ["ACT01","ACT02","ACT03","ACT04","ACT05","ACT06","ACT07","ACT08","ACT09","INF01","INF02","INF03","INF04","INF05","INF06","INF07","INF08","REL01","REL02","REL03","REL04","REL05","REL06","REL07","REL08","REL09","COG01","COG02","COG03","COG04","COG05","COG06","COG07","COG08"], dimNames: {ACT01:"目标推进",ACT02:"持续投入",ACT03:"计划秩序",ACT04:"责任兑现",ACT05:"风险审慎",ACT06:"问题修复",ACT07:"资源统筹",ACT08:"规则公平",ACT09:"信念驱动",INF01:"主动启动",INF02:"立场表达",INF03:"清晰沟通",INF04:"舞台呈现",INF05:"优化提升",INF06:"竞争进取",INF07:"自信判断",INF08:"支持争取",REL01:"变化适应",REL02:"他人成长",REL03:"情绪共感",REL04:"共识调和",REL05:"包容连接",REL06:"个体识别",REL07:"氛围点亮",REL08:"深度联结",REL09:"群体关联",COG01:"逻辑分析",COG02:"经验回顾",COG03:"未来想象",COG04:"创意构想",COG05:"信息搜集",COG06:"深度思考",COG07:"持续学习",COG08:"策略路径"}},
  mbti: { name: "MBTI", dims: ["EI","SN","TF","JP"], dimNames: {EI:"外倾/内倾",SN:"感觉/直觉",TF:"思维/情感",JP:"判断/感知"} }
};

var TYPE_NAMES = {
  career:'职业规划', resume:'简历优化', interview:'面试辅导', industry:'行业分析'
};

var allData = [];
var allAppointments = [];
var aptFilter = "all";
var realtimeUnsub = null;
var selectedIds = [];

// ============================================
// LOGIN
// ============================================
function doLogin() {
  var pwd = document.getElementById("pwdInput").value;
  if (pwd === TEACHER_PASSWORD) {
    sessionStorage.setItem("teacher_login", "1");
    showDashboard();
  } else {
    showToast("密码错误", "error");
  }
}

function showDashboard() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("dashboard").style.display = "flex";
  loadAssessments();
  loadAppointments();
  startRealtimeSubscription();
  playNotifOnNext = false; // 首次加载不播放声音
}

// ============================================
// TAB SWITCHING
// ============================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); });
  document.querySelectorAll(".tab-panel").forEach(function(p) { p.classList.remove("active"); });
  document.getElementById("panel" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add("active");
  document.getElementById("tab" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add("active");

  if (tab === "appointments") {
    document.getElementById("aptDot").style.display = "none";
    loadAppointments();
  } else if (tab === "records") {
    loadRecords();
  } else if (tab === "schedule") {
    loadSchedule();
  }
}

// ============================================
// TAB 1: 测评管理
// ============================================
async function loadAssessments() {
  var tc = document.getElementById("tableContent");
  tc.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    allData = await getAllSubmissions();
    renderStats();
    renderClassFilter();
    renderTable(allData);
  } catch(err) {
    tc.innerHTML = '<div class="empty"><div class="icon">⚠️</div><div>数据加载失败，请检查 Supabase 配置</div></div>';
  }
}

function renderStats() {
  var total = allData.length;
  var classes = {};
  var testCounts = {};
  var todayCount = 0;
  var today = new Date().toDateString();

  allData.forEach(function(d) {
    classes[d.class_name] = true;
    testCounts[d.test_type] = (testCounts[d.test_type] || 0) + 1;
    if (d.created_at && new Date(d.created_at).toDateString() === today) todayCount++;
  });

  var topTest = "-", topCount = 0;
  for (var t in testCounts) {
    if (testCounts[t] > topCount) { topCount = testCounts[t]; topTest = TEST_INFO[t] ? TEST_INFO[t].name : t; }
  }

  document.getElementById("statsGrid").innerHTML =
    '<div class="stat-card"><div class="stat-val">'+total+'</div><div class="stat-label">总测评次数</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+Object.keys(classes).length+'</div><div class="stat-label">覆盖班级</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+todayCount+'</div><div class="stat-label">今日新增</div></div>'+
    '<div class="stat-card"><div class="stat-val" style="font-size:20px;">'+topTest+'</div><div class="stat-label">最多测评('+topCount+')</div></div>';
}

function renderClassFilter() {
  var classes = {};
  allData.forEach(function(d) { classes[d.class_name] = true; });
  var sel = document.getElementById("classFilter");
  var cur = sel.value;
  sel.innerHTML = '<option value="">全部班级</option>' +
    Object.keys(classes).sort().map(function(c) { return '<option value="'+esc(c)+'">'+esc(c)+'</option>'; }).join("");
  sel.value = cur;
}

function renderTable(data) {
  var tc = document.getElementById("tableContent");
  // 重置批量选择（每次重新渲染）
  selectedIds = [];
  if (data.length === 0) {
    tc.innerHTML = '<div class="empty"><div class="icon">📭</div><div>暂无测评数据</div><div style="font-size:13px;margin-top:8px;">学生提交测评后将在此显示</div></div>';
    renderBatchBar();
    return;
  }

  var html = '<table><thead><tr>'+
    '<th class="th-checkbox"><input type="checkbox" id="selectAllCheck" onchange="toggleSelectAll(this.checked)" title="全选/取消全选"></th>'+
    '<th>姓名</th><th>学校</th><th>学号</th><th>班级</th><th>测评类型</th>'+
    '<th>结果</th><th class="hide-mobile">概述</th><th class="hide-mobile">提交时间</th><th>操作</th>'+
    '</tr></thead><tbody>';

  data.forEach(function(item, idx) {
    var testName = TEST_INFO[item.test_type] ? TEST_INFO[item.test_type].name : (item.test_name || item.test_type);
    var time = item.created_at ? new Date(item.created_at).toLocaleString("zh-CN", {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}) : "-";

    var codeCell = esc(item.result_code||'-');
    if (item.test_type === 'holland' && item.result_code && item.result_code.length === 3) {
      codeCell = '<span class="result-code clickable" onclick="event.stopPropagation(); showHollandAnalysis(\''+esc(item.result_code)+'\', '+idx+')" title="点击查看三码分析">'+esc(item.result_code)+'</span>';
    } else {
      codeCell = '<span class="result-code">'+codeCell+'</span>';
    }

    html += '<tr data-id="'+item.id+'">'+
      '<td><input type="checkbox" class="row-checkbox" data-id="'+item.id+'" onchange="onRowCheckChange(this)"></td>'+
      '<td style="font-weight:600;">'+esc(item.name)+'</td>'+
      '<td>'+esc(item.school||'-')+'</td>'+
      '<td>'+esc(item.student_id)+'</td>'+
      '<td>'+esc(item.class_name)+'</td>'+
      '<td><span class="badge badge-'+(item.test_type||'')+'">'+esc(testName)+'</span></td>'+
      '<td>'+codeCell+'</td>'+
      '<td class="hide-mobile" style="color:var(--text-secondary);font-size:12px;">'+esc(item.result_summary||'-')+'</td>'+
      '<td class="hide-mobile" style="color:var(--text-light);font-size:12px;">'+time+'</td>'+

// 批量删除
// ============================================
var selectedIds = [];

function onRowCheckChange(cb) {
  var id = cb.getAttribute('data-id');
  if (cb.checked) {
    if (selectedIds.indexOf(id) < 0) selectedIds.push(id);
    cb.closest('tr').classList.add('selected');
  } else {
    selectedIds = selectedIds.filter(function(x){ return x !== id; });
    cb.closest('tr').classList.remove('selected');
    var sa = document.getElementById('selectAllCheck');
    if (sa) sa.checked = false;
  }
  renderBatchBar();
}

function toggleSelectAll(checked) {
  selectedIds = [];
  var checks = document.querySelectorAll('.row-checkbox');
  checks.forEach(function(cb) {
    cb.checked = checked;
    if (checked) {
      var id = cb.getAttribute('data-id');
      if (selectedIds.indexOf(id) < 0) selectedIds.push(id);
      cb.closest('tr').classList.add('selected');
    } else {
      cb.closest('tr').classList.remove('selected');
    }
  });
  renderBatchBar();
}

function clearSelection() {
  selectedIds = [];
  var checks = document.querySelectorAll('.row-checkbox');
  checks.forEach(function(cb) { cb.checked = false; cb.closest('tr').classList.remove('selected'); });
  var sa = document.getElementById('selectAllCheck');
  if (sa) sa.checked = false;
  renderBatchBar();
}

function renderBatchBar() {
  var bar = document.getElementById('batchBar');
  if (!bar) return;
  var info = document.getElementById('batchInfo');
  if (selectedIds.length > 0) {
    info.textContent = '已选 ' + selectedIds.length + ' 条';
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

async function batchDelete() {
  if (selectedIds.length === 0) return;
  if (!confirm('确定删除选中的 ' + selectedIds.length + ' 条记录？此操作不可撤销。')) return;
  var total = selectedIds.length;
  var ok = 0, fail = 0;
  showToast('开始批量删除 ' + total + ' 条...', 'success');
  // 逐条删除（避免一次 in() 过大或 RLS 限制）
  for (var i = 0; i < selectedIds.length; i++) {
    try {
      await deleteSubmission(selectedIds[i]);
      ok++;
    } catch(err) {
      console.error('删除失败 id='+selectedIds[i], err);
      fail++;
    }
  }
  // 清空选择
  selectedIds = [];
  if (fail === 0) {
    showToast('已删除 ' + ok + ' 条记录 ✅', 'success');
  } else {
    showToast('删除完成：成功 ' + ok + ' 条，失败 ' + fail + ' 条', fail === total ? 'error' : 'success');
  }
  loadAssessments();
}

function filterTable() {
  var kw = (document.getElementById("searchInput").value || "").toLowerCase();
  var cf = document.getElementById("classFilter").value;
  var tf = document.getElementById("testFilter").value;

  var filtered = allData.filter(function(item) {
    var mk = !kw || (item.name||"").toLowerCase().indexOf(kw)>=0 ||
      (item.school||"").toLowerCase().indexOf(kw)>=0 ||
      (item.student_id||"").toLowerCase().indexOf(kw)>=0 ||
      (item.class_name||"").toLowerCase().indexOf(kw)>=0;
    var mc = !cf || item.class_name === cf;
    var mt = !tf || item.test_type === tf;
    return mk && mc && mt;
  });
  renderTable(filtered);
}

function parseNotes(raw) {
  if (!raw) return { goals: '', analysis: '', solution: '', action: '', notes: '' };
  try {
    var obj = JSON.parse(raw);
    if (typeof obj === 'object' && obj !== null && (obj.goals || obj.analysis || obj.solution || obj.action || obj.notes)) {
      return obj;
    }
  } catch(e) {}
  // 旧格式兼容：纯文本转 notes 字段
  return { goals: '', analysis: '', solution: '', action: '', notes: raw };
}

    h += '<textarea id="notesSolution' + id + '" class="notes-field-textarea" placeholder="给出针对性的职业规划建议与方案">' + esc(obj.solution) + '</textarea>';
  } else {

  }
  h += '</div>';
  h += '<div class="notes-field-group"><div class="notes-field-label">📋 行动计划/下一步</div>';
  if (isEdit) {
    h += '<textarea id="notesAction' + id + '" class="notes-field-textarea" placeholder="明确的后续行动步骤与时间节点">' + esc(obj.action) + '</textarea>';
  } else {

  }
  h += '</div>';
  h += '<div class="notes-field-group"><div class="notes-field-label">📝 补充备注</div>';

var DAY_NAMES = { 0:'周日', 1:'周一', 2:'周二', 3:'周三', 4:'周四', 5:'周五', 6:'周六' };

function formatDateCN(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return dateStr;
  var month = d.getMonth() + 1;
  var day = d.getDate();
  var week = DAY_NAMES[d.getDay()];
  return month + '月' + day + '日 (' + week + ')';
}

  // 渲染导师选择标签
  var tabsHtml = '';
  for (var mid in MENTOR_LIST) {
    var active = mid === scheduleMentorId ? ' active' : '';
    tabsHtml += '<div class="schedule-mentor-tab'+active+'" onclick="selectScheduleMentor(\''+mid+'\')">'+MENTOR_LIST[mid].name+'</div>';
  }
  document.getElementById("scheduleMentorTabs").innerHTML = tabsHtml;

  // 加载导师设置（预约开关）
  try {
    var settings = await getMentorSettings(scheduleMentorId);
    var toggle = document.getElementById("acceptingToggle");
    toggle.checked = settings.booking_open;
    document.getElementById("closedMsgRow").style.display = settings.booking_open ? 'none' : 'block';
  } catch(err) {
    console.error("加载导师设置失败:", err);
  }

  // 加载时间表
  try {
    var slots = await getMentorSchedule(scheduleMentorId);
    renderScheduleList(slots);
  } catch(err) {
    console.error("加载时间表失败:", err);
    document.getElementById("scheduleList").innerHTML = '<div class="empty"><div class="icon">⚠️</div><div>加载失败</div></div>';
  }
}

function renderScheduleList(slots) {
  if (!slots || slots.length === 0) {
    document.getElementById("scheduleList").innerHTML = '<div class="empty"><div class="icon">⏰</div><div>暂未设定时间段，请添加可预约时段</div></div>';
    return;
  }

  // 按日期分组
  var groups = {};
  slots.forEach(function(s) {
    var d = s.specific_date;
    if (!groups[d]) groups[d] = [];
    groups[d].push(s);
  });

  var html = '';
  // 按日期排序
  var dates = Object.keys(groups).sort();
  dates.forEach(function(dateKey) {
    html += '<div class="schedule-day-group">';
    html += '<div class="schedule-day-name">' + formatDateCN(dateKey) + '</div>';
    groups[dateKey].forEach(function(s) {
      html += '<div class="schedule-slot-item">' +
        '<span class="schedule-slot-time">' + s.start_time + ' - ' + s.end_time + '</span>' +
        '<button class="schedule-slot-del" onclick="deleteSlot(' + s.id + ')">删除</button>' +
      '</div>';
    });
    html += '</div>';
  });

  document.getElementById("scheduleList").innerHTML = html;
}

function selectScheduleMentor(mid) {
  scheduleMentorId = mid;
  document.querySelectorAll(".schedule-mentor-tab").forEach(function(t) { t.classList.remove("active"); });
  event.target.classList.add("active");
  loadSchedule();
}

async function toggleAccepting() {
  var isChecked = document.getElementById("acceptingToggle").checked;
  try {
    await updateMentorSettings(scheduleMentorId, { booking_open: isChecked });
    document.getElementById("closedMsgRow").style.display = isChecked ? 'none' : 'block';
    showToast(isChecked ? "已开放预约 ✅" : "已暂停预约 🔒", "success");
  } catch(err) {
    console.error("更新设置失败:", err);
    showToast("更新失败", "error");
    // 回滚开关状态
    document.getElementById("acceptingToggle").checked = !isChecked;
  }
}

async function handleAddScheduleSlot() {
  var dateInput = document.getElementById("scheduleDate");
  var date = dateInput ? dateInput.value : '';
  var start = document.getElementById("scheduleStart").value;
  var end = document.getElementById("scheduleEnd").value;

  if (!date) {
    showToast("请选择日期", "error");
    return;
  }
  if (!start || !end) {
    showToast("请填写开始和结束时间", "error");
    return;
  }
  if (start >= end) {
    showToast("结束时间必须大于开始时间", "error");
    return;
  }

  try {
    // 直接调用 config.js 的 addScheduleSlot（不再被内联同名函数覆盖）
    await addScheduleSlot({
      mentor_id: scheduleMentorId,
      specific_date: date,
      start_time: start,
      end_time: end
    });
    showToast("时间段已添加 ✅", "success");
    loadSchedule();
  } catch(err) {
    console.error("添加时间段失败:", err);
    showToast("添加失败：" + (err.message || err), "error");
  }
}

async function deleteSlot(id) {
  if (!confirm("确定删除这个时间段？")) return;
  try {
    await deleteScheduleSlot(id);
    showToast("已删除 ✅", "success");
    loadSchedule();
  } catch(err) {
    console.error("删除时间段失败:", err);
    showToast("删除失败", "error");
  }
}

// ============================================
function startRealtimeSubscription() {
  if (!isDbReady()) {
    console.log("[教师端] Supabase 未配置，使用本地模式（需手动刷新）");
    return;
  }

  realtimeUnsub = subscribeAppointments({
    onInsert: function(newApt) {
      console.log("[教师端] 收到新预约！", newApt.student_name);
      newApt._isNew = true;

      // 在列表顶部插入
      allAppointments.unshift(newApt);

      if (currentTab === "appointments") {
        renderAptStats();
        renderAppointments(allAppointments);
      } else {
        // 在非预约tab时，显示红点提醒
        document.getElementById("aptDot").style.display = "inline-block";
      }

      // 播放提示音
      playNotification();
      showToast("🔔 新预约：" + newApt.student_name + " - " + (TYPE_NAMES[newApt.consult_type]||newApt.consult_type_name||"") + "", "success");
    },
    onUpdate: function(updatedApt, oldApt) {
      console.log("[教师端] 预约更新:", updatedApt.id, updatedApt.status);
      var idx = allAppointments.findIndex(function(a) { return a.id === updatedApt.id; });
      if (idx >= 0) {
        allAppointments[idx] = updatedApt;
      }
      if (currentTab === "appointments") {
        renderAptStats();
        renderAppointments(allAppointments);
      }
    },
    onDelete: function(oldApt) {
      allAppointments = allAppointments.filter(function(a) { return a.id !== oldApt.id; });
      if (currentTab === "appointments") {
        renderAptStats();
        renderAppointments(allAppointments);
      }
    }
  });
}

function playNotification() {
  try {
    var audio = document.getElementById("notifSound");
    if (audio) { audio.currentTime = 0; audio.play().catch(function(e) {}); }
  } catch(e) {}
}

// Cleanup
window.addEventListener("beforeunload", function() {
  if (realtimeUnsub) realtimeUnsub();
});

function getHollandDimDescs() {
  return {
    R: '动手能力强，偏好使用工具和机械',
    I: '善于思考分析，偏好研究和探索',
    A: '富有创意想象，偏好艺术和表达',
    S: '乐于帮助他人，偏好服务和沟通',
    E: '具有领导才能，偏好管理和说服',
    C: '注重规范细节，偏好数据和事务'
  };
}

function getHollandAnalysisText(code, sorted) {
  var typeNames = getHollandTypeNames();
  var typeName = typeNames[code] || '综合型';
  var dimDescs = getHollandDimDescs();
  var top3 = sorted.slice(0,3);
  var top = top3[0], second = top3[1], third = top3[2];

  var dimNames = {R:'现实型',I:'研究型',A:'艺术型',S:'社会型',E:'企业型',C:'常规型'};
  var d1 = dimNames[top.dim] || top.dim;
  var d2 = dimNames[second.dim] || second.dim;
  var d3 = dimNames[third.dim] || third.dim;

  var analysis =
    '该学生最突出的维度是 <b>' + d1 + '（' + top.dim + '）</b>，得分 ' + top.score + '%，说明' + dimDescs[top.dim] + '。' +
    '其次是 <b>' + d2 + '（' + second.dim + '）</b>，得分 ' + second.score + '%，反映其' + dimDescs[second.dim].replace('偏好','同时具备').replace('善于','同时具备') + '。';

  if (third && third.score >= 40) {
    analysis += '第三维度 <b>' + d3 + '（' + third.dim + '）</b>也有一定倾向，说明' + dimDescs[third.dim].replace('偏好','在某些场景下也') + '。';
  }

  analysis += '<br><br><b>适合方向：</b>三码组合 <b>' + code + '</b>（' + typeName + '）暗示该学生适合从事与 "' + d1 + '、' + d2 + '、' + d3 + '" 相关的职业领域，可重点考虑融合这些特质的工作。';

  return analysis;
}

function showHollandAnalysis(code, idx) {
  if (!code || code.length !== 3) return;

  // Find the item from filtered data
  var kw = (document.getElementById("searchInput").value || "").toLowerCase();
  var cf = document.getElementById("classFilter").value;
  var tf = document.getElementById("testFilter").value;
  var filtered = allData.filter(function(item) {
    var mk = !kw || (item.name||"").toLowerCase().indexOf(kw)>=0 ||
      (item.school||"").toLowerCase().indexOf(kw)>=0 ||
      (item.student_id||"").toLowerCase().indexOf(kw)>=0 ||
      (item.class_name||"").toLowerCase().indexOf(kw)>=0;
    var mc = !cf || item.class_name === cf;
    var mt = !tf || item.test_type === tf;
    return mk && mc && mt;
  });
  var item = filtered[idx];
  if (!item) return;

  var typeNames = getHollandTypeNames();
  var typeName = typeNames[code] || '综合型';
  var dimDescs = getHollandDimDescs();
  var dimNames = {R:'现实型',I:'研究型',A:'艺术型',S:'社会型',E:'企业型',C:'常规型'};
  var dimColors = {R:'#10B981',I:'#3B82F6',A:'#8B5CF6',S:'#F59E0B',E:'#EF4444',C:'#14B8A6'};

  // Build sorted scores from item data
  var sorted = [];
  if (item.scores && typeof item.scores === 'object') {
    var info = TEST_INFO.holland || { dims: ['R','I','A','S','E','C'], dimNames: {R:'现实型',I:'研究型',A:'艺术型',S:'社会型',E:'企业型',C:'常规型'} };
    sorted = info.dims.map(function(d) { return {dim:d, score:item.scores[d]||0}; }).sort(function(a,b){ return b.score - a.score; });
  }

  var top3 = sorted.slice(0,3);

  var analysisText = getHollandAnalysisText(code, sorted);

  // Build top 3 pills
  var pillsHtml = top3.map(function(e) {
    return '<div class="ha-hero-pill" style="background:'+dimColors[e.dim]+'15;color:'+dimColors[e.dim]+';border:1.5px solid '+dimColors[e.dim]+'40">'+
      '<span class="ha-hero-pill-letter" style="background:'+dimColors[e.dim]+'">'+e.dim+'</span>'+
      '<span>'+dimNames[e.dim]+' '+e.score+'%</span>'+
    '</div>';
  }).join('');

  // Build dim analysis list
  var dimListHtml = '<div class="ha-dim-list">'+
    sorted.map(function(e) {
      return '<div class="ha-dim-item">'+
        '<span class="ha-dim-tag" style="background:'+dimColors[e.dim]+'20;color:'+dimColors[e.dim]+'">'+dimNames[e.dim]+' '+e.dim+'</span>'+
        '<span class="ha-dim-desc">'+dimDescs[e.dim]+'。得分 '+e.score+'%，'+(e.score>=50?'属于优势领域':'相对较弱')+'。</span>'+
      '</div>';
    }).join('')+
  '</div>';

  document.getElementById("hollandModalBody").innerHTML =
    '<div class="ha-hero">'+
      '<div class="ha-hero-code">'+code+'</div>'+
      '<div class="ha-hero-type">'+typeName+'</div>'+
      '<div class="ha-hero-pills">'+pillsHtml+'</div>'+
    '</div>'+
    '<div style="padding:16px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border);">'+
      '<div class="ha-analysis">'+analysisText+'</div>'+
    '</div>'+
    '<div style="margin-top:16px;">'+
      '<div style="font-size:14px;font-weight:700;margin-bottom:12px;">📊 六维分析</div>'+dimListHtml+
    '</div>';

  document.getElementById("hollandModal").classList.add("show");
}

// ============================================
// EXPORT CSV
// ============================================
function exportCSV() {
  if (allData.length === 0) { showToast("暂无数据可导出", "error"); return; }

  var headers = ["姓名","学校","学号","班级","测评类型","结果代码","概述","提交时间"];
  var rows = allData.map(function(item) {
    var testName = TEST_INFO[item.test_type] ? TEST_INFO[item.test_type].name : (item.test_name || item.test_type);
    return [
      item.name || "", item.school || "", item.student_id || "",
      item.class_name || "", testName, item.result_code || "",
      item.result_summary || "",
      item.created_at ? new Date(item.created_at).toLocaleString("zh-CN") : ""
    ];
  });

  var csv = "\uFEFF" + headers.join(",") + "\n";
  rows.forEach(function(row) {
    csv += row.map(function(cell) {
      var s = String(cell);
      if (s.indexOf(",") >= 0) return '"' + s.replace(/"/g,'""') + '"';
      return s;
    }).join(",") + "\n";
  });

  var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  var link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "职趣星图_测评数据_" + new Date().toISOString().slice(0,10) + ".csv";
  link.click();
  URL.revokeObjectURL(link.href);
  showToast("导出成功", "success");
}

function esc(str) {
  if (!str) return "";
  var d = document.createElement("div");
  d.textContent = String(str);
  return d.innerHTML;
}

function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (type ? " " + type : "");
  setTimeout(function() { t.className = "toast"; }, 2500);
}
